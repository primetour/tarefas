<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roteiro de Viagem · PRIMETOUR</title>
  <meta name="description" content="Roteiro de viagem personalizado PRIMETOUR">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- 4.47.2+ (Sprint 6a polish v3) — Poppins APENAS. Mesma família do Portal.
       Cormorant removido — user disse "fonte do header ainda está diferente". -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <!-- Material Symbols (igual Portal) pra ícones de header -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <!-- 4.47.0+ (Sprint 6a) — Leaflet pra mapa interativo (mesma versão do Portal de Dicas).
       Tiles OpenStreetMap (free, sem API key). -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
:root {
  --gold: #D4A843;
  --navy: #1A1A2E;
  --dark: #0A1628;
  --white: #FFFFFF;
  --light: #F8F9FA;
  --muted: #94A3B8;
  --success: #22C55E;
  --danger: #EF4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--white);
  color: var(--navy);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* 4.48.0+ (Sprint 6c Phase 4) — fontes vêm de areaTokens (CSS vars):
   --area-font-headline (h1/h2/h3) e --area-font-body (body, labels, nav).
   Defaults Poppins quando area não tem fonts configurada. */
body { font-family: var(--area-font-body, 'Poppins'), sans-serif; }
h1, h2, h3, h4, .serif { font-family: var(--area-font-headline, 'Poppins'), sans-serif; }
.hero-title.serif { font-family: var(--area-font-headline, 'Poppins'), sans-serif; font-weight: 600; letter-spacing: -.02em; }
h2.serif, h3.serif, h4.serif { font-family: var(--area-font-headline, 'Poppins'), sans-serif; font-weight: 600; letter-spacing: -.01em; }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; background: var(--dark);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; z-index: 9999; transition: opacity .6s;
}
#loading .brand {
  color: var(--gold); font-size: .8rem; letter-spacing: .4em; font-weight: 300;
  font-family: 'Poppins', sans-serif; text-transform: uppercase;
}
.spinner-ring {
  width: 44px; height: 44px;
  border: 2px solid rgba(212,168,67,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
.error-state {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 40px; text-align: center;
  background: var(--dark); color: var(--muted);
}
.error-state h2 { color: var(--gold); font-size: 1.75rem; font-weight: 600; font-family: 'Poppins', sans-serif; }
.error-state a { color: var(--gold); text-decoration: none; font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; margin-top: 8px; }
.error-state a:hover { text-decoration: underline; }

/* ── Hero ── */
.hero {
  position: relative; width: 100%; min-height: 100vh; display: flex;
  align-items: flex-end; overflow: hidden; background: var(--dark);
}
.hero-bg {
  position: absolute; inset: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
  background-size: cover; background-position: center;
}
/* 4.47.0+ (Sprint 6a) — quando há imagem, escurece SUAVE pra foto respirar mais */
.hero-bg.has-image { filter: brightness(0.78); }
.hero-overlay {
  position: absolute; inset: 0;
  /* Gradiente menos denso embaixo (70% vs 95%) + lateral suave esquerdo
     pra texto ler bem sem matar a foto. Inspirado no Portal. */
  background:
    linear-gradient(to top, rgba(10,22,40,.85) 0%, rgba(10,22,40,.25) 50%, rgba(10,22,40,0) 100%),
    linear-gradient(to right, rgba(10,22,40,.45) 0%, rgba(10,22,40,0) 50%);
}
.hero-content {
  position: relative; padding: 80px 48px 60px; max-width: 900px; z-index: 2;
}
.hero-overline {
  display: inline-block; font-size: .65rem; letter-spacing: .45em; font-weight: 500;
  /* 4.48.0+ Cor do chrome controlada pelo template da área
     (editorial.chromeAccent: white|gold-on-dark|primary). Default = branco. */
  color: var(--area-chrome-accent, #fff); text-transform: uppercase; margin-bottom: 20px;
  font-family: 'Poppins', sans-serif; opacity: 0; animation: fadeUp .8s .3s forwards;
}
.hero-title {
  font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 700; color: var(--white);
  line-height: 1.05; letter-spacing: -.02em;
  opacity: 0; animation: fadeUp .8s .5s forwards;
}
.hero-destinations {
  font-size: clamp(1.1rem, 3vw, 1.5rem); color: rgba(255,255,255,.7);
  margin-top: 16px; font-weight: 300; font-family: 'Poppins', sans-serif;
  opacity: 0; animation: fadeUp .8s .7s forwards;
}
/* 4.47.2+ (Sprint 6a polish v3) — badge BRANCO semi-transparente.
   User reportou: gold sólido não combinou; "deveria estar em branco".
   Agora: background white 12% + backdrop-blur + text WHITE 600 — legível
   no hero escuro e elegante, ao invés de bloco gold gritante. */
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 32px; padding: 10px 24px;
  background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.3);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: #fff; font-size: .75rem; letter-spacing: .1em; font-weight: 600;
  font-family: 'Poppins', sans-serif; border-radius: 999px;
  opacity: 0; animation: fadeUp .8s .9s forwards;
}
.hero-badge svg { stroke: #fff; }
.hero-gold-line {
  /* 4.48.0+ Cor controlada pelo template da área. */
  width: 60px; height: 2px; background: var(--area-chrome-accent, rgba(255,255,255,.8));
  margin-top: 40px; opacity: 0; animation: fadeUp .8s 1.1s forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Navigation ── */
.sticky-nav {
  position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,.06);
  overflow-x: auto; display: flex; gap: 0; padding: 0 32px;
  scrollbar-width: none;
}
.sticky-nav::-webkit-scrollbar { display: none; }
.sticky-nav a {
  flex: none; padding: 18px 20px; font-size: .65rem; letter-spacing: .18em;
  font-weight: 600; text-transform: uppercase; text-decoration: none;
  color: var(--muted); white-space: nowrap; border-bottom: 2px solid transparent;
  transition: all .2s; font-family: 'Poppins', sans-serif;
}
.sticky-nav a:hover, .sticky-nav a.active {
  color: var(--navy); border-bottom-color: var(--gold);
}

/* ── Sections ── */
.content-wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
.section { padding: 80px 0; }
.section + .section { border-top: 1px solid rgba(0,0,0,.05); }
.section-overline {
  font-size: .6rem; letter-spacing: .4em; font-weight: 600; color: var(--gold);
  text-transform: uppercase; margin-bottom: 8px; display: block;
  font-family: 'Poppins', sans-serif;
}
.section-title {
  font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; color: var(--navy);
  line-height: 1.15;
}
.section-desc {
  font-size: .95rem; color: var(--muted); margin-top: 12px; line-height: 1.7;
  max-width: 700px;
}

/* ── Timeline (Day by Day) ── */
.timeline { position: relative; padding-left: 48px; margin-top: 48px; }
.timeline::before {
  content: ''; position: absolute; left: 18px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(to bottom, var(--gold), rgba(212,168,67,.15));
}
.day-card {
  position: relative; margin-bottom: 40px; background: var(--white);
  border: 1px solid rgba(0,0,0,.06); padding: 28px 28px 24px;
  transition: box-shadow .3s;
}
.day-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.06); }
.day-badge {
  position: absolute; left: -48px; top: 24px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; font-family: 'Poppins', sans-serif;
  box-shadow: 0 0 0 4px var(--white);
}
.day-header { margin-bottom: 16px; }
.day-date {
  font-size: .65rem; letter-spacing: .2em; color: var(--gold);
  text-transform: uppercase; font-weight: 600; margin-bottom: 4px;
}
.day-title {
  font-size: 1.35rem; font-weight: 700; color: var(--navy); line-height: 1.25;
}
.day-city {
  font-size: .8rem; color: var(--muted); margin-top: 4px; font-weight: 400;
}
.day-narrative {
  font-size: .9rem; color: #475569; line-height: 1.85; white-space: pre-line;
}
.day-overnight {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 16px; padding: 6px 14px;
  background: rgba(212,168,67,.08); border-left: 3px solid var(--gold);
  font-size: .75rem; color: var(--navy); font-weight: 500;
}
.day-overnight svg { width: 14px; height: 14px; fill: var(--gold); flex-shrink: 0; }

/* 4.47.0+ (Sprint 6a Phase 2d) — Mapa interativo */
.roteiro-map-wrap {
  width: 100%; height: 500px; border-radius: 8px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-top: 24px;
  background: var(--light); position: relative;
}
.roteiro-map-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: .875rem;
}
.map-pin-wrapper { background: transparent; border: none; }
.map-pin {
  width: 32px; height: 32px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,.3); color: #fff;
}
.map-pin span { transform: rotate(45deg); font-size: 14px; font-weight: 700; }
.map-pin.city  { background: var(--navy); }
.map-pin.hotel { background: var(--gold); }
.map-pin.tip   { background: var(--success); }
.map-popup-cat   { font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); font-weight: 700; }
.map-popup-title { font-size: 1rem; font-weight: 600; color: var(--navy); margin: 4px 0; }
.map-popup-addr  { font-size: .8rem; color: var(--muted); }

/* 4.47.0+ (Sprint 6a Phase 2a) — banner de cidade entre dias. Aparece
   sempre que o roteiro MUDA de cidade — quebra a monotonia visual. */
.day-city-banner {
  position: relative; margin: 48px 0 32px; border-radius: 8px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.08); height: 240px;
}
.day-city-banner-img {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  filter: brightness(0.75);
}
.day-city-banner-label {
  position: absolute; left: 32px; bottom: 24px; color: #fff;
  display: flex; flex-direction: column; gap: 4px; z-index: 2;
}
.day-city-banner-overline {
  font-size: .65rem; letter-spacing: .3em; font-weight: 600; opacity: .85;
  text-transform: uppercase;
}
.day-city-banner-name { font-size: 2rem; font-weight: 500; line-height: 1; }
.day-city-banner::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.6) 0%, rgba(0,0,0,0) 60%);
}

/* ── Hotels (4.47.0+ Sprint 6a — visual estilo revista, foto + cards) ── */
.hotels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 40px; }
.hotel-card-rich {
  background: var(--white); border-radius: 8px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  transition: transform .3s, box-shadow .3s; display: flex; flex-direction: column;
}
.hotel-card-rich:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
.hotel-img {
  width: 100%; aspect-ratio: 16 / 10; background-size: cover; background-position: center;
  background-color: var(--light);
}
.hotel-img-empty {
  display: flex; align-items: center; justify-content: center;
  color: var(--gold); font-size: 1.2rem; letter-spacing: .3em;
  background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
}
.hotel-body { padding: 22px 24px 24px; }
.hotel-cat {
  font-size: .6rem; letter-spacing: .3em; font-weight: 700; color: var(--gold);
  text-transform: uppercase; margin-bottom: 8px;
}
.hotel-name {
  font-size: 1.35rem; font-weight: 600; color: var(--navy);
  line-height: 1.25; margin: 0 0 4px;
}
.hotel-city {
  font-size: .8rem; color: var(--muted); letter-spacing: .04em;
  margin-bottom: 16px;
}
.hotel-dl {
  margin: 0; padding-top: 14px; border-top: 1px solid rgba(0,0,0,.06);
  display: grid; grid-template-columns: 110px 1fr; gap: 8px 14px; font-size: .8125rem;
}
.hotel-dl dt {
  font-weight: 600; color: var(--navy); text-transform: uppercase;
  letter-spacing: .06em; font-size: .65rem; padding-top: 2px;
}
.hotel-dl dd { margin: 0; color: #4B5563; }
.hotel-obs {
  margin-top: 14px; padding-top: 14px; border-top: 1px dashed rgba(0,0,0,.08);
  font-size: .8rem; color: var(--muted); font-style: italic; line-height: 1.5;
}
/* Compat: cards antigos sem foto (caso roteiro pre-Sprint 6 ou sem images) */
.hotel-card { background: var(--white); border: 1px solid rgba(0,0,0,.06); padding: 24px; }
.hotel-detail { font-size: .8rem; color: var(--muted); line-height: 1.6; }
.hotel-detail strong { color: var(--navy); font-weight: 600; }

/* ── Pricing ── */
.price-display {
  text-align: center; padding: 48px 32px; margin-top: 40px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
  color: var(--white);
}
.price-currency { font-size: .8rem; letter-spacing: .2em; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
.price-value { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; font-family: 'Poppins', sans-serif; color: var(--white); }
.price-per { font-size: .85rem; color: rgba(255,255,255,.5); margin-top: 4px; }
.price-validity { font-size: .75rem; color: rgba(255,255,255,.4); margin-top: 16px; }
.price-disclaimer { font-size: .75rem; color: var(--muted); margin-top: 20px; line-height: 1.7; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center; }

/* ── Optionals ── */
.optionals-table { width: 100%; border-collapse: collapse; margin-top: 32px; }
.optionals-table th {
  padding: 12px 16px; font-size: .6rem; letter-spacing: .2em; font-weight: 700;
  text-transform: uppercase; color: var(--gold); background: var(--light);
  border-bottom: 2px solid rgba(212,168,67,.2); text-align: left;
}
.optionals-table td {
  padding: 12px 16px; font-size: .85rem; color: var(--navy);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.optionals-table tr:hover td { background: rgba(248,249,250,.6); }

/* ── Includes / Excludes ── */
.inc-exc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 40px; }
.inc-exc-col h3 {
  font-size: .65rem; letter-spacing: .3em; font-weight: 700;
  text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid;
}
.inc-exc-col.includes h3 { color: var(--success); border-color: var(--success); }
.inc-exc-col.excludes h3 { color: var(--danger); border-color: var(--danger); }
.inc-exc-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  font-size: .85rem; color: #475569; line-height: 1.6;
}
.inc-exc-icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; margin-top: 2px; }
.includes .inc-exc-icon { background: rgba(34,197,94,.1); color: var(--success); }
.excludes .inc-exc-icon { background: rgba(239,68,68,.1); color: var(--danger); }

/* ── Payment (4.47.1+ Sprint 6a polish — antes era JSON literal) ── */
.payment-block {
  margin-top: 40px; padding: 28px; background: var(--light);
  border-left: 3px solid var(--gold); font-size: .875rem; color: #475569;
  line-height: 1.85; white-space: pre-line;
}
.payment-grid {
  margin-top: 40px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.payment-item {
  padding: 24px 28px; background: var(--light); border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.payment-item dt {
  font-size: .65rem; letter-spacing: .25em; font-weight: 700;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.payment-item dd {
  margin: 0; font-size: 1rem; font-weight: 500; color: var(--navy);
  line-height: 1.4;
}
.payment-notes {
  margin-top: 20px; padding: 16px 24px; background: rgba(212,168,67,.06);
  border-left: 2px solid rgba(212,168,67,.4); font-size: .85rem;
  color: #4B5563; font-style: italic; line-height: 1.6;
}

/* ── Cancellation ── */
.cancel-table { width: 100%; border-collapse: collapse; margin-top: 32px; }
.cancel-table th {
  padding: 12px 16px; font-size: .6rem; letter-spacing: .2em; font-weight: 700;
  text-transform: uppercase; color: var(--gold); background: var(--light);
  border-bottom: 2px solid rgba(212,168,67,.2); text-align: left;
}
.cancel-table td {
  padding: 12px 16px; font-size: .85rem; color: var(--navy);
  border-bottom: 1px solid rgba(0,0,0,.05);
}

/* ── Accordion (Info) ── */
.accordion { margin-top: 40px; }
.accordion-item { border-bottom: 1px solid rgba(0,0,0,.06); }
.accordion-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 18px 4px; background: none; border: none; cursor: pointer;
  font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600;
  color: var(--navy); text-align: left; transition: color .2s;
}
.accordion-btn:hover { color: var(--gold); }
.accordion-chevron {
  width: 20px; height: 20px; transition: transform .3s; flex-shrink: 0;
}
.accordion-item.open .accordion-chevron { transform: rotate(180deg); }
.accordion-body {
  max-height: 0; overflow: hidden; transition: max-height .4s ease;
}
.accordion-body-inner {
  padding: 0 4px 20px; font-size: .85rem; color: #475569; line-height: 1.8;
  white-space: pre-line;
}

/* ── Footer ── */
.site-footer {
  background: var(--dark); padding: 60px 32px 40px; text-align: center;
}
/* 4.47.2+ (Sprint 6a polish v3) — logo BRANCO no footer (fundo escuro).
   Espelha lógica do Portal: header = logoUrlAlt (escuro), footer = logoUrl (branco).
   Se só houver 1 logo cadastrado, usa o mesmo nos 2 (fallback). */
.footer-logo {
  display: block; max-height: 70px; max-width: 240px; width: auto;
  margin: 0 auto 18px; object-fit: contain;
}
.footer-gold-line { width: 40px; height: 2px; background: var(--gold); margin: 0 auto 18px; }
.footer-brand {
  color: var(--gold); font-size: .75rem; letter-spacing: .35em; font-weight: 600;
  font-family: 'Poppins', sans-serif; text-transform: uppercase;
}
.footer-tagline {
  color: rgba(255,255,255,.45); font-size: .8rem; margin-top: 10px;
  font-style: italic; font-family: 'Poppins', sans-serif;
}

/* 4.47.2+ (Sprint 6a polish v3) — Topbar fixo (igual Portal).
   Logo da área à esquerda (logoUrlAlt — versão escura pra fundo branco),
   título contextual à direita ("ROTEIRO DE VIAGEM" + destinos). */
.site-header {
  position: fixed; top: 0; left: 0; right: 0; height: 64px;
  padding: 0 24px; z-index: 50;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid rgba(0,0,0,.06);
  display: flex; align-items: center; gap: 16px;
  transition: background .2s, border-color .2s, box-shadow .2s;
  overflow: visible;
}
.site-header.scrolled {
  background: rgba(255,255,255,.98);
  border-bottom-color: rgba(0,0,0,.1);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.header-home {
  display: flex; align-items: center; justify-content: center;
  height: 56px; padding: 0 8px; background: none; border: none;
  cursor: pointer; text-decoration: none; border-radius: 6px;
  flex-shrink: 0; margin-top: -4px; margin-bottom: -4px;
  transition: background .15s;
}
.header-home:hover { background: var(--light); }
.header-home img { height: 56px; max-width: 220px; object-fit: contain; display: block; }
.header-home .home-fallback {
  font-size: .65rem; letter-spacing: .25em; font-weight: 700;
  color: var(--navy); text-transform: uppercase;
}
.header-title {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  align-items: flex-end; gap: 2px; text-align: right;
}
.header-brand {
  font-size: .65rem; letter-spacing: .25em; font-weight: 700;
  color: var(--gold); text-transform: uppercase; white-space: nowrap;
}
.header-dest {
  font-size: .875rem; font-weight: 600; color: var(--navy);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
/* body precisa de padding-top quando header é fixo */
body.has-header { padding-top: 64px; }
@media (max-width: 640px) {
  .site-header { height: 56px; padding: 0 16px; }
  .header-home img { height: 48px; max-width: 140px; }
  body.has-header { padding-top: 56px; }
  .header-brand { font-size: .55rem; }
  .header-dest { font-size: .75rem; }
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .hero-content { padding: 60px 28px 40px; }
  .content-wrap { padding: 0 16px; }
  .section { padding: 56px 0; }
  .inc-exc-grid { grid-template-columns: 1fr; gap: 40px; }
  .hotels-grid { grid-template-columns: 1fr; }
  .timeline { padding-left: 40px; }
  .timeline::before { left: 14px; }
  .day-badge { left: -40px; width: 30px; height: 30px; font-size: .65rem; }
  .day-card { padding: 20px; }
  .sticky-nav { padding: 0 16px; }
  .optionals-table, .cancel-table { font-size: .8rem; }
  .optionals-table th, .optionals-table td,
  .cancel-table th, .cancel-table td { padding: 10px 12px; }
  .price-display { padding: 36px 20px; }
}

@media (max-width: 480px) {
  .hero { min-height: 85vh; }
  .hero-content { padding: 48px 20px 32px; }
  .optionals-table thead { display: none; }
  .optionals-table, .optionals-table tbody, .optionals-table tr, .optionals-table td {
    display: block; width: 100%;
  }
  .optionals-table tr { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
  .optionals-table td {
    padding: 4px 0; border: none; font-size: .8rem;
  }
  .optionals-table td::before {
    content: attr(data-label); display: block;
    font-size: .55rem; letter-spacing: .2em; font-weight: 700;
    text-transform: uppercase; color: var(--gold); margin-bottom: 2px;
  }
  .cancel-table thead { display: none; }
  .cancel-table, .cancel-table tbody, .cancel-table tr, .cancel-table td {
    display: block; width: 100%;
  }
  .cancel-table tr { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
  .cancel-table td {
    padding: 4px 0; border: none;
  }
  .cancel-table td::before {
    content: attr(data-label); display: block;
    font-size: .55rem; letter-spacing: .2em; font-weight: 700;
    text-transform: uppercase; color: var(--gold); margin-bottom: 2px;
  }
}

/* ── Print ── */
@media print {
  .sticky-nav, #loading { display: none !important; }
  .hero { min-height: auto; page-break-after: always; }
  .section { page-break-inside: avoid; }
}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner-ring"></div>
  <div class="brand">PRIMETOUR</div>
</div>

<!-- 4.47.2+ (Sprint 6a polish v3) — Topbar com logo + título contextual,
     espelhando padrão maduro do Portal de Dicas. Render preenchido por JS
     depois do fetch do snapshot (header-brand fixo, header-dest dinâmico). -->
<header class="site-header" id="site-header" style="display:none;">
  <a href="#" class="header-home" id="header-home" aria-label="Voltar ao topo">
    <img id="area-logo" alt="" style="display:none;">
    <span class="home-fallback" id="header-fallback">PRIMETOUR</span>
  </a>
  <div class="header-title">
    <span class="header-brand">Roteiro de Viagem</span>
    <span class="header-dest" id="header-dest"></span>
  </div>
</header>

<!-- App root -->
<div id="app"></div>

<!-- 4.47.2+ Footer com logo branco (logoUrl) + assinatura BU -->
<footer class="site-footer" id="site-footer" style="display:none;">
  <img id="footer-logo" class="footer-logo" alt="" style="display:none;">
  <div class="footer-gold-line" id="footer-gold-line" style="display:none;"></div>
  <div class="footer-brand" id="footer-brand-text"></div>
  <div class="footer-tagline">Experiências exclusivas de viagem</div>
</footer>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './js/config.js';

/* ── Helpers ── */
const esc = s => String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

function fmtDate(d) {
  if (!d) return '';
  try {
    const dt = typeof d === 'string' ? new Date(d) : d.toDate ? d.toDate() : new Date(d);
    return dt.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return String(d); }
}

function fmtCurrency(val, currency) {
  if (val == null) return '';
  try {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: currency || 'BRL' }).format(val);
  } catch {
    return `${currency || 'R$'} ${Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
  }
}

/* ── Firebase ── */
const app = initializeApp(firebaseConfig, 'roteiro-view');
const db = getFirestore(app);

/* ── Main ── */
(async () => {
  const token = location.hash.replace('#', '').trim();
  const appEl = document.getElementById('app');

  if (!token) { showErr(appEl, 'Link invalido', 'Este link nao contem um token de acesso.'); return; }

  let snap;
  try { snap = await getDoc(doc(db, 'roteiro_web_links', token)); }
  catch (e) { showErr(appEl, 'Erro de conexao', 'Nao foi possivel carregar os dados. Tente novamente.'); return; }

  if (!snap.exists()) { showErr(appEl, 'Roteiro nao encontrado', 'Este link pode ter expirado ou sido removido.'); return; }

  const payload = snap.data();
  const roteiro = payload.data || payload.roteiro || payload;
  const area = payload.area || {};

  // Increment view count (fire and forget)
  updateDoc(doc(db, 'roteiro_web_links', token), { viewCount: increment(1) }).catch(() => {});

  // 4.48.0+ (Sprint 6c Phase 4) — usa areaTokens SSO (em vez de setar --gold
  // direto que sobrescrevia chrome do hero). applyAreaTheme aplica:
  //   - cores (--area-primary, --area-secondary)
  //   - fontes (--area-font-headline, --area-font-body) com auto-load Google
  //   - chrome accent pra overlines/lines (sempre branco no hero default)
  // module='roteiros' aplica overrides específicos se houver.
  try {
    const { applyAreaTheme } = await import('./js/services/areaTokens.js');
    applyAreaTheme(area, 'roteiros');
  } catch (e) {
    console.warn('[roteiro-view] applyAreaTheme falhou:', e.message);
    // Fallback legacy: aplica primary/secondary direto
    if (area?.colors?.primary) document.documentElement.style.setProperty('--gold', area.colors.primary);
    if (area?.colors?.secondary) document.documentElement.style.setProperty('--navy', area.colors.secondary);
  }

  // Render
  render(appEl, roteiro, area);

  // Hide loading
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 600);
})();

/* ── Error state ── */
function showErr(container, title, msg) {
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 400);
  container.innerHTML = `
    <div class="error-state">
      <h2>${esc(title)}</h2>
      <p>${esc(msg)}</p>
      <a href="https://primetour.com.br">Voltar para primetour.com.br</a>
    </div>`;
}

/* ── Main Render ── */
function render(container, r, area) {
  const days = r.days || r.dias || [];
  const hotels = r.hotels || r.hoteis || [];
  const pricing = r.pricing || r.precos || {};
  const optionals = r.optionals || r.opcionais || [];
  const includes = r.includes || r.inclui || [];
  const excludes = r.excludes || r.naoInclui || r.exclui || [];
  const payment = r.payment || r.pagamento || '';
  const cancellation = r.cancellation || r.cancelamento || [];
  const info = r.info || r.informacoes || {};
  // 4.42.0+ Sprint 3 — dicas anexas (snapshot do Portal de Dicas)
  const embeddedTips = Array.isArray(r.embeddedTips) ? r.embeddedTips : [];
  // 4.46.2+ Sprint 5 fix — imagens pré-resolvidas no snapshot (banco + Unsplash)
  const enriched = r.enrichedImages || {};
  const heroUrl = enriched.heroUrl || r.images?.hero || null;
  const buName = area?.name || area?.bu || 'PRIMETOUR';

  // Destinations from days
  const destinations = [];
  days.forEach(d => {
    const city = d.city || d.cidade || '';
    if (city && !destinations.includes(city)) destinations.push(city);
  });

  // Duration
  const nDays = days.length;
  const nNights = nDays > 0 ? nDays - 1 : 0;
  const durationText = nDays > 0 ? `${nDays} dia${nDays > 1 ? 's' : ''} / ${nNights} noite${nNights !== 1 ? 's' : ''}` : '';

  // 4.47.0+ (Sprint 6a Phase 2a) — Imagens entre dias quando MUDA de cidade.
  // Função utilitária pra normalizar cityKey (espelha normKey do generator).
  const _norm = (s) => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^\w\s]/g, '').trim();

  // 4.47.0+ (Sprint 6a Phase 2d) — Mapa interativo
  // Mostra apenas se houver cidades/hotéis OU dicas com geo (pinpoint-able).
  const hasMapData = !!(
    (r.travel?.destinations?.length || r.hotels?.length) ||
    embeddedTips.some(emb => {
      const segs = emb?.content?.segments || {};
      return Object.values(segs).some(arr =>
        Array.isArray(arr) && arr.some(it => it?._geo?.lat));
    })
  );

  // Build nav sections
  const navItems = [];
  // 4.47.0+ (Sprint 6a) — labels com acentos corretos (antes eram ASCII).
  if (days.length) navItems.push({ id: 'roteiro', label: 'Roteiro' });
  if (hasMapData) navItems.push({ id: 'mapa', label: 'Mapa' });
  if (hotels.length) navItems.push({ id: 'hoteis', label: 'Hotéis' });
  if (pricing.value || pricing.valor) navItems.push({ id: 'valores', label: 'Valores' });
  if (optionals.length) navItems.push({ id: 'opcionais', label: 'Opcionais' });
  if (includes.length || excludes.length) navItems.push({ id: 'inclui', label: 'Inclui / Não inclui' });
  if (payment) navItems.push({ id: 'pagamento', label: 'Pagamento' });
  if (cancellation.length) navItems.push({ id: 'cancelamento', label: 'Cancelamento' });
  if (Object.keys(info).length) navItems.push({ id: 'informacoes', label: 'Informações' });
  if (embeddedTips.length) navItems.push({ id: 'dicas', label: 'Dicas Locais' });

  container.innerHTML = `
    <!-- Hero -->
    <section class="hero">
      <div class="hero-bg${heroUrl ? ' has-image' : ''}" ${heroUrl ? `style="background-image:url('${esc(heroUrl)}')"` : ''}></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="hero-overline">Roteiro de Viagem</span>
        <h1 class="hero-title serif">${esc(r.title || r.titulo || destinations.join(' · ') || 'Roteiro')}</h1>
        ${destinations.length ? `<p class="hero-destinations">${esc(destinations.join(' · '))}</p>` : ''}
        ${durationText ? `<div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(durationText)}
        </div>` : ''}
        <div class="hero-gold-line"></div>
      </div>
    </section>

    <!-- Navigation -->
    ${navItems.length > 1 ? `<nav class="sticky-nav" id="sticky-nav">
      ${navItems.map((n, i) => `<a href="#sec-${n.id}" class="${i === 0 ? 'active' : ''}">${esc(n.label)}</a>`).join('')}
    </nav>` : ''}

    <div class="content-wrap">

      <!-- Day by Day -->
      ${days.length ? `
      <section class="section" id="sec-roteiro">
        <span class="section-overline">Dia a Dia</span>
        <h2 class="section-title serif">Roteiro Detalhado</h2>
        <p class="section-desc">${esc(destinations.join(', '))} ${durationText ? '&mdash; ' + esc(durationText) : ''}</p>
        <div class="timeline">
          ${(() => {
            // 4.47.0+ (Sprint 6a Phase 2a) — rastreia ULTIMA cidade vista
            // pra inserir banner de imagem CADA VEZ QUE MUDA. Quebra a
            // monotonia visual de 10 dias seguidos só de texto.
            let lastCityKey = null;
            return days.map((day, i) => {
              const dayNum = day.day || day.dia || (i + 1);
              const date = day.date || day.data || '';
              const title = day.title || day.titulo || '';
              const city = day.city || day.cidade || '';
              const narrative = day.narrative || day.narrativa || day.description || day.descricao || '';
              const overnight = day.overnight || day.pernoite || '';
              // 4.47.0+ (Sprint 6a fix) — se title === city, omite a sub-label
              const finalTitle = title || ('Dia ' + dayNum);
              const cityIsRedundant = city && finalTitle &&
                city.toLowerCase().trim() === finalTitle.toLowerCase().trim();

              // Banner de imagem quando muda cidade (e há foto no enriched)
              const cityKey = _norm(city);
              const cityImg = (enriched.byCity && cityKey && enriched.byCity[cityKey]) || null;
              const showCityBanner = city && cityKey !== lastCityKey && cityImg;
              const banner = showCityBanner
                ? `<div class="day-city-banner">
                    <div class="day-city-banner-img" style="background-image:url('${esc(cityImg)}')"></div>
                    <div class="day-city-banner-label">
                      <span class="day-city-banner-overline">Próximo destino</span>
                      <span class="day-city-banner-name serif">${esc(city)}</span>
                    </div>
                  </div>`
                : '';
              if (city) lastCityKey = cityKey;

              return banner + `
            <div class="day-card">
              <div class="day-badge">${esc(dayNum)}</div>
              <div class="day-header">
                ${date ? `<div class="day-date">${esc(fmtDate(date))}</div>` : `<div class="day-date">Dia ${esc(dayNum)}</div>`}
                <h3 class="day-title serif">${esc(finalTitle)}</h3>
                ${city && !cityIsRedundant ? `<div class="day-city">${esc(city)}</div>` : ''}
              </div>
              ${narrative ? `<div class="day-narrative">${esc(narrative)}</div>` : ''}
              ${overnight ? `<div class="day-overnight">
                <svg viewBox="0 0 24 24"><path d="M21 11c0-5-4-9-9-9s-9 4-9 9c0 3.9 2.5 7.2 6 8.5V21h6v-1.5c3.5-1.3 6-4.6 6-8.5zM12 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6z"/></svg>
                Pernoite: ${esc(overnight)}
              </div>` : ''}
            </div>`;
            }).join('');
          })()}
        </div>
      </section>` : ''}

      <!-- 4.47.0+ (Sprint 6a Phase 2d) — Mapa interativo -->
      ${hasMapData ? `
      <section class="section" id="sec-mapa">
        <span class="section-overline">Localização</span>
        <h2 class="section-title serif">Mapa da viagem</h2>
        <p class="section-desc">Cidades, hotéis e dicas marcados no mapa. Clique nos pins pra explorar.</p>
        <div id="roteiro-map" class="roteiro-map-wrap">
          <div class="roteiro-map-placeholder">Carregando mapa...</div>
        </div>
      </section>` : ''}

      <!-- 4.47.0+ (Sprint 6a Phase 2b) — Hotéis: cards visuais com foto + nome + dl
           limpo. Antes era label/value cru ("Cidade: Tóquio"). Agora estilo revista. -->
      ${hotels.length ? `
      <section class="section" id="sec-hoteis">
        <span class="section-overline">Hospedagem</span>
        <h2 class="section-title serif">Hotéis</h2>
        <div class="hotels-grid">
          ${hotels.map((h, idx) => {
            // Compat: schema atual usa hotelName, antigos podiam usar name/nome
            const name = h.hotelName || h.name || h.nome || '';
            const city = h.city || h.cidade || '';
            const category = h.category || h.categoria || '';
            const roomType = h.roomType || h.tipoQuarto || h.acomodacao || '';
            const regime = h.regime || h.mealPlan || '';
            const nights = h.nights || h.noites || '';
            const obs = h.obs || h.observacao || '';
            // 4.47.0+ Foto do hotel via enriched.byHotel[idx] — banco ou Unsplash
            const hotelImg = enriched.byHotel && enriched.byHotel[idx] ? enriched.byHotel[idx] : null;
            return `
            <article class="hotel-card-rich">
              ${hotelImg ? `<div class="hotel-img" style="background-image:url('${esc(hotelImg)}')"></div>`
                         : `<div class="hotel-img hotel-img-empty">${category ? esc(category) : '★★★★★'}</div>`}
              <div class="hotel-body">
                ${category ? `<div class="hotel-cat">${esc(category)}</div>` : ''}
                <h3 class="hotel-name serif">${esc(name || 'Hotel')}</h3>
                ${city ? `<div class="hotel-city">${esc(city)}</div>` : ''}
                <dl class="hotel-dl">
                  ${roomType ? `<dt>Acomodação</dt><dd>${esc(roomType)}</dd>` : ''}
                  ${regime   ? `<dt>Regime</dt><dd>${esc(regime)}</dd>` : ''}
                  ${nights   ? `<dt>Noites</dt><dd>${esc(nights)}</dd>` : ''}
                </dl>
                ${obs ? `<div class="hotel-obs">${esc(obs)}</div>` : ''}
              </div>
            </article>`;
          }).join('')}
        </div>
      </section>` : ''}

      <!-- Pricing -->
      ${(pricing.value || pricing.valor) ? `
      <section class="section" id="sec-valores">
        <span class="section-overline">Investimento</span>
        <h2 class="section-title serif">Valores</h2>
        <div class="price-display">
          <div class="price-currency">${esc(pricing.currency || pricing.moeda || 'BRL')}</div>
          <div class="price-value serif">${esc(fmtCurrency(pricing.value || pricing.valor, pricing.currency || pricing.moeda))}</div>
          ${pricing.per || pricing.por ? `<div class="price-per">${esc(pricing.per || pricing.por)}</div>` : ''}
          ${pricing.validity || pricing.validade ? `<div class="price-validity">Validade: ${esc(pricing.validity || pricing.validade)}</div>` : ''}
        </div>
        ${pricing.disclaimer || pricing.observacao ? `<p class="price-disclaimer">${esc(pricing.disclaimer || pricing.observacao)}</p>` : ''}
      </section>` : ''}

      <!-- Optionals -->
      ${optionals.length ? `
      <section class="section" id="sec-opcionais">
        <span class="section-overline">Serviços Adicionais</span>
        <h2 class="section-title serif">Opcionais</h2>
        <table class="optionals-table">
          <thead><tr>
            <th>Servico</th>
            <th>Descricao</th>
            <th>Valor</th>
          </tr></thead>
          <tbody>
            ${optionals.map(o => {
              const name = o.name || o.nome || o.servico || '';
              const desc = o.description || o.descricao || '';
              const val = o.value || o.valor || o.price || o.preco || '';
              return `<tr>
                <td data-label="Servico">${esc(name)}</td>
                <td data-label="Descricao">${esc(desc)}</td>
                <td data-label="Valor">${esc(val)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </section>` : ''}

      <!-- Includes / Excludes -->
      ${(includes.length || excludes.length) ? `
      <section class="section" id="sec-inclui">
        <span class="section-overline">Detalhamento</span>
        <h2 class="section-title serif">O que está incluso</h2>
        <div class="inc-exc-grid">
          ${includes.length ? `
          <div class="inc-exc-col includes">
            <h3>Inclui</h3>
            ${includes.map(item => {
              const text = typeof item === 'string' ? item : (item.text || item.texto || item.name || item.nome || '');
              return `<div class="inc-exc-item">
                <span class="inc-exc-icon">&check;</span>
                <span>${esc(text)}</span>
              </div>`;
            }).join('')}
          </div>` : ''}
          ${excludes.length ? `
          <div class="inc-exc-col excludes">
            <h3>Nao Inclui</h3>
            ${excludes.map(item => {
              const text = typeof item === 'string' ? item : (item.text || item.texto || item.name || item.nome || '');
              return `<div class="inc-exc-item">
                <span class="inc-exc-icon">&times;</span>
                <span>${esc(text)}</span>
              </div>`;
            }).join('')}
          </div>` : ''}
        </div>
      </section>` : ''}

      <!-- Payment -->
      ${payment ? `
      <section class="section" id="sec-pagamento">
        <span class="section-overline">Condições</span>
        <h2 class="section-title serif">Forma de Pagamento</h2>
        <!-- 4.47.1+ (Sprint 6a polish) — antes renderizava JSON.stringify(payment)
             quando payment era objeto (BUG VISÍVEL pro cliente). Agora extrai
             campos estruturados (deposit/installments/deadline/notes) em
             cards label/value bonitos. Fallback pra string se vier legacy. -->
        ${(() => {
          if (typeof payment === 'string') {
            return `<div class="payment-block">${esc(payment)}</div>`;
          }
          const items = [
            { label: 'Sinal / Depósito', value: payment.deposit },
            { label: 'Parcelamento',     value: payment.installments },
            { label: 'Prazo',            value: payment.deadline },
          ].filter(x => x.value);
          const notes = payment.notes || '';
          return `
            <div class="payment-grid">
              ${items.map(it => `
                <div class="payment-item">
                  <dt>${esc(it.label)}</dt>
                  <dd>${esc(it.value)}</dd>
                </div>
              `).join('')}
            </div>
            ${notes ? `<div class="payment-notes">${esc(notes)}</div>` : ''}
          `;
        })()}
      </section>` : ''}

      <!-- Cancellation -->
      ${cancellation.length ? `
      <section class="section" id="sec-cancelamento">
        <span class="section-overline">Políticas</span>
        <h2 class="section-title serif">Política de Cancelamento</h2>
        <table class="cancel-table">
          <thead><tr>
            <th>Prazo</th>
            <th>Multa / Condição</th>
          </tr></thead>
          <tbody>
            ${cancellation.map(c => {
              const period = typeof c === 'string' ? c : (c.period || c.prazo || c.text || c.texto || '');
              const penalty = typeof c === 'string' ? '' : (c.penalty || c.multa || c.condition || c.condicao || '');
              if (typeof c === 'string') {
                return `<tr><td data-label="Condição" colspan="2">${esc(period)}</td></tr>`;
              }
              return `<tr>
                <td data-label="Prazo">${esc(period)}</td>
                <td data-label="Multa">${esc(penalty)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </section>` : ''}

      <!-- Important Info -->
      ${Object.keys(info).length ? `
      <section class="section" id="sec-informacoes">
        <span class="section-overline">Essencial</span>
        <h2 class="section-title serif">Informações Importantes</h2>
        <div class="accordion">
          ${Object.entries(info).map(([key, val]) => {
            if (!val || (typeof val === 'object' && !Object.keys(val).length)) return '';
            const label = {
              passaporte: 'Passaporte',
              passport: 'Passaporte',
              visto: 'Visto',
              visa: 'Visto',
              vacinas: 'Vacinas',
              vaccines: 'Vacinas',
              moeda: 'Moeda',
              currency: 'Moeda',
              clima: 'Clima',
              climate: 'Clima',
              fuso: 'Fuso Horario',
              timezone: 'Fuso Horario',
              bagagem: 'Bagagem',
              luggage: 'Bagagem',
              seguro: 'Seguro Viagem',
              insurance: 'Seguro Viagem',
              documentos: 'Documentos',
              documents: 'Documentos',
              observacoes: 'Observacoes',
              notes: 'Observacoes',
              geral: 'Informações Gerais',
              general: 'Informações Gerais',
            }[key.toLowerCase()] || key.charAt(0).toUpperCase() + key.slice(1);
            const content = typeof val === 'string' ? val : (val.text || val.texto || JSON.stringify(val, null, 2));
            return `
            <div class="accordion-item">
              <button class="accordion-btn" onclick="this.parentElement.classList.toggle('open');const b=this.nextElementSibling;b.style.maxHeight=b.style.maxHeight?null:b.scrollHeight+'px';">
                <span>${esc(label)}</span>
                <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="accordion-body">
                <div class="accordion-body-inner">${esc(content)}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </section>` : ''}

      <!-- 4.42.0+ Sprint 3: Dicas anexas (Portal de Dicas embed) -->
      ${embeddedTips.length ? `
      <section class="section" id="sec-dicas">
        <span class="section-overline">Recomendações</span>
        <h2 class="section-title serif">Dicas Locais</h2>
        <p class="section-desc">Curadoria de restaurantes, atracoes e experiencias selecionadas pelo seu consultor.</p>
        ${embeddedTips.map(emb => {
          const segments = (emb.content && emb.content.segments) || {};
          const segLabels = {
            informacoes_gerais: 'Informações Gerais', bairros: 'Bairros',
            atracoes: 'Atrações', atracoes_criancas: 'Atrações para Crianças',
            restaurantes: 'Restaurantes', vida_noturna: 'Vida Noturna',
            espetaculos: 'Casas de Espetáculos', compras: 'Compras',
            arredores: 'Arredores', highlights: 'Highlights',
            agenda_cultural: 'Agenda Cultural',
          };
          const segHtml = Object.entries(segments).map(([k, items]) => {
            if (!Array.isArray(items) || !items.length) return '';
            const itemsHtml = items.map(it => {
              if (typeof it === 'string') return `<li>${esc(it)}</li>`;
              if (it && typeof it === 'object') {
                const parts = [];
                if (it.name) parts.push(`<strong>${esc(it.name)}</strong>`);
                if (it.address || it.location) parts.push(esc(it.address || it.location));
                if (it.note || it.description) parts.push(esc(it.note || it.description));
                return `<li>${parts.join(' &middot; ')}</li>`;
              }
              return '';
            }).join('');
            const label = segLabels[k] || k.split('_').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
            return `<div class="dica-segment" style="margin-top:18px;">
              <h4 style="font-size:.875rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:8px;">${esc(label)}</h4>
              <ul style="list-style:none;padding:0;margin:0;">${itemsHtml}</ul>
            </div>`;
          }).join('');
          return `<div class="dica-card" style="background:rgba(248,249,250,.5);border-left:3px solid var(--gold);padding:24px 28px;border-radius:8px;margin-bottom:24px;">
            <h3 class="serif" style="font-size:1.5rem;margin:0 0 4px;">${esc(emb.title || '')}</h3>
            ${emb.subtitle ? `<div style="font-size:.875rem;color:var(--muted);">${esc(emb.subtitle)}</div>` : ''}
            ${segHtml}
          </div>`;
        }).join('')}
      </section>` : ''}

    </div>

    <!-- Footer movido pra fora do app (HTML estático no body) — populado por populateChrome() -->
  `;

  // 4.47.2+ (Sprint 6a polish v3) — popular topbar + footer
  populateChrome(r, area, destinations);

  // Setup nav active tracking
  setupNavTracking();

  // 4.47.0+ (Sprint 6a Phase 2d) — Mapa interativo (async, não-bloqueante)
  if (hasMapData) {
    mountRoteiroMap(r, embeddedTips).catch(e => {
      console.warn('[roteiro-view] map mount fail:', e?.message);
      const el = document.getElementById('roteiro-map');
      if (el) el.innerHTML = '<div class="roteiro-map-placeholder">Não foi possível carregar o mapa.</div>';
    });
  }
}

/**
 * 4.47.2+ (Sprint 6a polish v3) — Popula topbar e footer com logo da área.
 *
 * Lógica de logo (igual Portal de Dicas):
 *   - header tem fundo BRANCO  → usa logoUrlAlt (versão escura/colorida)
 *   - footer tem fundo ESCURO  → usa logoUrl (versão branca)
 *   - se só houver um dos dois, usa o disponível em ambos os lugares
 *
 * Também:
 *   - destino contextual no topbar ("Tóquio · Kioto · Osaka")
 *   - nome da BU em CAPS no footer (quando não há logo branco)
 *   - scroll listener: adiciona .scrolled no header quando ≥30px
 */
function populateChrome(r, area, destinations) {
  const buName = area?.name || area?.bu || 'PRIMETOUR';
  const logoUrl    = area?.logoUrl    || null;  // branco (fundo escuro)
  const logoUrlAlt = area?.logoUrlAlt || null;  // escuro (fundo branco)
  const headerLogo = logoUrlAlt || logoUrl;
  const footerLogo = logoUrl    || logoUrlAlt;

  // ── Topbar ──
  const header = document.getElementById('site-header');
  if (header) {
    if (headerLogo) {
      const img = document.getElementById('area-logo');
      img.src = headerLogo; img.alt = buName; img.style.display = 'block';
      document.getElementById('header-fallback').style.display = 'none';
    } else {
      document.getElementById('header-fallback').textContent = buName;
    }
    const dest = document.getElementById('header-dest');
    if (dest) dest.textContent = destinations.join(' · ');
    header.style.display = 'flex';
    document.body.classList.add('has-header');
    // Scroll shadow
    const onScroll = () => header.classList.toggle('scrolled', window.scrollY > 30);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    document.getElementById('header-home')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ── Footer ──
  const footer = document.getElementById('site-footer');
  if (footer) {
    if (footerLogo) {
      const img = document.getElementById('footer-logo');
      img.src = footerLogo; img.alt = buName; img.style.display = 'block';
      // Quando tem logo visual, esconde gold-line + texto BU (logo já fala)
      document.getElementById('footer-gold-line').style.display = 'none';
      document.getElementById('footer-brand-text').style.display = 'none';
    } else {
      // Sem logo: mostra divisor gold + nome BU em CAPS (fallback)
      document.getElementById('footer-gold-line').style.display = 'block';
      const bt = document.getElementById('footer-brand-text');
      bt.textContent = buName;
      bt.style.display = 'block';
    }
    footer.style.display = 'block';
  }
}

/**
 * 4.47.0+ (Sprint 6a Phase 2d) — Renderiza mapa Leaflet com 3 tipos de pin:
 *   - 🌍 cidades (do travel.destinations)
 *   - 🏨 hotéis (do hotels[])
 *   - 💡 dicas (items das embeddedTips com _geo)
 *
 * Geocoding de cidades/hotéis em RUNTIME via Nominatim (1 req/seg, sem key).
 * Cache em sessionStorage pra não re-geocodar a cada view.
 *
 * Items das embeddedTips: usa `_geo` se já vier do snapshot (Portal geocodou
 * antes do anexo). Sem _geo, item NÃO entra no mapa (sem fallback — Nominatim
 * de items é responsabilidade do Portal pré-anexo).
 */
async function mountRoteiroMap(r, embeddedTips) {
  const container = document.getElementById('roteiro-map');
  if (!container) return;

  // Carrega Leaflet sob demanda
  if (typeof L === 'undefined') {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.integrity = 'sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=';
      s.crossOrigin = '';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  /* Geocoding com cache (sessionStorage + in-memory) */
  const geoCache = new Map();
  const geocode = async (query) => {
    if (!query) return null;
    const key = String(query).toLowerCase().trim();
    if (geoCache.has(key)) return geoCache.get(key);
    // sessionStorage scope tab — evita re-fetch em F5
    try {
      const stored = sessionStorage.getItem('geo:' + key);
      if (stored) { const g = JSON.parse(stored); geoCache.set(key, g); return g; }
    } catch {}
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('nominatim status ' + res.status);
      const arr = await res.json();
      if (!arr.length) { geoCache.set(key, null); return null; }
      const g = { lat: parseFloat(arr[0].lat), lng: parseFloat(arr[0].lon) };
      geoCache.set(key, g);
      try { sessionStorage.setItem('geo:' + key, JSON.stringify(g)); } catch {}
      // Nominatim TOS: 1 req/seg — pausa antes da próxima
      await new Promise(r => setTimeout(r, 1100));
      return g;
    } catch (e) {
      console.warn('[map] geocode fail:', query, e.message);
      geoCache.set(key, null);
      return null;
    }
  };

  /* Coleta pins */
  const pins = []; // { lat, lng, label, type, addr? }

  // 1) Cidades do travel.destinations
  const destinations = r.travel?.destinations || [];
  for (const d of destinations) {
    if (!d.city) continue;
    const q = `${d.city}${d.country ? ', ' + d.country : ''}`;
    const g = await geocode(q);
    if (g) pins.push({ ...g, label: d.city, type: 'city', addr: d.country || '' });
  }

  // 2) Hotéis (hotelName + city pra precisão)
  const hotels = r.hotels || [];
  for (let i = 0; i < hotels.length; i++) {
    const h = hotels[i];
    if (!h.hotelName && !h.city) continue;
    const q = `${h.hotelName || ''}${h.city ? ', ' + h.city : ''}`.trim();
    const g = await geocode(q);
    if (g) pins.push({ ...g, label: h.hotelName || `Hotel ${i+1}`, type: 'hotel', addr: h.city || '' });
  }

  // 3) Dicas embedded (só items com _geo já calculado pelo Portal)
  for (const emb of embeddedTips || []) {
    const segs = emb?.content?.segments || {};
    for (const [segKey, items] of Object.entries(segs)) {
      if (!Array.isArray(items)) continue;
      for (const it of items) {
        if (!it?._geo?.lat || !it?._geo?.lng) continue;
        const title = it.titulo || it.title || it.name || '';
        if (!title) continue;
        pins.push({
          lat: it._geo.lat, lng: it._geo.lng,
          label: title, type: 'tip',
          addr: it.endereco || it.address || it.location || '',
        });
      }
    }
  }

  if (!pins.length) {
    container.innerHTML = '<div class="roteiro-map-placeholder">Sem coordenadas pra exibir no mapa.</div>';
    return;
  }

  /* Render Leaflet */
  container.innerHTML = ''; // limpa placeholder
  const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
  const map = L.map(container, {
    scrollWheelZoom: false,
    zoomControl: true,
    attributionControl: true,
  }).fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
  // 4.47.2+ (Sprint 6a polish v3) — tiles do CartoDB Voyager.
  // OpenStreetMap padrão mostra nomes na LÍNGUA LOCAL (Japão = japonês,
  // China = chinês) — inutilizável pra cliente brasileiro. CartoDB Voyager
  // usa alfabeto LATIM globalmente quando disponível (preserva nomes locais
  // mas em transliteração legível). Mesmas tiles que Mapbox Streets básico,
  // sem precisar de token.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap · © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const ICON_LABEL = { city: '·', hotel: '★', tip: '✓' };
  pins.forEach((p) => {
    const icon = L.divIcon({
      className: 'map-pin-wrapper',
      html: `<div class="map-pin ${p.type}"><span>${ICON_LABEL[p.type] || '·'}</span></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
    const catLabel = p.type === 'city' ? 'Cidade' : p.type === 'hotel' ? 'Hotel' : 'Dica';
    const gm = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
    m.bindPopup(`
      <div class="map-popup-cat">${esc(catLabel)}</div>
      <div class="map-popup-title">${esc(p.label)}</div>
      ${p.addr ? `<div class="map-popup-addr">${esc(p.addr)}</div>` : ''}
      <a href="${gm}" target="_blank" rel="noopener" style="
        display:inline-flex;align-items:center;gap:6px;margin-top:8px;
        padding:6px 12px;background:var(--navy);color:#fff;
        border-radius:99px;font-size:11px;font-weight:600;text-decoration:none;">
        ↗ Abrir no Google Maps
      </a>
    `);
  });

  // Click reativa scrollwheel
  container.addEventListener('click', () => map.scrollWheelZoom.enable(), { once: true });
}

/* ── Nav scroll tracking ── */
function setupNavTracking() {
  const nav = document.getElementById('sticky-nav');
  if (!nav) return;
  const links = nav.querySelectorAll('a');
  const sections = [];
  links.forEach(a => {
    const id = a.getAttribute('href')?.replace('#', '');
    const el = document.getElementById(id);
    if (el) sections.push({ el, link: a });
  });
  if (!sections.length) return;

  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(a => a.classList.remove('active'));
        const match = sections.find(s => s.el === entry.target);
        if (match) match.link.classList.add('active');
      }
    });
  }, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });

  sections.forEach(s => io.observe(s.el));

  // Smooth scroll on click
  links.forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const id = a.getAttribute('href')?.replace('#', '');
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}
</script>
