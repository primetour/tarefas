<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roteiro de Viagem · PRIMETOUR</title>
  <meta name="description" content="Roteiro de viagem personalizado PRIMETOUR">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --gold: #D4A843;
  --navy: #1A1A2E;
  --dark: #0A1628;
  --white: #FFFFFF;
  --light: #F8F9FA;
  --muted: #94A3B8;
  --success: #22C55E;
  --danger: #EF4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--white);
  color: var(--navy);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, .serif { font-family: 'Cormorant Garamond', serif; }

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; background: var(--dark);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; z-index: 9999; transition: opacity .6s;
}
#loading .brand {
  color: var(--gold); font-size: .8rem; letter-spacing: .4em; font-weight: 300;
  font-family: 'Outfit', sans-serif; text-transform: uppercase;
}
.spinner-ring {
  width: 44px; height: 44px;
  border: 2px solid rgba(212,168,67,.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error ── */
.error-state {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 40px; text-align: center;
  background: var(--dark); color: var(--muted);
}
.error-state h2 { color: var(--gold); font-size: 1.75rem; font-weight: 600; font-family: 'Cormorant Garamond', serif; }
.error-state a { color: var(--gold); text-decoration: none; font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; margin-top: 8px; }
.error-state a:hover { text-decoration: underline; }

/* ── Hero ── */
.hero {
  position: relative; width: 100%; min-height: 100vh; display: flex;
  align-items: flex-end; overflow: hidden; background: var(--dark);
}
.hero-bg {
  position: absolute; inset: 0; background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(10,22,40,.95) 0%, rgba(10,22,40,.4) 40%, rgba(10,22,40,.1) 100%);
}
.hero-content {
  position: relative; padding: 80px 48px 60px; max-width: 900px; z-index: 2;
}
.hero-overline {
  display: inline-block; font-size: .65rem; letter-spacing: .45em; font-weight: 500;
  color: var(--gold); text-transform: uppercase; margin-bottom: 20px;
  font-family: 'Outfit', sans-serif; opacity: 0; animation: fadeUp .8s .3s forwards;
}
.hero-title {
  font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 700; color: var(--white);
  line-height: 1.05; letter-spacing: -.02em;
  opacity: 0; animation: fadeUp .8s .5s forwards;
}
.hero-destinations {
  font-size: clamp(1.1rem, 3vw, 1.5rem); color: rgba(255,255,255,.7);
  margin-top: 16px; font-weight: 300; font-family: 'Outfit', sans-serif;
  opacity: 0; animation: fadeUp .8s .7s forwards;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 32px; padding: 10px 24px;
  background: rgba(212,168,67,.12); border: 1px solid rgba(212,168,67,.25);
  color: var(--gold); font-size: .75rem; letter-spacing: .1em; font-weight: 500;
  font-family: 'Outfit', sans-serif;
  opacity: 0; animation: fadeUp .8s .9s forwards;
}
.hero-gold-line {
  width: 60px; height: 2px; background: var(--gold); margin-top: 40px;
  opacity: 0; animation: fadeUp .8s 1.1s forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Navigation ── */
.sticky-nav {
  position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.95);
  backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,.06);
  overflow-x: auto; display: flex; gap: 0; padding: 0 32px;
  scrollbar-width: none;
}
.sticky-nav::-webkit-scrollbar { display: none; }
.sticky-nav a {
  flex: none; padding: 18px 20px; font-size: .65rem; letter-spacing: .18em;
  font-weight: 600; text-transform: uppercase; text-decoration: none;
  color: var(--muted); white-space: nowrap; border-bottom: 2px solid transparent;
  transition: all .2s; font-family: 'Outfit', sans-serif;
}
.sticky-nav a:hover, .sticky-nav a.active {
  color: var(--navy); border-bottom-color: var(--gold);
}

/* ── Sections ── */
.content-wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
.section { padding: 80px 0; }
.section + .section { border-top: 1px solid rgba(0,0,0,.05); }
.section-overline {
  font-size: .6rem; letter-spacing: .4em; font-weight: 600; color: var(--gold);
  text-transform: uppercase; margin-bottom: 8px; display: block;
  font-family: 'Outfit', sans-serif;
}
.section-title {
  font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; color: var(--navy);
  line-height: 1.15;
}
.section-desc {
  font-size: .95rem; color: var(--muted); margin-top: 12px; line-height: 1.7;
  max-width: 700px;
}

/* ── Timeline (Day by Day) ── */
.timeline { position: relative; padding-left: 48px; margin-top: 48px; }
.timeline::before {
  content: ''; position: absolute; left: 18px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(to bottom, var(--gold), rgba(212,168,67,.15));
}
.day-card {
  position: relative; margin-bottom: 40px; background: var(--white);
  border: 1px solid rgba(0,0,0,.06); padding: 28px 28px 24px;
  transition: box-shadow .3s;
}
.day-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.06); }
.day-badge {
  position: absolute; left: -48px; top: 24px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gold); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; font-family: 'Outfit', sans-serif;
  box-shadow: 0 0 0 4px var(--white);
}
.day-header { margin-bottom: 16px; }
.day-date {
  font-size: .65rem; letter-spacing: .2em; color: var(--gold);
  text-transform: uppercase; font-weight: 600; margin-bottom: 4px;
}
.day-title {
  font-size: 1.35rem; font-weight: 700; color: var(--navy); line-height: 1.25;
}
.day-city {
  font-size: .8rem; color: var(--muted); margin-top: 4px; font-weight: 400;
}
.day-narrative {
  font-size: .9rem; color: #475569; line-height: 1.85; white-space: pre-line;
}
.day-overnight {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 16px; padding: 6px 14px;
  background: rgba(212,168,67,.08); border-left: 3px solid var(--gold);
  font-size: .75rem; color: var(--navy); font-weight: 500;
}
.day-overnight svg { width: 14px; height: 14px; fill: var(--gold); flex-shrink: 0; }

/* ── Hotels ── */
.hotels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 40px; }
.hotel-card {
  background: var(--white); border: 1px solid rgba(0,0,0,.06); padding: 24px;
  transition: box-shadow .3s;
}
.hotel-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.06); }
.hotel-cat {
  font-size: .55rem; letter-spacing: .3em; font-weight: 700; color: var(--gold);
  text-transform: uppercase; margin-bottom: 8px;
}
.hotel-name { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
.hotel-detail { font-size: .8rem; color: var(--muted); line-height: 1.6; }
.hotel-detail strong { color: var(--navy); font-weight: 600; }

/* ── Pricing ── */
.price-display {
  text-align: center; padding: 48px 32px; margin-top: 40px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--dark) 100%);
  color: var(--white);
}
.price-currency { font-size: .8rem; letter-spacing: .2em; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
.price-value { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; font-family: 'Cormorant Garamond', serif; color: var(--white); }
.price-per { font-size: .85rem; color: rgba(255,255,255,.5); margin-top: 4px; }
.price-validity { font-size: .75rem; color: rgba(255,255,255,.4); margin-top: 16px; }
.price-disclaimer { font-size: .75rem; color: var(--muted); margin-top: 20px; line-height: 1.7; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center; }

/* ── Optionals ── */
.optionals-table { width: 100%; border-collapse: collapse; margin-top: 32px; }
.optionals-table th {
  padding: 12px 16px; font-size: .6rem; letter-spacing: .2em; font-weight: 700;
  text-transform: uppercase; color: var(--gold); background: var(--light);
  border-bottom: 2px solid rgba(212,168,67,.2); text-align: left;
}
.optionals-table td {
  padding: 12px 16px; font-size: .85rem; color: var(--navy);
  border-bottom: 1px solid rgba(0,0,0,.05);
}
.optionals-table tr:hover td { background: rgba(248,249,250,.6); }

/* ── Includes / Excludes ── */
.inc-exc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 40px; }
.inc-exc-col h3 {
  font-size: .65rem; letter-spacing: .3em; font-weight: 700;
  text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid;
}
.inc-exc-col.includes h3 { color: var(--success); border-color: var(--success); }
.inc-exc-col.excludes h3 { color: var(--danger); border-color: var(--danger); }
.inc-exc-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  font-size: .85rem; color: #475569; line-height: 1.6;
}
.inc-exc-icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; margin-top: 2px; }
.includes .inc-exc-icon { background: rgba(34,197,94,.1); color: var(--success); }
.excludes .inc-exc-icon { background: rgba(239,68,68,.1); color: var(--danger); }

/* ── Payment ── */
.payment-block {
  margin-top: 40px; padding: 28px; background: var(--light);
  border-left: 3px solid var(--gold); font-size: .875rem; color: #475569;
  line-height: 1.85; white-space: pre-line;
}

/* ── Cancellation ── */
.cancel-table { width: 100%; border-collapse: collapse; margin-top: 32px; }
.cancel-table th {
  padding: 12px 16px; font-size: .6rem; letter-spacing: .2em; font-weight: 700;
  text-transform: uppercase; color: var(--gold); background: var(--light);
  border-bottom: 2px solid rgba(212,168,67,.2); text-align: left;
}
.cancel-table td {
  padding: 12px 16px; font-size: .85rem; color: var(--navy);
  border-bottom: 1px solid rgba(0,0,0,.05);
}

/* ── Accordion (Info) ── */
.accordion { margin-top: 40px; }
.accordion-item { border-bottom: 1px solid rgba(0,0,0,.06); }
.accordion-btn {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 18px 4px; background: none; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: .9rem; font-weight: 600;
  color: var(--navy); text-align: left; transition: color .2s;
}
.accordion-btn:hover { color: var(--gold); }
.accordion-chevron {
  width: 20px; height: 20px; transition: transform .3s; flex-shrink: 0;
}
.accordion-item.open .accordion-chevron { transform: rotate(180deg); }
.accordion-body {
  max-height: 0; overflow: hidden; transition: max-height .4s ease;
}
.accordion-body-inner {
  padding: 0 4px 20px; font-size: .85rem; color: #475569; line-height: 1.8;
  white-space: pre-line;
}

/* ── Footer ── */
.site-footer {
  background: var(--dark); padding: 60px 32px; text-align: center;
}
.footer-gold-line { width: 40px; height: 2px; background: var(--gold); margin: 0 auto 24px; }
.footer-brand {
  color: var(--gold); font-size: .75rem; letter-spacing: .35em; font-weight: 600;
  font-family: 'Outfit', sans-serif; text-transform: uppercase;
}
.footer-tagline {
  color: rgba(255,255,255,.3); font-size: .8rem; margin-top: 10px;
  font-style: italic; font-family: 'Cormorant Garamond', serif;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .hero-content { padding: 60px 28px 40px; }
  .content-wrap { padding: 0 16px; }
  .section { padding: 56px 0; }
  .inc-exc-grid { grid-template-columns: 1fr; gap: 40px; }
  .hotels-grid { grid-template-columns: 1fr; }
  .timeline { padding-left: 40px; }
  .timeline::before { left: 14px; }
  .day-badge { left: -40px; width: 30px; height: 30px; font-size: .65rem; }
  .day-card { padding: 20px; }
  .sticky-nav { padding: 0 16px; }
  .optionals-table, .cancel-table { font-size: .8rem; }
  .optionals-table th, .optionals-table td,
  .cancel-table th, .cancel-table td { padding: 10px 12px; }
  .price-display { padding: 36px 20px; }
}

@media (max-width: 480px) {
  .hero { min-height: 85vh; }
  .hero-content { padding: 48px 20px 32px; }
  .optionals-table thead { display: none; }
  .optionals-table, .optionals-table tbody, .optionals-table tr, .optionals-table td {
    display: block; width: 100%;
  }
  .optionals-table tr { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
  .optionals-table td {
    padding: 4px 0; border: none; font-size: .8rem;
  }
  .optionals-table td::before {
    content: attr(data-label); display: block;
    font-size: .55rem; letter-spacing: .2em; font-weight: 700;
    text-transform: uppercase; color: var(--gold); margin-bottom: 2px;
  }
  .cancel-table thead { display: none; }
  .cancel-table, .cancel-table tbody, .cancel-table tr, .cancel-table td {
    display: block; width: 100%;
  }
  .cancel-table tr { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
  .cancel-table td {
    padding: 4px 0; border: none;
  }
  .cancel-table td::before {
    content: attr(data-label); display: block;
    font-size: .55rem; letter-spacing: .2em; font-weight: 700;
    text-transform: uppercase; color: var(--gold); margin-bottom: 2px;
  }
}

/* ── Print ── */
@media print {
  .sticky-nav, #loading { display: none !important; }
  .hero { min-height: auto; page-break-after: always; }
  .section { page-break-inside: avoid; }
}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner-ring"></div>
  <div class="brand">PRIMETOUR</div>
</div>

<!-- App root -->
<div id="app"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './js/config.js';

/* ── Helpers ── */
const esc = s => String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

function fmtDate(d) {
  if (!d) return '';
  try {
    const dt = typeof d === 'string' ? new Date(d) : d.toDate ? d.toDate() : new Date(d);
    return dt.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  } catch { return String(d); }
}

function fmtCurrency(val, currency) {
  if (val == null) return '';
  try {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: currency || 'BRL' }).format(val);
  } catch {
    return `${currency || 'R$'} ${Number(val).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
  }
}

/* ── Firebase ── */
const app = initializeApp(firebaseConfig, 'roteiro-view');
const db = getFirestore(app);

/* ── Main ── */
(async () => {
  const token = location.hash.replace('#', '').trim();
  const appEl = document.getElementById('app');

  if (!token) { showErr(appEl, 'Link invalido', 'Este link nao contem um token de acesso.'); return; }

  let snap;
  try { snap = await getDoc(doc(db, 'roteiro_web_links', token)); }
  catch (e) { showErr(appEl, 'Erro de conexao', 'Nao foi possivel carregar os dados. Tente novamente.'); return; }

  if (!snap.exists()) { showErr(appEl, 'Roteiro nao encontrado', 'Este link pode ter expirado ou sido removido.'); return; }

  const payload = snap.data();
  const roteiro = payload.data || payload.roteiro || payload;
  const area = payload.area || {};

  // Increment view count (fire and forget)
  updateDoc(doc(db, 'roteiro_web_links', token), { viewCount: increment(1) }).catch(() => {});

  // Apply area colors
  if (area?.colors?.primary) document.documentElement.style.setProperty('--gold', area.colors.primary);
  if (area?.colors?.secondary) document.documentElement.style.setProperty('--navy', area.colors.secondary);

  // Render
  render(appEl, roteiro, area);

  // Hide loading
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 600);
})();

/* ── Error state ── */
function showErr(container, title, msg) {
  const loading = document.getElementById('loading');
  loading.style.opacity = '0';
  setTimeout(() => loading.style.display = 'none', 400);
  container.innerHTML = `
    <div class="error-state">
      <h2>${esc(title)}</h2>
      <p>${esc(msg)}</p>
      <a href="https://primetour.com.br">Voltar para primetour.com.br</a>
    </div>`;
}

/* ── Main Render ── */
function render(container, r, area) {
  const days = r.days || r.dias || [];
  const hotels = r.hotels || r.hoteis || [];
  const pricing = r.pricing || r.precos || {};
  const optionals = r.optionals || r.opcionais || [];
  const includes = r.includes || r.inclui || [];
  const excludes = r.excludes || r.naoInclui || r.exclui || [];
  const payment = r.payment || r.pagamento || '';
  const cancellation = r.cancellation || r.cancelamento || [];
  const info = r.info || r.informacoes || {};
  const buName = area?.name || area?.bu || 'PRIMETOUR';

  // Destinations from days
  const destinations = [];
  days.forEach(d => {
    const city = d.city || d.cidade || '';
    if (city && !destinations.includes(city)) destinations.push(city);
  });

  // Duration
  const nDays = days.length;
  const nNights = nDays > 0 ? nDays - 1 : 0;
  const durationText = nDays > 0 ? `${nDays} dia${nDays > 1 ? 's' : ''} / ${nNights} noite${nNights !== 1 ? 's' : ''}` : '';

  // Build nav sections
  const navItems = [];
  if (days.length) navItems.push({ id: 'roteiro', label: 'Roteiro' });
  if (hotels.length) navItems.push({ id: 'hoteis', label: 'Hoteis' });
  if (pricing.value || pricing.valor) navItems.push({ id: 'valores', label: 'Valores' });
  if (optionals.length) navItems.push({ id: 'opcionais', label: 'Opcionais' });
  if (includes.length || excludes.length) navItems.push({ id: 'inclui', label: 'Inclui / Nao Inclui' });
  if (payment) navItems.push({ id: 'pagamento', label: 'Pagamento' });
  if (cancellation.length) navItems.push({ id: 'cancelamento', label: 'Cancelamento' });
  if (Object.keys(info).length) navItems.push({ id: 'informacoes', label: 'Informacoes' });

  container.innerHTML = `
    <!-- Hero -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <span class="hero-overline">Roteiro de Viagem</span>
        <h1 class="hero-title serif">${esc(r.title || r.titulo || destinations.join(' · ') || 'Roteiro')}</h1>
        ${destinations.length ? `<p class="hero-destinations">${esc(destinations.join(' &middot; '))}</p>` : ''}
        ${durationText ? `<div class="hero-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${esc(durationText)}
        </div>` : ''}
        <div class="hero-gold-line"></div>
      </div>
    </section>

    <!-- Navigation -->
    ${navItems.length > 1 ? `<nav class="sticky-nav" id="sticky-nav">
      ${navItems.map((n, i) => `<a href="#sec-${n.id}" class="${i === 0 ? 'active' : ''}">${esc(n.label)}</a>`).join('')}
    </nav>` : ''}

    <div class="content-wrap">

      <!-- Day by Day -->
      ${days.length ? `
      <section class="section" id="sec-roteiro">
        <span class="section-overline">Dia a Dia</span>
        <h2 class="section-title serif">Roteiro Detalhado</h2>
        <p class="section-desc">${esc(destinations.join(', '))} ${durationText ? '&mdash; ' + esc(durationText) : ''}</p>
        <div class="timeline">
          ${days.map((day, i) => {
            const dayNum = day.day || day.dia || (i + 1);
            const date = day.date || day.data || '';
            const title = day.title || day.titulo || '';
            const city = day.city || day.cidade || '';
            const narrative = day.narrative || day.narrativa || day.description || day.descricao || '';
            const overnight = day.overnight || day.pernoite || '';
            return `
            <div class="day-card">
              <div class="day-badge">${esc(dayNum)}</div>
              <div class="day-header">
                ${date ? `<div class="day-date">${esc(fmtDate(date))}</div>` : `<div class="day-date">Dia ${esc(dayNum)}</div>`}
                <h3 class="day-title serif">${esc(title || 'Dia ' + dayNum)}</h3>
                ${city ? `<div class="day-city">${esc(city)}</div>` : ''}
              </div>
              ${narrative ? `<div class="day-narrative">${esc(narrative)}</div>` : ''}
              ${overnight ? `<div class="day-overnight">
                <svg viewBox="0 0 24 24"><path d="M21 11c0-5-4-9-9-9s-9 4-9 9c0 3.9 2.5 7.2 6 8.5V21h6v-1.5c3.5-1.3 6-4.6 6-8.5zM12 4c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6 2.7-6 6-6z"/></svg>
                Pernoite: ${esc(overnight)}
              </div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </section>` : ''}

      <!-- Hotels -->
      ${hotels.length ? `
      <section class="section" id="sec-hoteis">
        <span class="section-overline">Hospedagem</span>
        <h2 class="section-title serif">Hoteis</h2>
        <div class="hotels-grid">
          ${hotels.map(h => {
            const name = h.name || h.nome || '';
            const city = h.city || h.cidade || '';
            const category = h.category || h.categoria || '';
            const roomType = h.roomType || h.tipoQuarto || h.acomodacao || '';
            const regime = h.regime || h.mealPlan || '';
            const nights = h.nights || h.noites || '';
            const obs = h.obs || h.observacao || '';
            return `
            <div class="hotel-card">
              ${category ? `<div class="hotel-cat">${esc(category)}</div>` : ''}
              <div class="hotel-name">${esc(name)}</div>
              ${city ? `<div class="hotel-detail"><strong>Cidade:</strong> ${esc(city)}</div>` : ''}
              ${roomType ? `<div class="hotel-detail"><strong>Acomodacao:</strong> ${esc(roomType)}</div>` : ''}
              ${regime ? `<div class="hotel-detail"><strong>Regime:</strong> ${esc(regime)}</div>` : ''}
              ${nights ? `<div class="hotel-detail"><strong>Noites:</strong> ${esc(nights)}</div>` : ''}
              ${obs ? `<div class="hotel-detail" style="margin-top:8px;font-style:italic;color:var(--muted);">${esc(obs)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </section>` : ''}

      <!-- Pricing -->
      ${(pricing.value || pricing.valor) ? `
      <section class="section" id="sec-valores">
        <span class="section-overline">Investimento</span>
        <h2 class="section-title serif">Valores</h2>
        <div class="price-display">
          <div class="price-currency">${esc(pricing.currency || pricing.moeda || 'BRL')}</div>
          <div class="price-value serif">${esc(fmtCurrency(pricing.value || pricing.valor, pricing.currency || pricing.moeda))}</div>
          ${pricing.per || pricing.por ? `<div class="price-per">${esc(pricing.per || pricing.por)}</div>` : ''}
          ${pricing.validity || pricing.validade ? `<div class="price-validity">Validade: ${esc(pricing.validity || pricing.validade)}</div>` : ''}
        </div>
        ${pricing.disclaimer || pricing.observacao ? `<p class="price-disclaimer">${esc(pricing.disclaimer || pricing.observacao)}</p>` : ''}
      </section>` : ''}

      <!-- Optionals -->
      ${optionals.length ? `
      <section class="section" id="sec-opcionais">
        <span class="section-overline">Servicos Adicionais</span>
        <h2 class="section-title serif">Opcionais</h2>
        <table class="optionals-table">
          <thead><tr>
            <th>Servico</th>
            <th>Descricao</th>
            <th>Valor</th>
          </tr></thead>
          <tbody>
            ${optionals.map(o => {
              const name = o.name || o.nome || o.servico || '';
              const desc = o.description || o.descricao || '';
              const val = o.value || o.valor || o.price || o.preco || '';
              return `<tr>
                <td data-label="Servico">${esc(name)}</td>
                <td data-label="Descricao">${esc(desc)}</td>
                <td data-label="Valor">${esc(val)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </section>` : ''}

      <!-- Includes / Excludes -->
      ${(includes.length || excludes.length) ? `
      <section class="section" id="sec-inclui">
        <span class="section-overline">Detalhamento</span>
        <h2 class="section-title serif">O que esta incluso</h2>
        <div class="inc-exc-grid">
          ${includes.length ? `
          <div class="inc-exc-col includes">
            <h3>Inclui</h3>
            ${includes.map(item => {
              const text = typeof item === 'string' ? item : (item.text || item.texto || item.name || item.nome || '');
              return `<div class="inc-exc-item">
                <span class="inc-exc-icon">&check;</span>
                <span>${esc(text)}</span>
              </div>`;
            }).join('')}
          </div>` : ''}
          ${excludes.length ? `
          <div class="inc-exc-col excludes">
            <h3>Nao Inclui</h3>
            ${excludes.map(item => {
              const text = typeof item === 'string' ? item : (item.text || item.texto || item.name || item.nome || '');
              return `<div class="inc-exc-item">
                <span class="inc-exc-icon">&times;</span>
                <span>${esc(text)}</span>
              </div>`;
            }).join('')}
          </div>` : ''}
        </div>
      </section>` : ''}

      <!-- Payment -->
      ${payment ? `
      <section class="section" id="sec-pagamento">
        <span class="section-overline">Condicoes</span>
        <h2 class="section-title serif">Forma de Pagamento</h2>
        <div class="payment-block">${esc(typeof payment === 'string' ? payment : (payment.text || payment.texto || JSON.stringify(payment)))}</div>
      </section>` : ''}

      <!-- Cancellation -->
      ${cancellation.length ? `
      <section class="section" id="sec-cancelamento">
        <span class="section-overline">Politicas</span>
        <h2 class="section-title serif">Politica de Cancelamento</h2>
        <table class="cancel-table">
          <thead><tr>
            <th>Prazo</th>
            <th>Multa / Condicao</th>
          </tr></thead>
          <tbody>
            ${cancellation.map(c => {
              const period = typeof c === 'string' ? c : (c.period || c.prazo || c.text || c.texto || '');
              const penalty = typeof c === 'string' ? '' : (c.penalty || c.multa || c.condition || c.condicao || '');
              if (typeof c === 'string') {
                return `<tr><td data-label="Condicao" colspan="2">${esc(period)}</td></tr>`;
              }
              return `<tr>
                <td data-label="Prazo">${esc(period)}</td>
                <td data-label="Multa">${esc(penalty)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </section>` : ''}

      <!-- Important Info -->
      ${Object.keys(info).length ? `
      <section class="section" id="sec-informacoes">
        <span class="section-overline">Essencial</span>
        <h2 class="section-title serif">Informacoes Importantes</h2>
        <div class="accordion">
          ${Object.entries(info).map(([key, val]) => {
            if (!val || (typeof val === 'object' && !Object.keys(val).length)) return '';
            const label = {
              passaporte: 'Passaporte',
              passport: 'Passaporte',
              visto: 'Visto',
              visa: 'Visto',
              vacinas: 'Vacinas',
              vaccines: 'Vacinas',
              moeda: 'Moeda',
              currency: 'Moeda',
              clima: 'Clima',
              climate: 'Clima',
              fuso: 'Fuso Horario',
              timezone: 'Fuso Horario',
              bagagem: 'Bagagem',
              luggage: 'Bagagem',
              seguro: 'Seguro Viagem',
              insurance: 'Seguro Viagem',
              documentos: 'Documentos',
              documents: 'Documentos',
              observacoes: 'Observacoes',
              notes: 'Observacoes',
              geral: 'Informacoes Gerais',
              general: 'Informacoes Gerais',
            }[key.toLowerCase()] || key.charAt(0).toUpperCase() + key.slice(1);
            const content = typeof val === 'string' ? val : (val.text || val.texto || JSON.stringify(val, null, 2));
            return `
            <div class="accordion-item">
              <button class="accordion-btn" onclick="this.parentElement.classList.toggle('open');const b=this.nextElementSibling;b.style.maxHeight=b.style.maxHeight?null:b.scrollHeight+'px';">
                <span>${esc(label)}</span>
                <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="accordion-body">
                <div class="accordion-body-inner">${esc(content)}</div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </section>` : ''}

    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-gold-line"></div>
      <div class="footer-brand">${esc(buName)}</div>
      <div class="footer-tagline">Experiencias exclusivas de viagem</div>
    </footer>
  `;

  // Setup nav active tracking
  setupNavTracking();
}

/* ── Nav scroll tracking ── */
function setupNavTracking() {
  const nav = document.getElementById('sticky-nav');
  if (!nav) return;
  const links = nav.querySelectorAll('a');
  const sections = [];
  links.forEach(a => {
    const id = a.getAttribute('href')?.replace('#', '');
    const el = document.getElementById(id);
    if (el) sections.push({ el, link: a });
  });
  if (!sections.length) return;

  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(a => a.classList.remove('active'));
        const match = sections.find(s => s.el === entry.target);
        if (match) match.link.classList.add('active');
      }
    });
  }, { threshold: 0.2, rootMargin: '-80px 0px -60% 0px' });

  sections.forEach(s => io.observe(s.el));

  // Smooth scroll on click
  links.forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const id = a.getAttribute('href')?.replace('#', '');
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}
</script>
