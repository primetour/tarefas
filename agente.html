<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A1628" />
  <meta name="robots" content="noindex" />
  <title>Agente IA · PRIMETOUR</title>

  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="permissions-policy" content="camera=(), microphone=(self), geolocation=()" />

  <!-- CSP -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://accounts.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https:;
    media-src   'self' blob:;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://www.gstatic.com
                https://firestore.googleapis.com https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com
                https://api.groq.com https://api.openai.com https://api.anthropic.com
                https://generativelanguage.googleapis.com
                https://primetour-images.rene-castro.workers.dev
                https://login.microsoftonline.com https://login.live.com https://graph.microsoft.com
                https://speed.cloudflare.com
                https://oauth2.googleapis.com https://content.googleapis.com https://www.googleapis.com;
    frame-src   'self' https://*.firebaseapp.com https://login.microsoftonline.com https://login.live.com https://accounts.google.com;
    object-src  'none';
    base-uri    'self';
  " />

  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --brand: #2563EB;
      --brand-dark: #1E40AF;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #0F172A;
      --text-muted: #64748B;
      --border: rgba(15,23,42,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }
    .container { max-width: 920px; margin: 0 auto; padding: 0 16px; }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      padding: 60px 16px 50px;
      text-align: center;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
      color: white;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
    .hero-avatar {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 4px solid rgba(255,255,255,0.30);
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      margin-bottom: 18px;
      background: rgba(255,255,255,0.10);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .hero-name {
      font-size: 2.25rem; font-weight: 700; margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .hero-tagline {
      font-size: 1.0625rem; font-weight: 400; opacity: 0.92;
      margin: 0 0 18px;
    }
    .hero-meta {
      display: inline-flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      font-size: 0.75rem; opacity: 0.85;
    }
    .hero-chip {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px; border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    /* ─── DESCRIPTION SECTION ─── */
    .info {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 30px 24px 20px;
      margin-top: -28px;
      position: relative;
      box-shadow: 0 -4px 16px rgba(15,23,42,0.04);
    }
    .info-desc {
      font-size: 1rem; line-height: 1.65; color: var(--text);
      margin: 0 0 20px; text-align: center;
      max-width: 640px; margin-left: auto; margin-right: auto;
    }
    .info-prompts {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .info-prompt {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 14px; font-size: 0.875rem; cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .info-prompt:hover {
      background: var(--brand); color: white; border-color: var(--brand);
      transform: translateY(-1px);
    }

    /* ─── CHAT ─── */
    .chat-section {
      background: var(--surface);
      padding: 0 24px 24px;
      min-height: 50vh;
    }
    .chat-msgs {
      display: flex; flex-direction: column; gap: 12px;
      padding: 24px 0;
    }
    .msg {
      max-width: 85%; padding: 12px 16px; border-radius: 14px;
      font-size: 0.9375rem; line-height: 1.6; white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg-user {
      background: var(--brand); color: white;
      align-self: flex-end; border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.20);
    }
    .msg-assistant {
      background: var(--bg); color: var(--text);
      align-self: flex-start; border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-loading { color: var(--text-muted); font-style: italic; align-self: flex-start; }

    .chat-input-wrap {
      position: sticky; bottom: 0;
      background: var(--surface);
      padding: 12px 0 16px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    .chat-attached {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .chat-chip {
      background: var(--bg); padding: 4px 10px; border-radius: 12px;
      font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border);
    }
    .chat-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 1rem; padding: 0; line-height: 1;
    }
    .chat-input-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; padding: 12px 14px; border-radius: 12px;
      border: 1.5px solid var(--border);
      font-family: inherit; font-size: 0.9375rem; line-height: 1.5;
      resize: none; min-height: 48px; max-height: 200px;
      background: var(--surface); color: var(--text);
    }
    .chat-input:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }
    .icon-btn {
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text);
      padding: 11px 13px; border-radius: 12px; cursor: pointer;
      font-size: 1.125rem; transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--brand); color: white; border-color: var(--brand); }
    .icon-btn.recording { background: #EF4444; color: white; border-color: #EF4444; animation: pulse 1.2s infinite; }
    @keyframes pulse { 50% { opacity: 0.6; } }
    .send-btn {
      background: var(--brand); color: white; border: none; border-radius: 12px;
      padding: 12px 22px; cursor: pointer; font-weight: 600; font-size: 0.9375rem;
      transition: background 0.15s;
    }
    .send-btn:hover { background: var(--brand-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center; padding: 20px 16px 30px;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .footer-brand {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); text-decoration: none;
    }
    .footer-brand:hover { color: var(--text); }

    /* ─── LOGIN ─── */
    .login-wrap {
      max-width: 360px; margin: 80px auto;
      padding: 32px; background: var(--surface);
      border-radius: 16px; box-shadow: 0 4px 24px rgba(15,23,42,0.08);
      text-align: center;
    }
    .login-wrap h2 { margin: 0 0 6px; font-size: 1.25rem; color: var(--text); }
    .login-wrap p { font-size: 0.875rem; color: var(--text-muted); margin: 0 0 20px; }
    .login-input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; font-size: 0.875rem;
    }

    /* ─── ERROR ─── */
    .err {
      max-width: 480px; margin: 80px auto;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.4);
      color: #B91C1C; padding: 24px; border-radius: 12px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .hero { padding: 40px 16px 30px; }
      .hero-name { font-size: 1.625rem; }
      .hero-avatar { width: 80px; height: 80px; font-size: 2.25rem; }
      .info { padding: 24px 16px 16px; }
      .chat-section { padding: 0 16px 16px; }
      .msg { max-width: 92%; font-size: 0.875rem; }
    }
  </style>
</head>
<body>

<div id="app-root">
  <div class="login-wrap">
    <div style="font-size:2.5rem;margin-bottom:12px;">⏳</div>
    <h2>Carregando...</h2>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signInWithPopup, OAuthProvider, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, getDoc, getDocs, query, where, collection, limit, addDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB9DUjqmEIcMIcb5RumidSVXSxF4CO_Ii8",
    authDomain: "gestor-de-tarefas-primetour.firebaseapp.com",
    projectId: "gestor-de-tarefas-primetour",
    storageBucket: "gestor-de-tarefas-primetour.firebasestorage.app",
    messagingSenderId: "1083421353313",
    appId: "1:1083421353313:web:f9656ce6ae0fc4ca24d120",
  };
  // Usa MESMO nome do app principal pra compartilhar auth state via IndexedDB
  // (login no app principal = logado aqui sem re-autenticar)
  const app = initializeApp(firebaseConfig, 'primetour-main');
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let agent = null;
  let history = [];
  let pendingFiles = [];
  let recording = false;
  let recognition = null;

  const params = new URLSearchParams(location.search);
  const slug = params.get('slug') || '';
  const agentId = params.get('id') || '';

  if (!slug && !agentId) {
    showError('Link inválido — informe ?slug=meu-agente ou ?id=xxx na URL.');
  } else {
    onAuthStateChanged(auth, async (user) => {
      if (!user) { renderLogin(); return; }
      try {
        agent = await loadAgent();
        if (!agent) return showError('Agente não encontrado.');
        if (!agent.active) return showError('Este agente está pausado.');
        if (!agent.triggers?.publicChat?.enabled) return showError('Este agente não está disponível como página pública. Acesse pelo IA Hub.');
        renderSite();
      } catch (e) { showError('Erro: ' + e.message); }
    });
  }

  async function loadAgent() {
    if (agentId) {
      const snap = await getDoc(doc(db, 'ai_agents', agentId));
      return snap.exists() ? { id: snap.id, ...snap.data() } : null;
    }
    if (slug) {
      const snap = await getDocs(query(
        collection(db, 'ai_agents'),
        where('triggers.publicChat.slug', '==', slug),
        limit(1),
      ));
      if (snap.empty) return null;
      return { id: snap.docs[0].id, ...snap.docs[0].data() };
    }
    return null;
  }

  function escape(s) {
    return String(s||'').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showError(msg) {
    document.getElementById('app-root').innerHTML = `
      <div class="err">
        <div style="font-size:2.5rem;margin-bottom:12px;">⚠</div>
        <h3 style="margin:0 0 6px;">${escape(msg)}</h3>
        <p style="font-size:0.875rem;margin:0;color:var(--text-muted);">Verifique o link ou contate o administrador.</p>
      </div>
    `;
  }

  function renderLogin() {
    document.getElementById('app-root').innerHTML = `
      <div class="login-wrap">
        <div style="font-size:2.5rem;margin-bottom:12px;">🔒</div>
        <h2>Faça login para conversar</h2>
        <p>Use sua conta corporativa Primetour<br>
          <span style="font-size:0.75rem;color:var(--text-muted);">@primetour.com.br · @primetravel.tur.br · @primetouroperator.com.br</span>
        </p>
        <button class="send-btn" id="login-ms" style="width:100%;margin-bottom:12px;">Entrar com Microsoft</button>
        <details style="text-align:left;">
          <summary style="cursor:pointer;font-size:0.8125rem;color:var(--text-muted);text-align:center;">Ou entrar com e-mail/senha</summary>
          <input class="login-input" id="login-email" type="email" placeholder="seu@email.com" />
          <input class="login-input" id="login-pwd" type="password" placeholder="senha" />
          <button class="send-btn" id="login-pwd-btn" style="width:100%;">Entrar</button>
          <div id="login-err" style="color:#EF4444;font-size:0.75rem;margin-top:8px;text-align:center;"></div>
        </details>
      </div>
    `;
    document.getElementById('login-ms').addEventListener('click', async () => {
      try {
        const provider = new OAuthProvider('microsoft.com');
        provider.setCustomParameters({ tenant: 'organizations', prompt: 'login' });
        await signInWithPopup(auth, provider);
      } catch (e) {
        document.getElementById('login-err').textContent = e.message;
      }
    });
    document.getElementById('login-pwd-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const pwd = document.getElementById('login-pwd').value;
      try { await signInWithEmailAndPassword(auth, email, pwd); }
      catch (e) { document.getElementById('login-err').textContent = e.message; }
    });
  }

  /* ═══════════════════════════════════════════
   * MICROSITE COMPLETO DO AGENTE
   * Hero + descrição + prompts sugeridos + chat
   * ═══════════════════════════════════════════ */
  function renderSite() {
    const site = agent.site || {};
    const brand = site.brandColor || '#2563EB';
    const showAv = site.showAvatar !== false;
    const showBranding = site.showBranding !== false;

    // Override CSS vars com cor do agente
    document.documentElement.style.setProperty('--brand', brand);
    document.documentElement.style.setProperty('--brand-dark', shadeColor(brand, -15));

    const tagline = site.tagline || agent.description || `Converse com ${agent.name}`;

    document.title = `${agent.name} · PRIMETOUR`;

    const avatarHtml = showAv && agent.avatarUrl
      ? `<img class="hero-avatar" src="${escape(agent.avatarUrl)}" alt="${escape(agent.name)}" />`
      : showAv
        ? `<div class="hero-avatar">${escape(agent.icon || '◈')}</div>`
        : '';

    const promptsHtml = (site.suggestedPrompts || []).filter(p => p && p.trim()).slice(0, 6).map(p =>
      `<button class="info-prompt" data-prompt="${escape(p)}">${escape(p)}</button>`
    ).join('');

    document.getElementById('app-root').innerHTML = `
      <header class="hero">
        <div class="hero-inner">
          ${avatarHtml}
          <h1 class="hero-name">${escape(agent.name)}</h1>
          <p class="hero-tagline">${escape(tagline)}</p>
          <div class="hero-meta">
            <span class="hero-chip">⚡ ${escape(agent.provider)}</span>
            <span class="hero-chip">${escape(agent.model || '')}</span>
            ${agent.knowledgeIds?.length || agent.knowledgeSources?.length
              ? `<span class="hero-chip">📚 com base de conhecimento</span>` : ''}
            ${agent.allowWebSearch ? '<span class="hero-chip">🌐 acesso à web</span>' : ''}
          </div>
        </div>
      </header>

      <main class="container">
        <section class="info">
          ${site.welcomeMessage
            ? `<p class="info-desc">${escape(site.welcomeMessage)}</p>`
            : agent.description
              ? `<p class="info-desc">${escape(agent.description)}</p>` : ''}
          ${promptsHtml ? `<div class="info-prompts">${promptsHtml}</div>` : ''}
        </section>

        <section class="chat-section">
          <div class="chat-msgs" id="chat-msgs"></div>
          <div class="chat-input-wrap">
            <div class="chat-attached" id="chat-attached"></div>
            <div class="chat-input-row">
              <button class="icon-btn" id="attach-btn" title="Anexar arquivo">📎</button>
              <input type="file" id="file-input" accept="image/*,.pdf,.txt,.md,.json,.csv" multiple style="display:none;" />
              <button class="icon-btn" id="mic-btn" title="Falar (Web Speech)">🎙</button>
              <textarea class="chat-input" id="chat-input" rows="1" placeholder="Pergunte algo a ${escape(agent.name)}..."></textarea>
              <button class="send-btn" id="send-btn">Enviar</button>
            </div>
          </div>
        </section>
      </main>

      ${showBranding ? `<footer class="footer">
        <a href="https://primetour.com.br" target="_blank" class="footer-brand">
          ${escape(site.footerText || 'Powered by PRIMETOUR')}
        </a>
      </footer>` : ''}
    `;

    bindControls();
  }

  /** Escurece/clareia hex color */
  function shadeColor(color, percent) {
    const f = parseInt(color.slice(1), 16);
    const t = percent < 0 ? 0 : 255;
    const p = Math.abs(percent) / 100;
    const R = f >> 16, G = (f >> 8) & 0x00FF, B = f & 0x0000FF;
    return '#' + (0x1000000 +
      (Math.round((t - R) * p) + R) * 0x10000 +
      (Math.round((t - G) * p) + G) * 0x100 +
      (Math.round((t - B) * p) + B)).toString(16).slice(1);
  }

  function bindControls() {
    const input = document.getElementById('chat-input');
    const send = document.getElementById('send-btn');
    document.getElementById('attach-btn').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', handleFiles);
    document.getElementById('mic-btn').addEventListener('click', toggleVoice);
    send.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(200, input.scrollHeight) + 'px';
    });
    document.querySelectorAll('.info-prompt').forEach(btn =>
      btn.addEventListener('click', () => {
        input.value = btn.dataset.prompt;
        sendMessage();
      }));
  }

  async function handleFiles(e) {
    const files = Array.from(e.target.files || []);
    for (const f of files) {
      if (f.size > 4 * 1024 * 1024) { alert(`${f.name}: máx 4MB.`); continue; }
      const isText = f.type.startsWith('text/') || /\.(md|txt|json|csv)$/i.test(f.name);
      let content = isText ? await f.text() : `[${f.type}, ${(f.size/1024).toFixed(1)} KB]`;
      if (content.length > 30000) content = content.slice(0, 30000) + '\n[... truncado ...]';
      pendingFiles.push({ name: f.name, type: f.type, content });
    }
    e.target.value = '';
    renderAttachedChips();
  }

  function renderAttachedChips() {
    const wrap = document.getElementById('chat-attached');
    wrap.innerHTML = pendingFiles.map((f, i) =>
      `<span class="chat-chip">📎 ${escape(f.name)} <button data-i="${i}">×</button></span>`).join('');
    wrap.querySelectorAll('button').forEach(b =>
      b.addEventListener('click', () => {
        pendingFiles.splice(parseInt(b.dataset.i), 1); renderAttachedChips();
      }));
  }

  function toggleVoice() {
    const btn = document.getElementById('mic-btn');
    if (recording) { try { recognition?.stop(); } catch {} recording = false; btn.classList.remove('recording'); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Reconhecimento de voz não suportado neste navegador.'); return; }
    recognition = new SR();
    recognition.lang = 'pt-BR'; recognition.continuous = true; recognition.interimResults = true;
    recognition.onresult = (e) => {
      const input = document.getElementById('chat-input');
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      input.value = (input.value.replace(/⏳.*$/, '') + final + (interim ? ' ⏳' + interim : '')).trim();
    };
    recognition.onend = () => {
      recording = false; btn.classList.remove('recording');
      const i = document.getElementById('chat-input');
      i.value = i.value.replace(/⏳.*$/, '').trim();
    };
    recognition.start(); recording = true; btn.classList.add('recording');
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const send = document.getElementById('send-btn');
    let text = input.value.replace(/⏳.*$/, '').trim();
    if (!text && !pendingFiles.length) return;

    let augmented = text;
    if (pendingFiles.length) {
      augmented += '\n\n=== ARQUIVOS ANEXADOS ===\n';
      pendingFiles.forEach(f => { augmented += `\n--- ${f.name} ---\n${f.content}\n`; });
    }

    appendMsg('user', text + (pendingFiles.length ? `\n\n📎 ${pendingFiles.length} arquivo(s)` : ''));
    input.value = ''; input.style.height = 'auto';
    pendingFiles = []; renderAttachedChips();
    send.disabled = true;
    const loading = appendMsg('loading', '⏳ ' + agent.name + ' pensando...');

    try {
      const aiModule = await import('./js/services/ai.js');
      let systemPrompt = agent.systemPrompt || '';
      if (agent.knowledgeIds?.length) {
        const docs = await aiModule.loadKnowledgeContents(agent.knowledgeIds);
        if (docs.length) {
          systemPrompt += '\n\n=== BASE DE CONHECIMENTO ===\n';
          docs.forEach(d => systemPrompt += `### ${d.title}\n${d.content}\n\n`);
        }
      }
      const result = await aiModule.chatWithAI(augmented, {}, {
        moduleId: agent.module || 'general',
        provider: agent.provider, model: agent.model,
        maxTokens: agent.limits?.maxTokensPerRun || 2048,
        temperature: agent.limits?.temperature ?? 0.3,
        systemPromptOverride: systemPrompt,
        history,
        skipLog: true,
      });
      loading.remove();
      appendMsg('assistant', result.text || '(resposta vazia)');
      history.push({ role: 'user', text: augmented });
      history.push({ role: 'assistant', text: result.text });
      try {
        await addDoc(collection(db, 'ai_usage_logs'), {
          agentId: agent.id, agentName: agent.name,
          module: agent.module, provider: agent.provider, model: agent.model,
          inputTokens: result.inputTokens || 0, outputTokens: result.outputTokens || 0,
          userId: auth.currentUser?.uid || null,
          source: 'public-site', timestamp: serverTimestamp(),
        });
      } catch {}
    } catch (e) {
      loading.remove();
      appendMsg('assistant', '❌ Erro: ' + e.message);
    } finally {
      send.disabled = false; input.focus();
    }
  }

  function appendMsg(role, text) {
    const body = document.getElementById('chat-msgs');
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.textContent = text;
    body.appendChild(div);
    body.scrollIntoView({ block: 'end', behavior: 'smooth' });
    return div;
  }
</script>

</body>
</html>
