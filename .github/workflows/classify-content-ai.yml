name: Classify Newsletter Content via AI Agent (shadow mode)

# v4.49.41+ Shadow mode do classificador IA.
#
# Roda 15min APÓS o classify-content.js determinístico (06:30 UTC).
# Lê o agente nl-content-classifier do Firestore — se estiver pausado
# no IA Hub (active=false), o script sai sem fazer nada (kill switch
# soft, sem precisar desabilitar este workflow).
#
# Grava em campos PARALELOS (extracted.aiCommercial/aiTourism/...),
# NUNCA toca em extracted.commercial/tourism de produção.

# v4.49.44+ Least-privilege: workflow só precisa de checkout (contents:read).
# Sem permissões de write em contents, actions, packages ou outros escopos.
# Defesa contra script comprometido tentar push código malicioso.
permissions:
  contents: read

# Lock: previne 2 corridas simultâneas (cron + workflow_dispatch manual,
# ou 2 manuais sobrepostas). Sem isto poderia duplicar audit logs e
# estourar rate limits do Anthropic.
concurrency:
  group: classify-content-ai
  cancel-in-progress: false  # deixa a corrida atual terminar; rejeita a nova

on:
  schedule:
    # 06h45 UTC (3h45 BR) — 15min depois do enrich-content.yml
    - cron: '45 6 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry-run (não grava no Firestore)'
        required: false
        type: boolean
        default: false
      force:
        description: 'Force — reclassifica TUDO ignorando aiClassifiedAt'
        required: false
        type: boolean
        default: false
      limit:
        description: 'Limit (vazio = todos) — útil pra teste'
        required: false
        type: string
        default: ''
      verbose:
        description: 'Verbose — loga cada doc'
        required: false
        type: boolean
        default: false

jobs:
  classify-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin
        working-directory: scripts
      # Smoke tests das funções puras ANTES de chamar a API.
      # Se algo quebrar em parseClaudeJson/validateOutput/buildPayload/cost,
      # falha rápido sem queimar tokens.
      - name: Run smoke tests
        run: node classify-content-ai.test.js
        working-directory: scripts
      - name: Classify via AI agent (shadow mode)
        env:
          FIREBASE_PROJECT_ID:   ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          # v4.49.44+ security audit: inputs passados como env vars (não
          # interpolados direto em bash) pra prevenir shell injection.
          # GitHub Actions sanitiza secrets/inputs em env, mas a referência
          # ${{ ... }} no script bash é literal e vulnerable.
          INPUT_DRY:     ${{ github.event.inputs.dry }}
          INPUT_FORCE:   ${{ github.event.inputs.force }}
          INPUT_VERBOSE: ${{ github.event.inputs.verbose }}
          INPUT_LIMIT:   ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail
          args=()
          if [ "${INPUT_DRY:-}"     = "true" ]; then args+=(--dry); fi
          if [ "${INPUT_FORCE:-}"   = "true" ]; then args+=(--force); fi
          if [ "${INPUT_VERBOSE:-}" = "true" ]; then args+=(--verbose); fi
          # Validação: --limit aceita apenas dígitos (defesa contra injection)
          if [ -n "${INPUT_LIMIT:-}" ]; then
            if [[ ! "$INPUT_LIMIT" =~ ^[0-9]+$ ]]; then
              echo "❌ Input 'limit' deve ser numérico. Recebido: $INPUT_LIMIT"; exit 1
            fi
            args+=(--limit="$INPUT_LIMIT")
          fi
          node classify-content-ai.js "${args[@]}"
        working-directory: scripts
