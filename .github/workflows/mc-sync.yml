name: Sync Marketing Cloud

on:
  schedule:
    # Roda todo dia às 6h UTC (3h de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite trigger manual pelo GitHub Actions UI
    inputs:
      days:
        description: 'Quantos dias para sincronizar (padrão: 90)'
        required: false
        default: '90'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch firebase-admin
        working-directory: scripts

      - name: Run Marketing Cloud sync
        env:
          MC_CLIENT_ID:     ${{ secrets.MC_CLIENT_ID }}
          MC_CLIENT_SECRET: ${{ secrets.MC_CLIENT_SECRET }}
          MC_AUTH_URL:      ${{ secrets.MC_AUTH_URL }}
          MC_REST_URL:      ${{ secrets.MC_REST_URL }}
          FIREBASE_PROJECT_ID:       ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL:     ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY:      ${{ secrets.FIREBASE_PRIVATE_KEY }}
          SYNC_DAYS: ${{ github.event.inputs.days || '90' }}
        run: node mc-sync.js
        working-directory: scripts
