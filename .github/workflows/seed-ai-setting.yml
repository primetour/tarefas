name: Seed AI Settings

on:
  workflow_dispatch:
    inputs:
      meta_token:
        description: Token Meta Instagram
        required: false
        default: ''
      ig_id_primetour:
        description: IG User ID primetourviagens
        required: false
        default: ''
      ig_id_ics:
        description: IG User ID icsbyprimetour
        required: false
        default: ''
      li_org_id:
        description: LinkedIn Organization ID
        required: false
        default: ''

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install firebase-admin

      - name: Run seed
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          META_TOKEN: ${{ github.event.inputs.meta_token }}
          IG_ID_PRIMETOUR: ${{ github.event.inputs.ig_id_primetour }}
          IG_ID_ICS: ${{ github.event.inputs.ig_id_ics }}
          LI_ORG_ID: ${{ github.event.inputs.li_org_id }}
        run: node scripts/ai-settings-seed.js
