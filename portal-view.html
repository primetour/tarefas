<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicas de Viagem · PRIMETOUR</title>
  <meta name="description" content="Material de viagem personalizado gerado pelo Portal de Dicas PRIMETOUR">
  <style>
    :root {
      --gold:    #D4A843;
      --dark:    #0F1624;
      --surface: #151E2E;
      --border:  #2A3650;
      --text:    #E2E8F0;
      --muted:   #8899B8;
      --radius:  10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--dark); color: var(--text);
      min-height: 100vh; line-height: 1.6;
    }

    /* ── Header ── */
    .site-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .site-header .logo { color: var(--gold); font-weight: 800; font-size: 1rem; letter-spacing: .05em; }
    .site-header .badge {
      font-size: 0.6875rem; padding: 2px 8px; border-radius: 20px;
      background: var(--gold)22; color: var(--gold);
      border: 1px solid var(--gold)44; font-weight: 600;
    }
    .site-header .area-logo { height: 28px; object-fit: contain; margin-left: auto; }

    /* ── Layout ── */
    .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }

    /* ── Destination title ── */
    .dest-title {
      font-size: 2rem; font-weight: 800; color: var(--gold);
      margin-bottom: 4px; line-height: 1.2;
    }
    .dest-subtitle { font-size: 0.9375rem; color: var(--muted); margin-bottom: 32px; }

    /* ── Segment ── */
    .segment-block { margin-bottom: 40px; }
    .segment-heading {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--gold);
      border-bottom: 2px solid var(--gold)30;
      padding-bottom: 8px; margin-bottom: 18px;
    }

    /* ── Info Geral ── */
    .info-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 16px;
    }
    .info-cell {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
    }
    .info-cell .label { font-size: 0.6875rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .info-cell .value { font-size: 0.9375rem; font-weight: 500; }

    /* ── Clima ── */
    .clima-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; overflow-x: auto; display: block; }
    .clima-table th, .clima-table td { padding: 7px 10px; text-align: center; border: 1px solid var(--border); }
    .clima-table th { background: var(--surface); color: var(--muted); font-weight: 600; font-size: 0.6875rem; }
    .clima-table .row-label { text-align: left; font-weight: 600; white-space: nowrap; color: var(--muted); }
    .clima-table .max { color: #F97316; }
    .clima-table .min { color: #38BDF8; }

    /* ── Representação ── */
    .rep-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin-top: 16px;
    }
    .rep-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--gold); margin-bottom: 10px; }

    /* ── Simple list ── */
    .simple-item { padding: 10px 0; border-bottom: 1px solid var(--border)88; }
    .simple-item:last-child { border-bottom: none; }
    .simple-item .si-title { font-weight: 600; font-size: 0.9375rem; margin-bottom: 4px; }
    .simple-item .si-desc  { font-size: 0.875rem; color: var(--muted); }

    /* ── Place item ── */
    .place-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px;
    }
    .place-item .pi-cat { font-size: 0.6875rem; color: var(--gold); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .place-item .pi-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .place-item .pi-desc  { font-size: 0.875rem; color: var(--muted); margin-bottom: 10px; line-height: 1.6; }
    .place-item .pi-details { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.8125rem; color: var(--muted); }
    .place-item .pi-details a { color: var(--gold); text-decoration: none; }
    .place-item .pi-details a:hover { text-decoration: underline; }
    .place-item .pi-obs { margin-top: 8px; font-size: 0.8125rem; color: var(--muted); font-style: italic; }
    .place-item .pi-period { font-size: 0.8125rem; color: var(--gold); margin-bottom: 6px; }

    .theme-desc { font-size: 0.9375rem; color: var(--muted); font-style: italic; margin-bottom: 16px; line-height: 1.6; }

    /* ── Dest divider ── */
    .dest-divider { border: none; border-top: 1px solid var(--border); margin: 48px 0; }

    /* ── Footer ── */
    .site-footer {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 20px 24px; text-align: center;
      font-size: 0.8125rem; color: var(--muted);
    }
    .site-footer strong { color: var(--gold); }

    /* ── States ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state h2 { color: var(--gold); margin-bottom: 10px; }

    /* ── Scroll nav ── */
    .seg-nav {
      position: sticky; top: 57px; background: var(--dark);
      border-bottom: 1px solid var(--border); z-index: 99;
      display: flex; gap: 0; overflow-x: auto; padding: 0 20px;
    }
    .seg-nav a {
      padding: 10px 14px; font-size: 0.8125rem; color: var(--muted);
      text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .seg-nav a:hover, .seg-nav a.active { color: var(--gold); border-bottom-color: var(--gold); }

    @media (max-width: 600px) {
      .dest-title { font-size: 1.5rem; }
      .info-grid  { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <span class="logo">PRIMETOUR</span>
  <span class="badge">Portal de Dicas</span>
  <img id="area-logo-img" class="area-logo" style="display:none;" alt="">
</header>

<nav class="seg-nav" id="seg-nav" style="display:none;"></nav>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:0.9375rem;">Carregando dica…</div>
  </div>
</div>

<footer class="site-footer">
  Material gerado pelo <strong>Portal de Dicas PRIMETOUR</strong> ·
  Conteúdo exclusivo para viajantes ·
  <span id="footer-date"></span>
</footer>

<script type="module">
  import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getFirestore, doc, getDoc, updateDoc, increment }
    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { FIREBASE_CONFIG } from './js/config.js';

  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  const token  = window.location.hash.slice(1);
  const appEl  = document.getElementById('app');
  const navEl  = document.getElementById('seg-nav');

  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('pt-BR', { year:'numeric', month:'long' });

  if (!token) {
    showError('Link inválido', 'Este link não contém um token de acesso.');
    throw new Error('no token');
  }

  const snap = await getDoc(doc(db, 'portal_web_links', token));
  if (!snap.exists()) {
    showError('Link não encontrado', 'Este link pode ter expirado ou foi removido.');
    throw new Error('not found');
  }

  const linkData = snap.data();
  await updateDoc(doc(db, 'portal_web_links', token), { views: increment(1) });

  // Area logo
  if (linkData.areaLogoUrl) {
    const img = document.getElementById('area-logo-img');
    img.src = linkData.areaLogoUrl; img.style.display = 'block';
  }

  const allTips  = linkData.tipData || [];
  const segments = linkData.segments || [];
  const colors   = linkData.colors   || {};
  if (colors.primary) {
    document.documentElement.style.setProperty('--gold', colors.primary);
  }

  // Build nav
  const SEGMENTS = [
    { key:'informacoes_gerais', label:'Informações Gerais' },
    { key:'bairros',            label:'Bairros'            },
    { key:'atracoes',           label:'Atrações'           },
    { key:'atracoes_criancas',  label:'Atrações para Crianças' },
    { key:'restaurantes',       label:'Restaurantes'       },
    { key:'vida_noturna',       label:'Vida Noturna'       },
    { key:'espetaculos',        label:'Casas de Espetáculos' },
    { key:'compras',            label:'Compras'            },
    { key:'arredores',          label:'Arredores'          },
    { key:'highlights',         label:'Highlights'         },
    { key:'agenda_cultural',    label:'Agenda Cultural'    },
  ];

  const activeSeg = segments.filter(k =>
    allTips.some(({ tip }) => tip?.segments?.[k])
  );

  if (activeSeg.length > 1) {
    navEl.style.display = 'flex';
    activeSeg.forEach(k => {
      const seg = SEGMENTS.find(s => s.key === k);
      const a   = document.createElement('a');
      a.href      = `#seg-${k}`;
      a.textContent = seg?.label || k;
      a.id = `nav-${k}`;
      navEl.appendChild(a);
    });
  }

  // Render
  appEl.innerHTML = allTips.map(({ tip, dest }, idx) => {
    const label  = [dest?.city, dest?.country, dest?.continent].filter(Boolean).join(', ');
    const parts  = [];

    for (const segKey of segments) {
      const segDef = SEGMENTS.find(s => s.key === segKey);
      const data   = tip?.segments?.[segKey];
      if (!segDef || !data) continue;

      const segHtml = renderSegment(segDef, data);
      if (!segHtml) continue;

      parts.push(`
        <div class="segment-block" id="seg-${segKey}">
          <div class="segment-heading">${esc(segDef.label)}</div>
          ${segHtml}
        </div>
      `);
    }

    return `
      <div class="container">
        <h1 class="dest-title">${esc(dest?.city || dest?.country || '—')}</h1>
        <p class="dest-subtitle">${esc([dest?.country, dest?.continent].filter(Boolean).join(' · '))}</p>
        ${parts.join('')}
      </div>
      ${idx < allTips.length - 1 ? '<hr class="dest-divider">' : ''}
    `;
  }).join('');

  // Scroll spy
  window.addEventListener('scroll', () => {
    activeSeg.forEach(k => {
      const el  = document.getElementById(`seg-${k}`);
      const nav = document.getElementById(`nav-${k}`);
      if (!el || !nav) return;
      const rect = el.getBoundingClientRect();
      if (rect.top <= 120 && rect.bottom > 120) nav.classList.add('active');
      else nav.classList.remove('active');
    });
  }, { passive: true });

  /* ── Renderers ── */
  function renderSegment(segDef, data) {
    if (segDef.key === 'informacoes_gerais') return renderInfoGeral(data);
    if (segDef.key === 'bairros' || segDef.key === 'arredores') return renderSimpleList(data);
    if (segDef.key === 'agenda_cultural') return renderPlaceList(data, true);
    return renderPlaceList(data, false);
  }

  function renderInfoGeral(data) {
    const inf = data.info || {};
    const fields = [
      ['Descrição', inf.descricao], ['Dica', inf.dica],
      ['População', inf.populacao], ['Moeda', inf.moeda],
      ['Língua oficial', inf.lingua], ['Religião', inf.religiao],
      ['Fuso horário', inf.fusoSinal && inf.fusoHoras ? `${inf.fusoSinal}${inf.fusoHoras}h de Brasília` : ''],
      ['Voltagem', inf.voltagem], ['DDD', inf.ddd],
    ].filter(([,v]) => v);

    if (!fields.length && !inf.clima) return '';

    const cells = fields.map(([l,v]) => `
      <div class="info-cell"><div class="label">${esc(l)}</div><div class="value">${esc(v)}</div></div>
    `).join('');

    // Clima
    const cli = inf.clima || {};
    const hasClima = MONTHS.some((_,i) => cli[`max_${i}`] || cli[`min_${i}`]);
    const climaHtml = hasClima ? `
      <div style="overflow-x:auto;margin-top:16px;">
        <table class="clima-table">
          <thead><tr>
            <th class="row-label">°C</th>
            ${MONTHS.map(m=>`<th>${m}</th>`).join('')}
          </tr></thead>
          <tbody>
            <tr>
              <td class="row-label max">↑ Máx</td>
              ${MONTHS.map((_,i)=>`<td>${cli[`max_${i}`]??'—'}</td>`).join('')}
            </tr>
            <tr>
              <td class="row-label min">↓ Mín</td>
              ${MONTHS.map((_,i)=>`<td>${cli[`min_${i}`]??'—'}</td>`).join('')}
            </tr>
          </tbody>
        </table>
      </div>` : '';

    // Representação
    const rep = inf.representacao || {};
    const repHtml = rep.nome ? `
      <div class="rep-block">
        <div class="rep-title">Representação Brasileira</div>
        ${rep.nome     ? `<div><strong>Nome:</strong> ${esc(rep.nome)}</div>` : ''}
        ${rep.endereco ? `<div><strong>Endereço:</strong> ${esc(rep.endereco)}</div>` : ''}
        ${rep.telefone ? `<div><strong>Telefone:</strong> ${esc(rep.telefone)}</div>` : ''}
        ${rep.link     ? `<div><strong>Site:</strong> <a href="${esc(rep.link)}" target="_blank">${esc(rep.link)}</a></div>` : ''}
        ${rep.obs      ? `<div style="color:var(--muted);font-style:italic;margin-top:6px;">${esc(rep.obs)}</div>` : ''}
      </div>` : '';

    return `<div class="info-grid">${cells}</div>${climaHtml}${repHtml}`;
  }

  function renderSimpleList(data) {
    const items = (data.items || []).filter(i => i.title);
    if (!items.length) return '';
    return items.map(item => `
      <div class="simple-item">
        <div class="si-title">${esc(item.title)}</div>
        ${item.description ? `<div class="si-desc">${esc(item.description)}</div>` : ''}
      </div>`).join('');
  }

  function renderPlaceList(data, isAgenda) {
    const items = (data.items || []).filter(i => i.titulo);
    if (!items.length && !data.themeDesc) return '';
    const themeHtml = data.themeDesc
      ? `<p class="theme-desc">${esc(data.themeDesc)}</p>` : '';
    const agendaHeader = isAgenda && data.periodoAgenda
      ? `<div style="font-size:0.875rem;color:var(--gold);margin-bottom:12px;">📅 ${esc(data.periodoAgenda)}</div>` : '';

    const itemsHtml = items.map(item => `
      <div class="place-item">
        ${item.categoria ? `<div class="pi-cat">${esc(item.categoria)}</div>` : ''}
        <div class="pi-title">${esc(item.titulo)}</div>
        ${isAgenda && (item.periodo||item.periodoIndeterminado) ? `
          <div class="pi-period">📅 ${item.periodoIndeterminado ? 'Tempo indeterminado' : esc(item.periodo||'')}</div>` : ''}
        ${item.descricao ? `<div class="pi-desc">${esc(item.descricao)}</div>` : ''}
        <div class="pi-details">
          ${item.endereco ? `<span>📍 ${esc(item.endereco)}</span>` : ''}
          ${item.telefone ? `<span>📞 ${esc(item.telefone)}</span>` : ''}
          ${item.site     ? `<a href="${esc(item.site)}" target="_blank" rel="noopener">🌐 Site oficial</a>` : ''}
        </div>
        ${item.observacoes ? `<div class="pi-obs">💡 ${esc(item.observacoes)}</div>` : ''}
      </div>`).join('');

    return themeHtml + agendaHeader + itemsHtml;
  }

  function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showError(title, msg) {
    appEl.innerHTML = `
      <div class="error-state">
        <div style="font-size:3rem;margin-bottom:16px;">✈</div>
        <h2>${esc(title)}</h2>
        <p style="color:var(--muted);">${esc(msg)}</p>
      </div>`;
  }
</script>
</body>
</html>
