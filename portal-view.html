<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicas de Viagem · PRIMETOUR</title>
  <meta name="description" content="Material de viagem personalizado gerado pelo Portal de Dicas PRIMETOUR">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0&display=swap" rel="stylesheet">
  <!-- Tokens compartilhados (Fase A): paleta da área, tipografia, espaçamento.
       Aliases legados (--gold, --navy, etc.) ficam definidos aqui também
       enquanto o CSS abaixo usa os nomes antigos — Fase B troca tudo. -->
  <link rel="stylesheet" href="css/portal-tokens.css">
  <link rel="stylesheet" href="css/portal-view.css">
  <!-- Leaflet (Fase C.2): mapa interativo com pins dos items geocodados.
       Tiles do OpenStreetMap (free, sem API key). -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
<div id="loading"><div class="spinner-ring"></div><div class="brand">CITY GUIDES</div></div>

<!-- Topbar fixo com hambúrguer (mobile) + título + logo da área -->
<header class="site-header" id="site-header" style="display:none;">
  <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
    <span class="material-symbols-outlined">menu</span>
  </button>
  <div class="header-title">
    <span class="header-brand">City Guides</span>
    <span class="header-dest" id="header-dest"></span>
  </div>
  <button class="fav-filter-toggle" id="fav-filter" aria-label="Mostrar só favoritos" style="display:none;">
    <span class="material-symbols-outlined">favorite</span>
    <span class="fav-count" id="fav-count">0</span>
  </button>
  <img id="area-logo" class="header-area-logo" style="display:none;" alt="">
</header>

<!-- Side menu (mobile) — overlay + drawer -->
<div class="side-menu-overlay" id="side-menu-overlay"></div>
<aside class="side-menu" id="side-menu" aria-label="Menu de navegação">
  <div class="side-menu-header">
    <span class="side-menu-title">Seções</span>
    <button class="side-menu-close" id="side-menu-close" aria-label="Fechar menu">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <ul class="side-menu-list" id="side-menu-list"></ul>
</aside>

<!-- Bottom-nav antigo mantido como fallback (escondido por CSS) -->
<nav class="bottom-nav" id="bottom-nav" style="display:none;"></nav>

<!-- Lightbox: overlay full-screen ao clicar em qualquer foto -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
  <span class="lightbox-counter" id="lightbox-counter"></span>
  <button class="lightbox-btn lightbox-close" id="lightbox-close" aria-label="Fechar">
    <span class="material-symbols-outlined">close</span>
  </button>
  <button class="lightbox-btn lightbox-prev" id="lightbox-prev" aria-label="Anterior">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  <img class="lightbox-img" id="lightbox-img" alt="">
  <button class="lightbox-btn lightbox-next" id="lightbox-next" aria-label="Próxima">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>
  <span class="lightbox-caption" id="lightbox-caption"></span>
</div>

<div id="app"></div>

<footer class="site-footer" id="site-footer" style="display:none;">
  <img id="footer-logo" class="footer-logo" style="display:none;" alt="">
  <div class="footer-brand">CITY GUIDES</div>
  <div class="footer-sub" id="footer-date"></div>
</footer>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig }   from './js/config.js';
import { applyPortalTheme } from './js/services/portalTokens.js';

const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const SEGMENTS=[
  {key:'informacoes_gerais',label:'Informações', icon:'info'},
  {key:'bairros',           label:'Bairros',      icon:'location_city'},
  {key:'atracoes',          label:'Atrações',     icon:'visibility'},
  {key:'atracoes_criancas', label:'Crianças',     icon:'child_care'},
  {key:'restaurantes',      label:'Gastronomia',  icon:'restaurant'},
  {key:'vida_noturna',      label:'Vida Noturna', icon:'nightlife'},
  {key:'espetaculos',       label:'Espetáculos',  icon:'theater_comedy'},
  {key:'compras',           label:'Compras',      icon:'shopping_bag'},
  {key:'arredores',         label:'Arredores',    icon:'explore'},
  {key:'highlights',        label:'Highlights',   icon:'star'},
  {key:'agenda_cultural',   label:'Agenda',       icon:'event'},
];

const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shade=(hex,amt)=>{const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+amt));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+amt));const b=Math.min(255,Math.max(0,(n&0xff)+amt));return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')};
// Normaliza URL: adiciona https:// se não tiver protocolo (mesmo helper do PDF)
const normalizeUrl=u=>{const s=String(u||'').trim();if(!s)return '';return /^[a-z][a-z0-9+.-]*:/i.test(s)?s:'https://'+s;};
const hasSite=item=>item&&item.site&&String(item.site).trim().length>0;

const app=initializeApp(firebaseConfig,'portal-view');
const db=getFirestore(app);

(async()=>{
  const token=window.location.hash.slice(1);
  const appEl=document.getElementById('app');
  document.getElementById('footer-date').textContent=new Date().toLocaleDateString('pt-BR',{year:'numeric',month:'long'});
  if(!token){showErr('Link inválido','Este link não contém um token de acesso.');return;}
  let snap;
  try{snap=await getDoc(doc(db,'portal_web_links',token));}
  catch(e){showErr('Erro de conexão','Não foi possível carregar. Tente novamente.');return;}
  if(!snap.exists()){showErr('Link não encontrado','Este link pode ter expirado ou foi removido.');return;}
  const data=snap.data();
  updateDoc(doc(db,'portal_web_links',token),{views:increment(1)}).catch(()=>{});

  // Tokens compartilhados com o PDF: cores da área aplicadas via
  // CSS variables (`--portal-primary`, `--portal-secondary`) — os
  // aliases legados (--gold/--navy) são derivados automaticamente
  // em css/portal-tokens.css.
  applyPortalTheme({ colors: data.colors || {} });
  if(data.areaLogoUrl){
    const img=document.getElementById('area-logo');img.src=data.areaLogoUrl;img.style.display='block';
    const fImg=document.getElementById('footer-logo');fImg.src=data.areaLogoUrl;fImg.style.display='block';
  }

  const allTips=data.tipData||[];
  const segments=data.segments||[];
  const imagesByDest=data.imagesByDest||{};
  const activeSegs=segments.filter(k=>allTips.some(({tip})=>{const seg=tip?.segments?.[k];if(!seg)return false;if(seg.info&&Object.values(seg.info).some(v=>v&&String(v).trim()))return true;return Array.isArray(seg.items)&&seg.items.length>0;}));

  // Side menu (hambúrguer mobile + sidebar scrollspy desktop)
  // hasMap: se algum tip tem items com _geo, mostra entrada "Mapa"
  const hasMap = allTips.some(({ tip }) =>
    tip?.segments && Object.values(tip.segments).some(s =>
      Array.isArray(s?.items) && s.items.some(i => i?._geo?.lat)));
  populateSideMenu(activeSegs, hasMap);
  wireSideMenu();
  wireScrollEffects();
  wireFavButtons();
  wireFavFilter();

  document.getElementById('site-header').style.display='flex';
  document.getElementById('site-footer').style.display='block';

  if(allTips.length>1){renderMulti(appEl,allTips,segments,activeSegs,imagesByDest);}
  else{const{tip,dest}=allTips[0]||{};renderSingle(appEl,tip,dest,segments,activeSegs,imagesByDest[dest?.id]||{},true);}

  // Tag cards favoritados + atualiza UI do filtro
  setTimeout(() => { tagFavedCards(); updateFavFilterUI(); }, 50);

  // Scrollspy: marca o item ativo no side-menu conforme rola
  setTimeout(() => {
    const items = document.querySelectorAll('[id^="seg-"]');
    if (!items.length) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id.replace('seg-', '');
          document.querySelectorAll('#side-menu-list a').forEach(a =>
            a.classList.toggle('active', a.getAttribute('href') === `#seg-${id}`));
        }
      });
    }, { threshold: 0.25, rootMargin: '-80px 0px -50% 0px' });
    items.forEach(el => io.observe(el));
  }, 400);

  const loading=document.getElementById('loading');loading.style.opacity='0';setTimeout(()=>loading.style.display='none',500);
})();

/* ─── Side menu (hambúrguer mobile + scrollspy sidebar desktop) ─── */
function populateSideMenu(activeSegs, hasMap = false){
  const list = document.getElementById('side-menu-list');
  if (!list) return;
  // Item "Mapa" entra primeiro quando há items geocodados (visualmente
  // útil pro usuário que quer ver tudo geograficamente antes de explorar)
  const mapEntry = hasMap ? `<li><a href="#seg-map">
    <span class="material-symbols-outlined">map</span>Mapa
  </a></li>` : '';
  list.innerHTML = mapEntry + activeSegs.map((k, i) => {
    const seg = SEGMENTS.find(s => s.key === k);
    const icon = seg?.icon || 'arrow_forward';
    return `<li><a href="#seg-${k}"${(i===0&&!hasMap)?' class="active"':''}>
      <span class="material-symbols-outlined">${icon}</span>
      ${esc(seg?.label || k)}
    </a></li>`;
  }).join('');
  // Click fecha o menu (mobile) e faz smooth scroll
  list.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      const id = a.getAttribute('href').slice(1);
      const target = document.getElementById(id);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        closeSideMenu();
        history.replaceState(null, '', a.getAttribute('href'));
      }
    });
  });
}
function openSideMenu(){
  document.getElementById('side-menu')?.classList.add('open');
  document.getElementById('side-menu-overlay')?.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSideMenu(){
  document.getElementById('side-menu')?.classList.remove('open');
  document.getElementById('side-menu-overlay')?.classList.remove('open');
  document.body.style.overflow = '';
}
function wireSideMenu(){
  document.getElementById('menu-toggle')?.addEventListener('click', openSideMenu);
  document.getElementById('side-menu-close')?.addEventListener('click', closeSideMenu);
  document.getElementById('side-menu-overlay')?.addEventListener('click', closeSideMenu);
  // ESC fecha
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSideMenu(); });
}

/* ─── Favoritos: estrela em cada card + filtro no header ───── */
const favs = {
  token: window.location.hash.slice(1) || 'default',
  storageKey() { return `primetour-favs:${this.token}`; },
  load() {
    try { return new Set(JSON.parse(localStorage.getItem(this.storageKey()) || '[]')); }
    catch { return new Set(); }
  },
  save(set) {
    try { localStorage.setItem(this.storageKey(), JSON.stringify([...set])); }
    catch {}
  },
  // Identificador estável de um item: title (mais consistente que index)
  idOf(item) { return (item.titulo || item.title || '').trim().toLowerCase(); },
  isFaved(item) { return this.load().has(this.idOf(item)); },
  toggle(item) {
    const set = this.load();
    const id = this.idOf(item);
    if (set.has(id)) set.delete(id); else set.add(id);
    this.save(set);
    return set.has(id);
  },
  count() { return this.load().size; },
};
function favBtnHtml(item) {
  const isFav = favs.isFaved(item);
  const id = esc(favs.idOf(item));
  return `<button class="fav-btn${isFav ? ' faved' : ''}" data-fav-id="${id}"
    aria-label="${isFav ? 'Remover dos favoritos' : 'Marcar como favorito'}">
    <span class="material-symbols-outlined">favorite</span>
  </button>`;
}
function wireFavButtons() {
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.fav-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const id = btn.dataset.favId;
    if (!id) return;
    const set = favs.load();
    if (set.has(id)) { set.delete(id); btn.classList.remove('faved'); }
    else { set.add(id); btn.classList.add('faved'); }
    favs.save(set);
    // Marca/desmarca o card pai pra filtro funcionar
    const card = btn.closest('.place-card, .hero-card, .bento-card, .simple-item');
    if (card) card.classList.toggle('is-fav', set.has(id));
    updateFavFilterUI();
  });
}
function updateFavFilterUI() {
  const count = favs.count();
  const toggle = document.getElementById('fav-filter');
  const counter = document.getElementById('fav-count');
  if (counter) counter.textContent = count;
  if (toggle) toggle.style.display = count > 0 || document.body.classList.contains('show-favs-only') ? 'inline-flex' : 'none';
}
function wireFavFilter() {
  const toggle = document.getElementById('fav-filter');
  if (!toggle) return;
  toggle.addEventListener('click', () => {
    document.body.classList.toggle('show-favs-only');
    toggle.classList.toggle('active');
  });
}
// Aplica .is-fav nos cards após render (pra filtro funcionar)
function tagFavedCards() {
  document.querySelectorAll('.fav-btn[data-fav-id]').forEach(btn => {
    if (btn.classList.contains('faved')) {
      const card = btn.closest('.place-card, .hero-card, .bento-card, .simple-item');
      if (card) card.classList.add('is-fav');
    }
  });
}

/* ─── Lightbox: zoom de fotos com nav setas/teclado/swipe ──── */
const lightbox = {
  imgs: [],     // [{ url, caption }]
  index: 0,
  init() {
    const el = document.getElementById('lightbox');
    if (!el) return;
    document.getElementById('lightbox-close')?.addEventListener('click', () => this.close());
    document.getElementById('lightbox-prev')?.addEventListener('click', (e) => { e.stopPropagation(); this.go(-1); });
    document.getElementById('lightbox-next')?.addEventListener('click', (e) => { e.stopPropagation(); this.go(1); });
    el.addEventListener('click', (e) => { if (e.target === el) this.close(); }); // click fora fecha
    document.addEventListener('keydown', (e) => {
      if (!el.classList.contains('open')) return;
      if (e.key === 'Escape')      this.close();
      if (e.key === 'ArrowLeft')   this.go(-1);
      if (e.key === 'ArrowRight')  this.go(1);
    });
    // Touch swipe (mobile)
    let touchX = 0;
    el.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', (e) => {
      const dx = (e.changedTouches[0]?.clientX || 0) - touchX;
      if (Math.abs(dx) > 50) this.go(dx > 0 ? -1 : 1);
    }, { passive: true });
  },
  // Coleta todas as fotos da página e abre na clicada
  collectAndOpen(srcEl) {
    const all = [...document.querySelectorAll(
      '.hero-card img, .bento-card img, .place-card-img img'
    )].filter(im => im.src);
    this.imgs = all.map(im => ({
      url: im.src,
      caption: im.alt || im.closest('.place-card,.hero-card,.bento-card')
        ?.querySelector('.place-card-title, .card-title')?.textContent || '',
    }));
    const i = all.indexOf(srcEl);
    this.index = i >= 0 ? i : 0;
    this.show();
  },
  show() {
    const cur = this.imgs[this.index];
    if (!cur) return;
    document.getElementById('lightbox-img').src = cur.url;
    document.getElementById('lightbox-caption').textContent = cur.caption || '';
    document.getElementById('lightbox-counter').textContent = `${this.index + 1} / ${this.imgs.length}`;
    document.getElementById('lightbox').classList.add('open');
    document.getElementById('lightbox').setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  },
  go(delta) {
    if (!this.imgs.length) return;
    this.index = (this.index + delta + this.imgs.length) % this.imgs.length;
    this.show();
  },
  close() {
    document.getElementById('lightbox')?.classList.remove('open');
    document.getElementById('lightbox')?.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  },
};
lightbox.init();

// Delegação: qualquer click em foto abre o lightbox
document.addEventListener('click', (e) => {
  const img = e.target.closest('.hero-card img, .bento-card img, .place-card-img img');
  if (img) {
    e.preventDefault();
    lightbox.collectAndOpen(img);
  }
});

/* ─── Scroll effects: topbar shadow + parallax leve no hero ──── */
function wireScrollEffects(){
  const header = document.getElementById('site-header');
  const onScroll = () => {
    const y = window.scrollY || window.pageYOffset;
    // Topbar ganha sombra/borda quando rola
    if (header) header.classList.toggle('scrolled', y > 8);
    // Parallax: hero img move 35% mais devagar que o scroll
    const heroImg = document.querySelector('.hero-img');
    if (heroImg && y < window.innerHeight) {
      heroImg.style.transform = `translateY(${y * 0.35}px)`;
    }
  };
  // requestAnimationFrame pra performance
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => { onScroll(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
  onScroll();
}

function renderMulti(container,allTips,segments,activeSegs,imagesByDest){
  const fd=allTips[0]?.dest;document.getElementById('header-dest').textContent=[fd?.city,fd?.country].filter(Boolean).join(', ');
  container.innerHTML=`<div style="margin-top:64px;"><div class="dest-tabs" id="dtabs">${allTips.map((item,i)=>{const d=item.dest;const lbl=[d?.city,d?.country].filter(Boolean).join(', ')||`Destino ${i+1}`;return `<button class="dest-tab${i===0?' active':''}" data-idx="${i}">${esc(lbl)}</button>`;}).join('')}</div><div id="dcontent"></div></div>`;
  const rt=idx=>{const{tip,dest}=allTips[idx];const imgs=imagesByDest[dest?.id]||{};document.getElementById('header-dest').textContent=[dest?.city,dest?.country].filter(Boolean).join(', ');const c=document.createElement('div');renderSingle(c,tip,dest,segments,activeSegs,imgs,false);document.getElementById('dcontent').replaceWith(c);c.id='dcontent';};
  document.getElementById('dtabs')?.querySelectorAll('.dest-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.dest-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rt(Number(btn.dataset.idx));});});
  rt(0);
}

function renderSingle(container,tip,dest,segments,activeSegs,imgs,pad){
  const city=dest?.city||dest?.country||'—';const country=dest?.country||dest?.continent||'';
  document.getElementById('header-dest').textContent=[city,country].filter(Boolean).join(', ');
  const heroImg=imgs.hero||null;
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim();
  container.innerHTML=`
<section class="hero" style="${pad?'':'margin-top:0;'}">
  ${heroImg?`<img class="hero-img" src="${esc(heroImg)}" alt="${esc(city)}" onerror="this.style.display='none'">`:`<div class="hero-placeholder" style="background:linear-gradient(135deg,${navy} 0%,${shade(navy,-20)} 100%);"></div>`}
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <span class="hero-label">Portal de Dicas · PRIMETOUR</span>
    <h1 class="hero-title">${esc(city)}</h1>
    ${country&&country!==city?`<p class="hero-subtitle">${esc(country)}</p>`:''}
    <button class="hero-cta" onclick="document.querySelector('[id^=seg-]')?.scrollIntoView({behavior:'smooth'})">descobrir o destino</button>
  </div>
</section>
<div class="content-wrap">
${activeSegs.length>1?`<section style="padding:48px 0 32px;"><div class="section-header"><span class="section-label">Categorias</span><h2 class="section-title">O que explorar</h2></div><div class="cat-scroller">${activeSegs.map((k,i)=>{const seg=SEGMENTS.find(s=>s.key===k);return `<button class="cat-btn${i===0?' active':''}" onclick="scrollToSeg('${k}',this)"><div class="cat-icon"><span class="material-symbols-outlined">${seg?.icon||'info'}</span></div><span class="cat-label">${esc(seg?.label||k)}</span></button>`;}).join('')}</div></section>`:''}
${renderMapSection(tip,dest)}
${segments.map(segKey=>{const segDef=SEGMENTS.find(s=>s.key===segKey);const data=tip?.segments?.[segKey];if(!segDef||!data)return '';const html=renderSeg(segDef,data,imgs);if(!html)return '';return `<section class="page-section" id="seg-${segKey}">${html}</section>`;}).join('')}
</div>`;

  // Render mapa interativo (Leaflet) DEPOIS de inserir o markup
  setTimeout(() => mountMap(tip, dest), 200);
}

/* ─── MAPA: coleta items geocodados de todos os segmentos place_list
 * e renderiza pins no Leaflet. Skipa se não houver coords. */
function collectGeocodedItems(tip) {
  if (!tip?.segments) return [];
  const out = [];
  for (const [segKey, seg] of Object.entries(tip.segments)) {
    if (!seg?.items) continue;
    for (const item of seg.items) {
      if (item?._geo && typeof item._geo.lat === 'number' && typeof item._geo.lng === 'number') {
        out.push({ ...item, segKey });
      }
    }
  }
  return out;
}
function renderMapSection(tip, dest) {
  const geo = collectGeocodedItems(tip);
  if (!geo.length) return ''; // sem items geocodados → não renderiza mapa
  return `<section class="map-section page-section" id="seg-map">
    <div class="seg-heading">
      <div class="seg-heading-bar"></div>
      <span class="seg-heading-text">Mapa</span>
    </div>
    <div class="map-container" id="portal-map" aria-label="Mapa interativo dos locais"></div>
  </section>`;
}
async function mountMap(tip, dest) {
  const container = document.getElementById('portal-map');
  if (!container) return;
  const geo = collectGeocodedItems(tip);
  if (!geo.length) return;
  // Carrega Leaflet sob demanda
  if (typeof L === 'undefined') {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.integrity = 'sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=';
      s.crossOrigin = '';
      s.onload = resolve;
      document.head.appendChild(s);
    });
  }
  // Bounds dos pins pra centralizar
  const bounds = L.latLngBounds(geo.map(g => [g._geo.lat, g._geo.lng]));
  const map = L.map(container, {
    scrollWheelZoom: false,         // melhor UX em página com scroll vertical
    zoomControl: true,
    attributionControl: true,
  }).fitBounds(bounds, { padding: [40, 40] });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);
  // Pins customizados
  const primary = getComputedStyle(document.documentElement).getPropertyValue('--portal-primary').trim();
  geo.forEach((it, i) => {
    const icon = L.divIcon({
      className: 'map-pin-wrapper',
      html: `<div class="map-pin" style="background:${primary};"><span>${i + 1}</span></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
    });
    const m = L.marker([it._geo.lat, it._geo.lng], { icon }).addTo(map);
    const cat = it.categoria ? `<div class="map-popup-cat">${esc(it.categoria)}</div>` : '';
    const addr = it.endereco ? `<div class="map-popup-addr">${esc(it.endereco)}</div>` : '';
    m.bindPopup(`${cat}<div class="map-popup-title">${esc(it.titulo)}</div>${addr}`);
  });
  // Zoom-on-click reativa scrollwheel
  container.addEventListener('click', () => {
    map.scrollWheelZoom.enable();
  }, { once: true });
}

function segHead(sd){return `<div class="seg-heading"><div class="seg-heading-bar"></div><span class="seg-heading-text">${esc(sd.label)}</span></div>`;}

function renderSeg(sd,data,imgs){
  if(sd.key==='informacoes_gerais')return renderInfo(sd,data);
  if(sd.key==='bairros'||sd.key==='arredores')return renderSimple(sd,data);
  return renderPlaces(sd,data,imgs,sd.key==='agenda_cultural');
}

function renderInfo(sd,data){
  const inf=data.info||{};
  const fields=[['Descrição',inf.descricao],['Dica',inf.dica],['População',inf.populacao],['Moeda',inf.moeda],['Língua oficial',inf.lingua],['Religião',inf.religiao],['Fuso horário',inf.fusoSinal&&inf.fusoHoras?`${inf.fusoSinal}${inf.fusoHoras}h de Brasília`:''],['Voltagem',inf.voltagem],['DDD',inf.ddd]].filter(([,v])=>v);
  if(!fields.length&&!inf.clima)return '';
  const cli=inf.clima||{};const hasC=MONTHS.some((_,i)=>cli[`max_${i}`]||cli[`min_${i}`]);
  const rep=inf.representacao||{};
  return `${segHead(sd)}<div class="info-grid">${fields.map(([l,v])=>`<div class="info-cell"><div class="info-cell-label">${esc(l)}</div><div class="info-cell-value">${esc(v)}</div></div>`).join('')}</div>${hasC?`<div class="clima-wrap"><table class="clima-table"><thead><tr><th>°C</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody><tr class="clima-max"><td>Máx ↑</td>${MONTHS.map((_,i)=>`<td>${cli[`max_${i}`]??'—'}</td>`).join('')}</tr><tr class="clima-min"><td>Mín ↓</td>${MONTHS.map((_,i)=>`<td>${cli[`min_${i}`]??'—'}</td>`).join('')}</tr></tbody></table></div>`:''}${rep.nome?`<div class="rep-block"><div class="rep-title">Representação Brasileira</div>${rep.nome?`<div class="rep-row"><strong>Nome:</strong> ${esc(rep.nome)}</div>`:''}${rep.endereco?`<div class="rep-row"><strong>Endereço:</strong> ${esc(rep.endereco)}</div>`:''}${rep.telefone?`<div class="rep-row"><strong>Telefone:</strong> ${esc(rep.telefone)}</div>`:''}${rep.link?`<div class="rep-row"><strong>Site:</strong> <a href="${esc(normalizeUrl(rep.link))}" target="_blank" rel="noopener noreferrer">${esc(rep.link)}</a></div>`:''}</div>`:''}`;
}

function renderSimple(sd,data){
  const items=(data.items||[]).filter(i=>i.title);if(!items.length)return '';
  return `${segHead(sd)}<div class="simple-list">${items.map(item=>`<div class="simple-item" style="position:relative;">
    <div style="position:absolute;top:var(--portal-space-4);right:0;">${favBtnHtml({titulo:item.title})}</div>
    <div class="simple-item-title">${esc(item.title)}</div>
    ${item.description?`<div class="simple-item-desc">${esc(item.description)}</div>`:''}
  </div>`).join('')}</div>`;
}

function renderPlaces(sd,data,imgs,isAgenda){
  const items=(data.items||[]).filter(i=>i.titulo);if(!items.length&&!data.themeDesc)return '';
  const gallery=imgs.gallery||[];
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim();

  // Manually selected images override (stored in imagesByDest._overrides)
  const overrides = imgs._overrides || {};

  // Track which gallery images have been used so we don't repeat
  const usedImgUrls = new Set();

  const getImg=(item,idx,segDef=null)=>{
    const title = (item.titulo||'').toLowerCase().trim();
    const cat   = (item.categoria||'').toLowerCase();

    // Priority 0: manual override from generation editor
    // Firestore stores numeric keys as strings, so check both
    const ovKey = segDef?.key;
    if (ovKey && overrides[ovKey]) {
      const ov = overrides[ovKey][idx] || overrides[ovKey][String(idx)];
      if (ov?.url) return ov.url;
    }

    // Priority 1: exact placeName match
    let m = gallery.find(g => g.placeName && g.placeName.toLowerCase().trim() === title);

    // Priority 2: placeName partial match (title contains placeName or vice versa)
    if (!m) m = gallery.find(g => g.placeName &&
      (title.includes(g.placeName.toLowerCase()) || g.placeName.toLowerCase().includes(title.slice(0,15)))
    );

    // Priority 3: name/tag matches title keywords
    if (!m) {
      const words = title.split(/\s+/).filter(w => w.length > 3);
      m = gallery.find(g =>
        words.some(w => g.name?.toLowerCase().includes(w)) ||
        g.tags?.some(t => words.some(w => t.toLowerCase().includes(w)))
      );
    }

    // Priority 4: tag matches segment category
    if (!m) m = gallery.find(g =>
      !usedImgUrls.has(g.url) &&
      g.tags?.some(t => cat.includes(t.toLowerCase()) || t.toLowerCase().includes(cat.slice(0,6)))
    );

    // Priority 5: cyclic fallback — prefer unused images
    if (!m) {
      const unused = gallery.filter(g => !usedImgUrls.has(g.url));
      m = unused.length ? unused[idx % unused.length] : gallery[idx % Math.max(gallery.length,1)];
    }

    if (m?.url) usedImgUrls.add(m.url);
    return m?.url || null;
  };

  const ph=(lbl)=>`<div class="place-card-placeholder" style="background:linear-gradient(135deg,${navy}18 0%,${gold}22 100%);"><span style="font-size:.5rem;letter-spacing:.3em;font-weight:600;text-transform:uppercase;color:${navy};opacity:.4;">${esc(lbl||'')}</span></div>`;

  const card=(item,idx,segDef=null)=>{
    const img=getImg(item,idx,segDef);
    const detailsParts = [];
    if (item.endereco) detailsParts.push(`<span>📍 ${esc(item.endereco)}</span>`);
    if (item.telefone) detailsParts.push(`<span>📞 ${esc(item.telefone)}</span>`);
    return `<div class="place-card">
      ${favBtnHtml(item)}
      <div class="place-card-img">${img
        ? `<img src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`
        : ph(item.titulo)}</div>
      <div class="place-card-body">
        ${item.categoria?`<div class="place-cat-label">${esc(item.categoria)}</div>`:''}
        <div class="place-card-title">${esc(item.titulo)}</div>
        ${isAgenda&&(item.periodo||item.periodoIndeterminado)
          ? `<div style="font-size:var(--portal-fs-xs);color:var(--portal-primary);font-weight:600;">◷ ${item.periodoIndeterminado?'Tempo indeterminado':esc(item.periodo||'')}</div>`
          : ''}
        ${item.descricao?`<div class="place-card-desc">${esc(item.descricao)}</div>`:''}
        ${detailsParts.length?`<div class="place-card-details">${detailsParts.join('')}</div>`:''}
        ${hasSite(item)?`<a class="pill-link" href="${esc(normalizeUrl(item.site))}" target="_blank" rel="noopener noreferrer">Visitar site</a>`:''}
        ${item.observacoes?`<div class="place-card-obs">💡 ${esc(item.observacoes)}</div>`:''}
      </div>
    </div>`;
  };

  const heroCard=(item,idx,segDef=null)=>{const img=getImg(item,idx,segDef);return `<div class="hero-card">${favBtnHtml(item)}<div style="position:absolute;inset:0;">${img?`<img style="width:100%;height:100%;object-fit:cover;" src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${navy} 0%,${shade(navy,-20)} 100%);"></div>`}</div><div class="card-gradient"></div><div class="card-content">${item.categoria?`<div class="card-supertitle">${esc(item.categoria)}</div>`:''}<div class="card-title">${esc(item.titulo)}</div><div class="card-underline"></div></div></div>`;};

  const themeHtml=data.themeDesc?`<p style="padding:0 32px 24px;font-size:.875rem;color:var(--muted);font-style:italic;line-height:1.7;">${esc(data.themeDesc)}</p>`:'';
  const agendaHtml=isAgenda&&data.periodoAgenda?`<div class="agenda-period">📅 ${esc(data.periodoAgenda)}</div>`:'';

  let itemsHtml='';
  if(items.length===0)itemsHtml='';
  else if(items.length===1)itemsHtml=heroCard(items[0],0,sd);
  else if(items.length===2)itemsHtml=heroCard(items[0],0,sd)+`<div class="cards-grid" style="margin-top:1px;">${card(items[1],1,sd)}</div>`;
  else itemsHtml=heroCard(items[0],0,sd)+`<div class="bento-grid" style="margin-top:1px;">${items.slice(1,3).map((item,i)=>{const img=getImg(item,i+1,sd);return `<div class="bento-card">${favBtnHtml(item)}<div style="position:absolute;inset:0;">${img?`<img style="width:100%;height:100%;object-fit:cover;" src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${navy}dd,${shade(navy,-15)});"></div>`}</div><div class="card-gradient"></div><div class="card-content">${item.categoria?`<div class="card-supertitle" style="font-size:.5rem;">${esc(item.categoria)}</div>`:''}<div class="card-title" style="font-size:1.375rem;">${esc(item.titulo)}</div></div></div>`;}).join('')}</div>${items.length>3?`<div class="cards-grid" style="margin-top:1px;">${items.slice(3).map((item,i)=>card(item,i+3,sd)).join('')}</div>`:''}`;

  return `${segHead(sd)}${themeHtml}${agendaHtml}${itemsHtml}`;
}

function scrollToSeg(key,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn?.classList.add('active');document.getElementById(`seg-${key}`)?.scrollIntoView({behavior:'smooth',block:'start'});}
window.scrollToSeg=scrollToSeg;


function showErr(title,msg){document.getElementById('loading').style.display='none';document.getElementById('app').innerHTML=`<div class="error-state" style="margin-top:64px;"><div style="font-size:2.5rem;">✈</div><h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;}
</script>
