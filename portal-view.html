<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, getDocs, collection, query, orderBy, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig }   from './js/config.js';
import { applyPortalTheme } from './js/services/portalTokens.js';
// 4.48.0+ (Sprint 6b/c) — areaTokens é o SSO de identidade. Aplica fonts + chrome.
import { applyAreaTheme } from './js/services/areaTokens.js?v=4.48.1';

const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
// 4.40.18+ Defaults (mode incluído pra dispatch). SEGMENTS é `let` —
// pode ser estendido com customs fetched de portal_segments antes do render.
let SEGMENTS=[
  {key:'informacoes_gerais',label:'Informações', icon:'info',          mode:'special_info'},
  {key:'bairros',           label:'Bairros',      icon:'location_city', mode:'simple_list'},
  {key:'atracoes',          label:'Atrações',     icon:'visibility',    mode:'place_list'},
  {key:'atracoes_criancas', label:'Crianças',     icon:'child_care',    mode:'place_list'},
  {key:'restaurantes',      label:'Gastronomia',  icon:'restaurant',    mode:'place_list'},
  {key:'vida_noturna',      label:'Vida Noturna', icon:'nightlife',     mode:'place_list'},
  {key:'espetaculos',       label:'Espetáculos',  icon:'theater_comedy',mode:'place_list'},
  {key:'compras',           label:'Compras',      icon:'shopping_bag',  mode:'place_list'},
  {key:'arredores',         label:'Arredores',    icon:'explore',       mode:'simple_list'},
  {key:'highlights',        label:'Highlights',   icon:'star',          mode:'place_list'},
  {key:'agenda_cultural',   label:'Agenda',       icon:'event',         mode:'agenda'},
];

const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// v4.63.40+ Markdown leve inline (espelha js/services/richText.js).
// Implementação completa em /js/services/richText.js — aqui repetida pra
// portal-view.html ser standalone (sem import).
function parseRich(input){
  if(!input)return[];
  const s=String(input);const out=[];let i=0;const len=s.length;
  const pushText=(txt,fmt={})=>{if(!txt)return;out.push({text:txt,...fmt});};
  while(i<len){
    if(s[i]==='['){
      const cb=s.indexOf(']',i+1);
      if(cb!==-1&&s[cb+1]==='('){
        const cp=s.indexOf(')',cb+2);
        if(cp!==-1){
          const lt=s.slice(i+1,cb);const url=s.slice(cb+2,cp).trim();
          if(lt&&url){
            const inner=parseRich(lt);const isA=url.startsWith('#');
            inner.forEach(seg=>pushText(seg.text,{...seg,...(isA?{anchor:url.slice(1)}:{link:url})}));
            i=cp+1;continue;
          }
        }
      }
    }
    if(s[i]==='*'&&s[i+1]==='*'){
      const end=s.indexOf('**',i+2);
      if(end!==-1){parseRich(s.slice(i+2,end)).forEach(seg=>pushText(seg.text,{...seg,bold:true}));i=end+2;continue;}
    }
    if(s[i]==='_'&&s[i+1]==='_'){
      const end=s.indexOf('__',i+2);
      if(end!==-1){parseRich(s.slice(i+2,end)).forEach(seg=>pushText(seg.text,{...seg,underline:true}));i=end+2;continue;}
    }
    if(s[i]==='_'&&s[i+1]!=='_'){
      // v4.63.45+ B2 fix: italic requer word-boundary antes E depois do `_`
      const pc=s[i-1]; const isWordBefore=pc&&/\w/.test(pc);
      if(!isWordBefore){
        const end=s.indexOf('_',i+1);
        if(end!==-1&&s[end+1]!=='_'&&s[end-1]!=='_'){
          const nc=s[end+1]; const isWordAfter=nc&&/\w/.test(nc);
          if(!isWordAfter){parseRich(s.slice(i+1,end)).forEach(seg=>pushText(seg.text,{...seg,italic:true}));i=end+1;continue;}
        }
      }
    }
    let j=i;while(j<len){const c=s[j],c2=s[j+1];if(c==='['||(c==='*'&&c2==='*')||c==='_')break;j++;}
    if(j>i){pushText(s.slice(i,j));i=j;}else{pushText(s[i]);i++;}
  }
  return out;
}
function richToHtml(input){
  return parseRich(input).map(s=>{
    let h=esc(s.text);
    if(s.bold)h=`<strong>${h}</strong>`;
    if(s.italic)h=`<em>${h}</em>`;
    if(s.underline)h=`<u>${h}</u>`;
    if(s.link){
      // v4.63.45+ B1 fix: reject ANTES de transformações
      const raw=String(s.link||'').trim();
      const pm=raw.match(/^([a-z]+):/i);
      const pn=pm?pm[1].toLowerCase():'';
      if(['javascript','data','vbscript','file','about'].includes(pn)) h=esc(s.text);
      else {
        const u=/^https?:\/\//i.test(raw)?raw:`https://${raw}`;
        h=`<a href="${esc(u)}" target="_blank" rel="noopener noreferrer">${h}</a>`;
      }
    }
    else if(s.anchor)h=`<a href="#seg-${esc(s.anchor)}" data-internal-link="1">${h}</a>`;
    return h;
  }).join('');
}
const shade=(hex,amt)=>{const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+amt));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+amt));const b=Math.min(255,Math.max(0,(n&0xff)+amt));return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')};
// Normaliza URL: adiciona https:// se não tiver protocolo (mesmo helper do PDF)
const normalizeUrl=u=>{const s=String(u||'').trim();if(!s)return '';const m=s.match(/^([a-z][a-z0-9+.-]*):/i);if(m){return /^https?$/i.test(m[1])?s:'';}return 'https://'+s;};
const hasSite=item=>item&&item.site&&String(item.site).trim().length>0;

const app=initializeApp(firebaseConfig,'portal-view');
const db=getFirestore(app);

(async()=>{
  const token=window.location.hash.slice(1);
  window.__portalToken = token;
  const appEl=document.getElementById('app');
  if(!token){showErr('Link inválido','Este link não contém um token de acesso.');return;}
  let snap;
  try{snap=await getDoc(doc(db,'portal_web_links',token));}
  catch(e){showErr('Erro de conexão','Não foi possível carregar. Tente novamente.');return;}
  if(!snap.exists()){showErr('Link não encontrado','Este link pode ter expirado ou foi removido.');return;}
  const data=snap.data();
  updateDoc(doc(db,'portal_web_links',token),{views:increment(1)}).catch(()=>{});

  // 4.40.18+ Carrega segmentos custom de portal_segments (defaults +
  // customs) pra renderizar segmentos extras criados pelo admin.
  try {
    const segSnap = await getDocs(query(collection(db,'portal_segments'),orderBy('order','asc')));
    const customSegs = segSnap.docs.map(d => ({
      key: d.id,
      label: d.data().label || d.id,
      icon: d.data().icon || 'bookmark',
      mode: d.data().mode || 'place_list',
      builtin: false,
    }));
    // Append apenas custom (defaults já estão em SEGMENTS)
    SEGMENTS = [...SEGMENTS, ...customSegs];
  } catch (e) {
    console.warn('[portal-view] custom segments fetch fail:', e?.message);
  }

  // Tokens compartilhados com o PDF: cores da área aplicadas via
  // CSS variables (`--portal-primary`, `--portal-secondary`) — os
  // aliases legados (--gold/--navy) são derivados automaticamente
  // em css/portal-tokens.css.
  applyPortalTheme({ colors: data.colors || {} });
  // 4.48.0+ Aplica tokens completos (fonts + editorial) com module='portal'
  // pra honrar overrides específicos do Portal de Dicas se houver.
  applyAreaTheme({
    colors: data.colors || {},
    fonts: data.fonts || null,
    editorial: data.editorial || null,
    modules: data.modules || null,
  }, 'portal');
  // Logo: header tem fundo BRANCO → usa logoUrlAlt (versão escura/colorida).
  //       footer tem fundo ESCURO → usa logoUrl (versão branca).
  // Se só houver um dos dois, usa o disponível em ambos os lugares.
  if (data.areaLogoUrl || data.areaLogoUrlAlt) {
    const headerLogo = data.areaLogoUrlAlt || data.areaLogoUrl;
    const footerLogo = data.areaLogoUrl    || data.areaLogoUrlAlt;
    const img = document.getElementById('area-logo');
    img.src = headerLogo;
    img.style.display = 'block';
    document.getElementById('header-fallback').style.display = 'none';
    const fImg = document.getElementById('footer-logo');
    fImg.src = footerLogo;
    fImg.style.display = 'block';
  }

  const allTips=data.tipData||[];
  const segments=data.segments||[];
  const imagesByDest=data.imagesByDest||{};
  const activeSegs=segments.filter(k=>allTips.some(({tip})=>{const seg=tip?.segments?.[k];if(!seg)return false;if(seg.info&&Object.values(seg.info).some(v=>v&&String(v).trim()))return true;return Array.isArray(seg.items)&&seg.items.length>0;}));

  // Bottom-nav fixo permanente (acesso rápido às seções)
  const hasMap = allTips.some(({ tip }) =>
    tip?.segments && Object.values(tip.segments).some(s =>
      Array.isArray(s?.items) && s.items.some(i => i?._geo?.lat)));
  populateBottomNav(activeSegs, hasMap);
  wireScrollEffects();
  wireFavButtons();
  wireFavFilter();
  wireSearch();
  wireCardExpand();
  // Logo do header → topo (smooth scroll) + atualiza URL pra remover hash
  // de seção (ex: #seg-bairros) sem perder o token. Mantém só #<token>.
  document.getElementById('header-home')?.addEventListener('click', (e) => {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Restaura hash original (token do link), removendo qualquer ?seg-X
    const baseHash = '#' + (window.__portalToken || window.location.hash.slice(1).split('?')[0]);
    history.replaceState(null, '', window.location.pathname + baseHash);
    // Tira o ".active" de todas as entradas do bottom-nav
    document.querySelectorAll('#bottom-nav a').forEach(a => a.classList.remove('active'));
  });
  // Cards: "Ver no mapa" centraliza + abre popup do pin correspondente
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.card-map-btn');
    if (!btn) return;
    e.preventDefault();
    const title = btn.dataset.itemTitle;
    const pin = window.__portalMapPins?.[title];
    const map = window.__portalMap;
    if (!pin || !map) return;
    // Scroll até a seção do mapa, depois centraliza + abre popup
    const mapSec = document.getElementById('seg-map');
    if (mapSec) mapSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      map.setView([pin.lat, pin.lng], 16, { animate: true });
      pin.marker.openPopup();
    }, 600);
  });

  document.getElementById('site-header').style.display='flex';
  document.getElementById('site-footer').style.display='block';

  // v4.62.47+ Render exports.web custom (footerText / headerText) salvos
  // em portal_web_links.webExports. Antes: campo era zumbi — UI salvava
  // mas portal-view ignorava. hideCover é NO-OP pra Web (não tem capa).
  const _webExp = data.webExports || {};
  if (_webExp.headerText) {
    const hb = document.getElementById('custom-header-text');
    hb.textContent = String(_webExp.headerText).slice(0, 200);
    hb.style.display = 'block';
    // Empurra site-header pra baixo p/ não cobrir a faixa
    document.getElementById('site-header').style.marginTop = '22px';
  }
  if (_webExp.footerText) {
    const fc = document.getElementById('footer-custom-text');
    fc.textContent = String(_webExp.footerText);
    fc.style.display = 'block';
  }

  if(allTips.length>1){renderMulti(appEl,allTips,segments,activeSegs,imagesByDest);}
  else{const{tip,dest}=allTips[0]||{};renderSingle(appEl,tip,dest,segments,activeSegs,imagesByDest[dest?.id]||{},true);}

  // Tag cards favoritados + atualiza UI do filtro
  setTimeout(() => { tagFavedCards(); updateFavFilterUI(); }, 50);

  // Scrollspy: marca o item ativo no bottom-nav conforme rola
  setTimeout(() => {
    const items = document.querySelectorAll('[id^="seg-"]');
    if (!items.length) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id.replace('seg-', '');
          document.querySelectorAll('#bottom-nav a').forEach(a =>
            a.classList.toggle('active', a.getAttribute('href') === `#seg-${id}`));
        }
      });
    }, { threshold: 0.25, rootMargin: '-80px 0px -50% 0px' });
    items.forEach(el => io.observe(el));
  }, 400);

  const loading=document.getElementById('loading');loading.style.opacity='0';setTimeout(()=>loading.style.display='none',500);
})();

/* ─── Bottom nav fixo + Search bar + Card expand ─────────────── */
function populateBottomNav(activeSegs, hasMap = false){
  const nav = document.getElementById('bottom-nav');
  if (!nav) return;
  nav.style.display = 'flex';
  const mapEntry = hasMap ? `<a href="#seg-map">
    <span class="material-symbols-outlined">map</span>Mapa
  </a>` : '';
  nav.innerHTML = mapEntry + activeSegs.map((k, i) => {
    const seg = SEGMENTS.find(s => s.key === k);
    const icon = seg?.icon || 'arrow_forward';
    return `<a href="#seg-${k}"${(i===0&&!hasMap)?' class="active"':''}>
      <span class="material-symbols-outlined">${icon}</span>
      ${esc(seg?.label || k)}
    </a>`;
  }).join('');
  // Smooth scroll quando clica
  nav.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', (e) => {
      const id = a.getAttribute('href').slice(1);
      const target = document.getElementById(id);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', a.getAttribute('href'));
      }
    });
  });
}

function wireSearch(){
  const toggle = document.getElementById('search-toggle');
  const bar    = document.getElementById('search-bar');
  const input  = document.getElementById('search-input');
  const clear  = document.getElementById('search-clear');
  if (!toggle || !bar || !input) return;
  toggle.addEventListener('click', () => {
    const open = !bar.classList.contains('open');
    bar.classList.toggle('open', open);
    toggle.classList.toggle('active', open);
    if (open) setTimeout(() => input.focus(), 100);
  });
  clear?.addEventListener('click', () => {
    input.value = '';
    bar.classList.remove('open');
    toggle.classList.remove('active');
    applySearchFilter('');
  });
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => applySearchFilter(input.value.trim().toLowerCase()), 150);
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && bar.classList.contains('open')) {
      input.value = '';
      bar.classList.remove('open');
      toggle.classList.remove('active');
      applySearchFilter('');
    }
  });
}
// Normaliza pra busca: lowercase + remove acentos/diacríticos
const normSearch = s => String(s||'')
  .toLowerCase()
  .normalize('NFD')
  .replace(/[̀-ͯ]/g, '');

function applySearchFilter(rawQuery) {
  const query = normSearch(rawQuery);
  if (!query) {
    document.body.classList.remove('search-active', 'no-results');
    document.querySelectorAll('.search-match,.has-search-match')
      .forEach(el => el.classList.remove('search-match', 'has-search-match'));
    return;
  }
  document.body.classList.add('search-active');
  // Busca por aproximação: TODAS as palavras (>=2 chars) precisam aparecer
  // em algum lugar do card. Acentos ignorados. Substring match.
  const words = query.split(/\s+/).filter(w => w.length >= 2);
  if (!words.length) {
    document.body.classList.remove('search-active', 'no-results');
    return;
  }
  let totalMatch = 0;
  document.querySelectorAll('[id^="seg-"]').forEach(seg => {
    let segMatch = 0;
    seg.querySelectorAll('.place-card, .simple-item').forEach(card => {
      const text = normSearch(card.textContent);
      const match = words.every(w => text.includes(w));
      card.classList.toggle('search-match', match);
      if (match) { segMatch++; totalMatch++; }
    });
    seg.classList.toggle('has-search-match', segMatch > 0);
  });
  document.body.classList.toggle('no-results', totalMatch === 0);
}

function wireCardExpand(){
  // Click no botão "ver mais / ver menos" expande/colapsa o card
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.place-card-toggle');
    if (!btn) return;
    e.preventDefault();
    const card = btn.closest('.place-card');
    if (!card) return;
    const isExp = card.classList.toggle('expanded');
    const label = btn.querySelector('.toggle-label');
    if (label) label.textContent = isExp ? 'Ver menos' : 'Ver mais';
  });
}

/* ─── Favoritos: estrela em cada card + filtro no header ───── */
const favs = {
  token: window.location.hash.slice(1) || 'default',
  storageKey() { return `primetour-favs:${this.token}`; },
  load() {
    try { return new Set(JSON.parse(localStorage.getItem(this.storageKey()) || '[]')); }
    catch { return new Set(); }
  },
  save(set) {
    try { localStorage.setItem(this.storageKey(), JSON.stringify([...set])); }
    catch {}
  },
  // Identificador estável de um item: title (mais consistente que index)
  idOf(item) { return (item.titulo || item.title || '').trim().toLowerCase(); },
  isFaved(item) { return this.load().has(this.idOf(item)); },
  toggle(item) {
    const set = this.load();
    const id = this.idOf(item);
    if (set.has(id)) set.delete(id); else set.add(id);
    this.save(set);
    return set.has(id);
  },
  count() { return this.load().size; },
};
function favBtnHtml(item) {
  const isFav = favs.isFaved(item);
  const id = esc(favs.idOf(item));

/* ─── Lightbox: zoom de fotos com nav setas/teclado/swipe ──── */
const lightbox = {
  imgs: [],     // [{ url, caption }]
  index: 0,
  init() {
    const el = document.getElementById('lightbox');
    if (!el) return;
    document.getElementById('lightbox-close')?.addEventListener('click', () => this.close());
    document.getElementById('lightbox-prev')?.addEventListener('click', (e) => { e.stopPropagation(); this.go(-1); });
    document.getElementById('lightbox-next')?.addEventListener('click', (e) => { e.stopPropagation(); this.go(1); });
    el.addEventListener('click', (e) => { if (e.target === el) this.close(); }); // click fora fecha
    document.addEventListener('keydown', (e) => {
      if (!el.classList.contains('open')) return;
      if (e.key === 'Escape')      this.close();
      if (e.key === 'ArrowLeft')   this.go(-1);
      if (e.key === 'ArrowRight')  this.go(1);
    });
    // Touch swipe (mobile)
    let touchX = 0;
    el.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
    el.addEventListener('touchend', (e) => {
      const dx = (e.changedTouches[0]?.clientX || 0) - touchX;
      if (Math.abs(dx) > 50) this.go(dx > 0 ? -1 : 1);
    }, { passive: true });
  },
  // Coleta todas as fotos da página e abre na clicada
  collectAndOpen(srcEl) {
    const all = [...document.querySelectorAll(
      '.hero-card img, .bento-card img, .place-card-img img'
    )].filter(im => im.src);
    this.imgs = all.map(im => ({
      url: im.src,
      caption: im.alt || im.closest('.place-card,.hero-card,.bento-card')
        ?.querySelector('.place-card-title, .card-title')?.textContent || '',
    }));
    const i = all.indexOf(srcEl);
    this.index = i >= 0 ? i : 0;
    this.show();
  },
  show() {
    const cur = this.imgs[this.index];
    if (!cur) return;
    document.getElementById('lightbox-img').src = cur.url;
    document.getElementById('lightbox-caption').textContent = cur.caption || '';
    document.getElementById('lightbox-counter').textContent = `${this.index + 1} / ${this.imgs.length}`;
    document.getElementById('lightbox').classList.add('open');
    document.getElementById('lightbox').setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  },
  go(delta) {
    if (!this.imgs.length) return;
    this.index = (this.index + delta + this.imgs.length) % this.imgs.length;
    this.show();
  },
  close() {
    document.getElementById('lightbox')?.classList.remove('open');
    document.getElementById('lightbox')?.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  },
};
lightbox.init();

/* ─── Scroll effects: topbar shadow + parallax leve no hero ──── */
function wireScrollEffects(){
  const header = document.getElementById('site-header');
  const onScroll = () => {
    const y = window.scrollY || window.pageYOffset;
    // Topbar ganha sombra/borda quando rola
    if (header) header.classList.toggle('scrolled', y > 8);
    // Parallax: hero img move 35% mais devagar que o scroll
    const heroImg = document.querySelector('.hero-img');
    if (heroImg && y < window.innerHeight) {
      heroImg.style.transform = `translateY(${y * 0.35}px)`;
    }
  };
  // requestAnimationFrame pra performance
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => { onScroll(); ticking = false; });
      ticking = true;
    }
  }, { passive: true });
  onScroll();
}

/* ─── MAPA: coleta items geocodados de todos os segmentos place_list
 * e renderiza pins no Leaflet. Skipa se não houver coords. */
function collectGeocodedItems(tip) {
  if (!tip?.segments) return [];
  const out = [];
  for (const [segKey, seg] of Object.entries(tip.segments)) {
    if (!seg?.items) continue;
    for (const item of seg.items) {
      if (item?._geo && typeof item._geo.lat === 'number' && typeof item._geo.lng === 'number') {
        out.push({ ...item, segKey });
      }
    }
  }
  return out;
}
function renderMapSection(tip, dest) {
  const geo = collectGeocodedItems(tip);
  if (!geo.length) return ''; // sem items geocodados → não renderiza mapa
  return `<section class="map-section page-section" id="seg-map">
    <div class="seg-heading">
      <div class="seg-heading-bar"></div>
      <span class="seg-heading-text">Mapa</span>
    </div>
    <div class="map-container" id="portal-map" aria-label="Mapa interativo dos locais"></div>
  </section>`;
}
async function mountMap(tip, dest) {
  const container = document.getElementById('portal-map');
  if (!container) return;
  const geo = collectGeocodedItems(tip);
  if (!geo.length) return;
  // Carrega Leaflet sob demanda
  if (typeof L === 'undefined') {
    await new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.integrity = 'sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=';
      s.crossOrigin = '';
      s.onload = resolve;
      document.head.appendChild(s);
    });
  }
  // Bounds dos pins pra centralizar
  const bounds = L.latLngBounds(geo.map(g => [g._geo.lat, g._geo.lng]));
  const map = L.map(container, {
    scrollWheelZoom: false,         // melhor UX em página com scroll vertical
    zoomControl: true,
    attributionControl: true,
  }).fitBounds(bounds, { padding: [40, 40] });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);
  // Pins customizados
  const primary = getComputedStyle(document.documentElement).getPropertyValue('--portal-primary').trim();
  geo.forEach((it, i) => {
    const icon = L.divIcon({
      className: 'map-pin-wrapper',
      html: `<div class="map-pin" style="background:${primary};"><span>${i + 1}</span></div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
    });
    const m = L.marker([it._geo.lat, it._geo.lng], { icon }).addTo(map);
    const cat = it.categoria ? `<div class="map-popup-cat">${esc(it.categoria)}</div>` : '';
    const addr = it.endereco ? `<div class="map-popup-addr">${esc(it.endereco)}</div>` : '';
    // Botão "Abrir no Google Maps" — leva pra route com origem da localização do user
    const gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${it._geo.lat},${it._geo.lng}`;
    const gmBtn = `<a href="${gmUrl}" target="_blank" rel="noopener noreferrer"
      style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;
        padding:6px 12px;background:var(--portal-primary);color:#fff;
        border-radius:999px;font-size:12px;font-weight:600;text-decoration:none;
        font-family:var(--portal-font);">
      <span style="font-size:14px;">↗</span> Abrir no Google Maps
    </a>`;
    m.bindPopup(`${cat}<div class="map-popup-title">${esc(it.titulo)}</div>${addr}${gmBtn}`);
    // Salva index do pin pra navegar pelo botão "Ver no mapa" do card
    window.__portalMapPins = window.__portalMapPins || {};
    const itemId = String(it.titulo || '').toLowerCase().trim();
    if (itemId) window.__portalMapPins[itemId] = { marker: m, lat: it._geo.lat, lng: it._geo.lng };
  });
  window.__portalMap = map; // exposto pra "Ver no mapa" centralizar+abrir popup
  // Zoom-on-click reativa scrollwheel
  container.addEventListener('click', () => {
    map.scrollWheelZoom.enable();
  }, { once: true });
}

// Limpa CLIMA e REPRESENTAÇÃO BRASILEIRA de descrições legadas
// (eram colados como texto cru). Os blocos estruturados rendem
// abaixo, então no texto seria duplicado.
function cleanInfoDescricao(raw, hasRepObj) {
  let txt = String(raw || '');
  // Remove bloco CLIMA até quebra dupla, "REPRESENTAÇÃO" ou fim
  txt = txt.replace(/\n*\s*CLIMA[\s\S]*?(?=\n\n|REPRESENTA[ÇC][ÃA]O|$)/i, '\n').trim();
  if (hasRepObj) {
    txt = txt.replace(/\n*\s*REPRESENTA[ÇC][ÃA]O\s+BRASILEIRA[\s\S]*$/i, '').trim();
  }
  return txt;
}

function renderSimple(sd,data,imgs){
  const items=(data.items||[]).filter(i=>i.title);if(!items.length)return '';
  const overrides = imgs?._overrides || {};
  const gallery = imgs?.gallery || [];
  const usedUrls = new Set();
  // BUG FIX: retornar { url, isFallback } pra que cards mostrem badge "ilustrativa"
  // quando foto vier do fallback genérico (consistente com renderPlaces).
  const pickSimpleImgInfo = (item, idx) => {
    // 1. Override explícito por idx (sempre vence — sem badge)
    if (overrides[sd.key]) {
      const ov = overrides[sd.key][idx] || overrides[sd.key][String(idx)];
      if (ov?.url) return { url: ov.url, isFallback: false };
    }
    // 2. Match por placeName na galeria
    const title = (item.title || '').toLowerCase().trim();
    if (!title) return { url: null, isFallback: false };
    let m = gallery.find(g => g.placeName && g.placeName.toLowerCase().trim() === title);
    if (!m) m = gallery.find(g => g.placeName && g.placeName.length >= 5 &&
      (title.includes(g.placeName.toLowerCase()) || g.placeName.toLowerCase().includes(title.slice(0,12))));
    if (m?.url) usedUrls.add(m.url);
    return { url: m?.url || null, isFallback: !!m?._photoFallback };
  };
  // Se algum item tem foto, usa cards-grid (foto + texto). Senão, lista simples.
  const itemImgInfos = items.map((it, i) => pickSimpleImgInfo(it, i));
  const itemImgs = itemImgInfos.map(info => info.url);
  const anyHasImg = itemImgs.some(Boolean);

  if (!anyHasImg) {
    return `${segHead(sd)}<div class="simple-list">${items.map((item,i)=>`<div class="simple-item" style="position:relative;">
      <div style="position:absolute;top:var(--portal-space-4);right:0;">${favBtnHtml({titulo:item.title})}</div>
      <div class="simple-item-title">${esc(item.title)}</div>
      ${item.description?`<div class="simple-item-desc">${richToHtml(item.description)}</div>`:''}
    </div>`).join('')}</div>`;
  }
  // Layout com fotos: cards uniformes (mesmo do place_list)
  return `${segHead(sd)}<div class="cards-grid">${items.map((item,i) => {
    const imgInfo = itemImgInfos[i];
    const img = imgInfo.url;
    const isDescLong = item.description && item.description.length > 120;
    return `<div class="place-card">
      ${favBtnHtml({titulo:item.title})}
      <div class="place-card-img" style="position:relative;">${img
        ? `<img src="${esc(img)}" alt="${esc(item.title)}" loading="lazy">${imgInfo.isFallback ? `
          <span class="card-illustrative-badge" title="Imagem ilustrativa — não é foto específica do local"
            style="position:absolute;top:8px;right:8px;font-size:0.5625rem;font-weight:600;
            text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;
            background:rgba(0,0,0,0.55);color:#fff;border-radius:99px;
            backdrop-filter:blur(4px);pointer-events:none;">
            ⓘ ilustrativa
          </span>` : ''}`
        : `<div class="place-card-placeholder"><span style="font-size:.5rem;letter-spacing:.3em;font-weight:600;text-transform:uppercase;color:var(--portal-text-muted);">${esc(item.title||'')}</span></div>`}
      </div>
      <div class="place-card-body">
        <div class="place-card-title">${esc(item.title)}</div>
        ${item.description?`<div class="place-card-desc">${esc(item.description)}</div>`:''}
        ${isDescLong?`<button class="place-card-toggle" type="button"><span class="toggle-label">Ver mais</span></button>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPlaces(sd,data,imgs,isAgenda){
  // v4.63.42+ HIGH H1: subtítulos (type='subtitle') estavam sendo filtrados
  // ANTES do bloco que detecta subtitle no loop → sumiam do Web. Agora mantém.
  const items=(data.items||[]).filter(i=>i.titulo || (i?.type==='subtitle' && i.text));
  if(!items.length&&!data.themeDesc)return '';
  const gallery=imgs.gallery||[];
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim();

  // Manually selected images override (stored in imagesByDest._overrides)
  const overrides = imgs._overrides || {};

  // Track which gallery images have been used so we don't repeat
  const usedImgUrls = new Set();

  // Retorna { url, isFallback } pra que o card saiba mostrar badge "Foto ilustrativa"
  // quando a foto não é do lugar específico (foi fallback genérico do segmento).
  const getImgInfo=(item,idx,segDef=null)=>{
    const title = (item.titulo||'').toLowerCase().trim();
    const ovKey = segDef?.key;
    if (ovKey && overrides[ovKey]) {
      const ov = overrides[ovKey][idx] || overrides[ovKey][String(idx)];
      if (ov?.url) return { url: ov.url, isFallback: false };
    }
    const m = gallery.find(g => g.placeName && g.placeName.toLowerCase().trim() === title);
    if (m?.url) usedImgUrls.add(m.url);
    return { url: m?.url || null, isFallback: !!m?._photoFallback };
  };
  const getImg=(item,idx,segDef=null)=>getImgInfo(item,idx,segDef).url;

  const ph=(lbl)=>`<div class="place-card-placeholder" style="background:linear-gradient(135deg,${navy}18 0%,${gold}22 100%);"><span style="font-size:.5rem;letter-spacing:.3em;font-weight:600;text-transform:uppercase;color:${navy};opacity:.4;">${esc(lbl||'')}</span></div>`;

  const card=(item,idx,segDef=null)=>{
    const imgInfo=getImgInfo(item,idx,segDef);
    const img=imgInfo.url;
    const detailsParts = [];
    if (item.endereco) {
      // Se item tem _geo, adiciona botão "Ver no mapa" inline com o endereço
      const mapBtn = item._geo?.lat
        ? `<button class="card-map-btn" data-item-title="${esc((item.titulo||'').toLowerCase().trim())}"
            title="Ver no mapa" type="button"
            style="background:none;border:none;cursor:pointer;padding:0 4px;
              color:var(--portal-primary);font-size:14px;vertical-align:middle;">
            <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">map</span>
          </button>`
        : '';
      detailsParts.push(`<span>📍 ${esc(item.endereco)}${mapBtn}</span>`);
    }
    if (item.telefone) detailsParts.push(`<span>📞 ${esc(item.telefone)}</span>`);
    // Descrição truncada por CSS line-clamp; toggle aparece SÓ se a
    // descrição for relativamente longa (>120 chars) ou houver observações
    const isDescLong = item.descricao && item.descricao.length > 120;
    const hasExtra   = isDescLong || item.observacoes;
    return `<div class="place-card">
      ${favBtnHtml(item)}
      <div class="place-card-img" style="position:relative;">${img
        ? `<img src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">${imgInfo.isFallback ? `
          <span class="card-illustrative-badge" title="Imagem ilustrativa — não é foto específica do local"
            style="position:absolute;top:8px;right:8px;font-size:0.5625rem;font-weight:600;
            text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;
            background:rgba(0,0,0,0.55);color:#fff;border-radius:99px;
            backdrop-filter:blur(4px);pointer-events:none;">
            ⓘ ilustrativa
          </span>` : ''}`
        : ph(item.titulo)}</div>
      <div class="place-card-body">
        ${item.categoria?`<div class="place-cat-label">${esc(item.categoria)}</div>`:''}
        <div class="place-card-title">${esc(item.titulo)}</div>
        ${isAgenda&&(item.periodo||item.periodoIndeterminado)
          ? `<div style="font-size:var(--portal-fs-xs);color:var(--portal-primary);font-weight:600;">◷ ${item.periodoIndeterminado?'Tempo indeterminado':esc(item.periodo||'')}</div>`
          : ''}
        ${Array.isArray(item.tags)&&item.tags.length
          ? `<div class="place-card-tags" style="display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 4px;">${item.tags.map(t=>`<span style="display:inline-block;padding:2px 8px;background:rgba(212,168,67,0.14);border:1px solid rgba(212,168,67,0.32);border-radius:999px;font-size:0.65rem;color:var(--portal-text-secondary,#475569);font-weight:500;letter-spacing:.02em;">${esc(t)}</span>`).join('')}</div>`
          : ''}
        ${item.descricao?`<div class="place-card-desc">${richToHtml(item.descricao)}</div>`:''}
        ${item.observacoes?`<div class="place-card-extra place-card-obs">💡 ${richToHtml(item.observacoes)}</div>`:''}
        ${detailsParts.length?`<div class="place-card-details">${detailsParts.join('')}</div>`:''}
        ${hasSite(item)?`<a class="pill-link" href="${esc(normalizeUrl(item.site))}" target="_blank" rel="noopener noreferrer">Visitar site</a>`:''}
        ${hasExtra?`<button class="place-card-toggle" type="button"><span class="toggle-label">Ver mais</span></button>`:''}
      </div>
    </div>`;
  };

  const heroCard=(item,idx,segDef=null)=>{const img=getImg(item,idx,segDef);return `<div class="hero-card">${favBtnHtml(item)}<div style="position:absolute;inset:0;">${img?`<img style="width:100%;height:100%;object-fit:cover;" src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${navy} 0%,${shade(navy,-20)} 100%);"></div>`}</div><div class="card-gradient"></div><div class="card-content">${item.categoria?`<div class="card-supertitle">${esc(item.categoria)}</div>`:''}<div class="card-title">${esc(item.titulo)}</div><div class="card-underline"></div></div></div>`;};

  const themeHtml=data.themeDesc?`<p style="padding:0 32px 24px;font-size:.875rem;color:var(--muted);font-style:italic;line-height:1.7;">${richToHtml(data.themeDesc)}</p>`:'';
  const agendaHtml=isAgenda&&data.periodoAgenda?`<div class="agenda-period">📅 ${esc(data.periodoAgenda)}</div>`:'';

  // Cards UNIFORMES — sem destaque hero/bento, todos iguais (preferência do user).
  // Layout em grid responsivo, fácil de escanear e expandir.
  // v4.63.39+ Subtítulos quebram o grid em sub-grupos. Render Strategy:
  // percorre items, acumula items normais em buffer; quando hitting subtitle
  // OU end, fecha buffer em <div class="cards-grid">, abre subtitle, recomeça.
  let itemsHtml = '';
  if (items.length) {
    let buffer = [];
    let bufferStartIdx = 0;
    const flushBuffer = () => {
      if (!buffer.length) return;
      itemsHtml += `<div class="cards-grid">${buffer.map((it, j) => card(it, bufferStartIdx + j, sd)).join('')}</div>`;
      buffer = [];
    };
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      if (it && it.type === 'subtitle' && it.text) {
        flushBuffer();
        itemsHtml += `<div class="seg-subtitle" style="margin:20px 32px 12px;padding:8px 14px;
          border-left:3px solid var(--portal-accent,var(--portal-primary,#D4A843));
          background:linear-gradient(90deg,rgba(212,168,67,0.10),transparent);
          font-weight:700;font-size:0.95rem;color:var(--portal-secondary,#1F2937);
          letter-spacing:.02em;border-radius:2px;">${esc(it.text)}</div>`;
        bufferStartIdx = i + 1;
      } else if (it && it.type !== 'subtitle') {
        if (!buffer.length) bufferStartIdx = i;
        buffer.push(it);
      }
    }
    flushBuffer();
  }

  return `${segHead(sd)}${themeHtml}${agendaHtml}${itemsHtml}`;
}

function scrollToSeg(key,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn?.classList.add('active');document.getElementById(`seg-${key}`)?.scrollIntoView({behavior:'smooth',block:'start'});}
window.scrollToSeg=scrollToSeg;

// v4.63.41+ Âncoras internas (links [texto](#seg-X)) usam smooth scroll
// em vez do jump default do browser. Captura no document por delegação.
document.addEventListener('click', (e) => {
  const link = e.target.closest('a[data-internal-link="1"]');
  if (!link) return;
  const href = link.getAttribute('href') || '';
  if (!href.startsWith('#seg-')) return;
  e.preventDefault();
  const targetId = href.slice(1);
  document.getElementById(targetId)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // atualiza highlight do cat-scroller se existe
  const segKey = targetId.replace(/^seg-/, '');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.cat-btn[onclick*="'${segKey}'"]`)?.classList.add('active');
});


function showErr(title,msg){document.getElementById('loading').style.display='none';document.getElementById('app').innerHTML=`<div class="error-state" style="margin-top:64px;"><div style="font-size:2.5rem;">✈</div><h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;}
</script>
</body>
