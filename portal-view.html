<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicas de Viagem · PRIMETOUR</title>
  <meta name="description" content="Material de viagem personalizado gerado pelo Portal de Dicas PRIMETOUR">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0&display=swap" rel="stylesheet">
  <style>
:root{--gold:#D4AF37;--navy:#242362;--light:#F8F7F4;--muted:#474650;--border:#E5E7EB;--white:#ffffff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--white);color:var(--navy);min-height:100vh;overflow-x:hidden}
#loading{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:9999;transition:opacity .5s}
#loading .brand{color:var(--gold);font-size:1.25rem;letter-spacing:.3em;font-weight:300}
.spinner-ring{width:40px;height:40px;border:2px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.site-header{position:fixed;top:0;width:100%;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(229,231,235,.5)}
.header-logo{font-size:.75rem;letter-spacing:.35em;font-weight:600;color:var(--navy)}
.header-dest{font-size:.6875rem;letter-spacing:.15em;font-weight:500;color:var(--muted);text-transform:uppercase}
.header-area-logo{height:26px;object-fit:contain}
.hero{position:relative;width:100%;height:100svh;min-height:560px;overflow:hidden;margin-top:64px}
.hero-img{width:100%;height:100%;object-fit:cover;transform-origin:center;animation:heroZoom 12s ease-out forwards}
@keyframes heroZoom{from{transform:scale(1.08)}to{transform:scale(1)}}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(36,35,98,.85) 0%,rgba(36,35,98,.2) 50%,transparent 100%)}
.hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:48px 32px}
.hero-label{font-size:.625rem;letter-spacing:.4em;font-weight:500;color:rgba(212,175,55,.9);text-transform:uppercase;margin-bottom:14px;display:block}
.hero-title{font-size:clamp(2.5rem,8vw,4.5rem);font-weight:600;color:#fff;line-height:1.1;letter-spacing:-.01em}
.hero-subtitle{font-size:.875rem;color:rgba(255,255,255,.7);margin-top:8px;font-weight:300;letter-spacing:.05em}
.hero-cta{display:inline-block;margin-top:28px;padding:14px 32px;background:var(--gold);color:#fff;font-size:.625rem;letter-spacing:.25em;font-weight:600;text-transform:uppercase;text-decoration:none;transition:filter .2s,transform .1s;cursor:pointer;border:none;font-family:'Poppins',sans-serif}
.hero-cta:hover{filter:brightness(1.1)}
.hero-cta:active{transform:scale(.97)}
.section-label{font-size:.625rem;letter-spacing:.3em;font-weight:500;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:6px}
.section-title{font-size:1.625rem;font-weight:600;color:var(--navy);line-height:1.2}
.cat-scroller{display:flex;overflow-x:auto;gap:28px;padding:4px 32px 16px;scrollbar-width:none}
.cat-scroller::-webkit-scrollbar{display:none}
.cat-btn{flex:none;display:flex;flex-direction:column;align-items:center;gap:10px;background:none;border:none;cursor:pointer;transition:all .25s}
.cat-icon{width:60px;height:60px;border-radius:50%;background:var(--light);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);transition:all .25s}
.cat-btn:hover .cat-icon,.cat-btn.active .cat-icon{background:rgba(36,35,98,.06);border-color:var(--gold)}
.cat-icon .material-symbols-outlined{font-size:22px;color:var(--navy)}
.cat-label{font-size:.5625rem;letter-spacing:.15em;font-weight:500;text-transform:uppercase;color:var(--muted);transition:color .25s;white-space:nowrap}
.cat-btn:hover .cat-label,.cat-btn.active .cat-label{color:var(--gold)}
.page-section{padding:64px 0}
.section-header{padding:0 32px;margin-bottom:32px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:var(--border);margin:0 32px}
.info-cell{background:var(--white);padding:20px}
.info-cell-label{font-size:.5625rem;letter-spacing:.2em;font-weight:600;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.info-cell-value{font-size:.9375rem;font-weight:500;color:var(--navy);line-height:1.4}
.clima-wrap{overflow-x:auto;margin:24px 32px 0}
.clima-table{width:100%;border-collapse:collapse;font-size:.8125rem}
.clima-table th{padding:8px 10px;font-size:.5625rem;letter-spacing:.15em;font-weight:600;text-transform:uppercase;color:var(--muted);background:var(--light);border-bottom:1px solid var(--border);text-align:center}
.clima-table th:first-child{text-align:left}
.clima-table td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border)}
.clima-table td:first-child{text-align:left;font-weight:600;font-size:.75rem}
.clima-max{color:#C2440A}.clima-min{color:#1D5FA6}
.rep-block{margin:24px 32px 0;padding:20px 24px;background:var(--light);border-left:3px solid var(--gold)}
.rep-title{font-size:.5625rem;letter-spacing:.25em;font-weight:700;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.rep-row{font-size:.875rem;margin-bottom:6px;color:var(--muted)}
.rep-row strong{color:var(--navy)}.rep-row a{color:var(--gold);text-decoration:none}
.hero-card{position:relative;overflow:hidden;aspect-ratio:4/5;width:100%;cursor:pointer}
.hero-card img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.hero-card:hover img{transform:scale(1.06)}
.card-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(36,35,98,.88) 0%,transparent 55%)}
.card-content{position:absolute;bottom:28px;left:28px;right:28px}
.card-supertitle{font-size:.5625rem;letter-spacing:.4em;font-weight:500;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.card-title{font-size:1.75rem;font-weight:600;color:#fff;line-height:1.2}
.card-underline{height:1px;width:36px;background:var(--gold);margin-top:14px;transform:scaleX(0);transform-origin:left;transition:transform .5s}
.hero-card:hover .card-underline{transform:scaleX(1)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);margin:0 32px}
.place-card{background:var(--white)}
.place-card-img{position:relative;aspect-ratio:16/9;overflow:hidden}
.place-card-img img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.place-card:hover .place-card-img img{transform:scale(1.05)}
.place-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;aspect-ratio:16/9}
.place-card-body{padding:20px}
.place-cat-label{font-size:.5rem;letter-spacing:.25em;font-weight:700;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.place-card-title{font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:8px;line-height:1.3}
.place-card-desc{font-size:.8125rem;color:var(--muted);line-height:1.6;margin-bottom:12px}
.place-card-details{display:flex;flex-wrap:wrap;gap:10px;font-size:.75rem;color:var(--muted)}
.place-card-details a{color:var(--gold);text-decoration:none}
.place-card-obs{margin-top:10px;font-size:.75rem;color:var(--muted);font-style:italic;border-top:1px solid var(--border);padding-top:10px}
.bento-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.bento-card{position:relative;overflow:hidden;aspect-ratio:3/4}
.bento-card img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.bento-card:hover img{transform:scale(1.07)}
.simple-list{margin:0 32px}
.simple-item{padding:20px 0;border-bottom:1px solid var(--border)}
.simple-item:last-child{border-bottom:none}
.simple-item-title{font-size:.9375rem;font-weight:600;color:var(--navy);margin-bottom:6px}
.simple-item-desc{font-size:.8125rem;color:var(--muted);line-height:1.6}
.agenda-period{display:inline-flex;align-items:center;gap:8px;margin:0 32px 20px;font-size:.75rem;color:var(--gold);font-weight:500;letter-spacing:.05em}
.agenda-period::before{content:'';width:20px;height:1px;background:var(--gold)}
.seg-heading{display:flex;align-items:center;gap:14px;padding:0 32px;margin-bottom:28px}
.seg-heading-bar{width:3px;height:28px;background:var(--gold);flex-shrink:0}
.seg-heading-text{font-size:1rem;font-weight:600;color:var(--navy);letter-spacing:.02em}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;z-index:100;display:flex;overflow-x:auto;gap:0;padding:0 24px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);scrollbar-width:none}
.bottom-nav::-webkit-scrollbar{display:none}
.bottom-nav a{flex:none;padding:18px 16px;font-size:.625rem;letter-spacing:.18em;font-weight:600;text-transform:uppercase;text-decoration:none;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--navy);border-bottom-color:var(--gold)}
.dest-tabs{display:flex;overflow-x:auto;gap:0;border-bottom:1px solid var(--border);padding:0 32px;scrollbar-width:none}
.dest-tabs::-webkit-scrollbar{display:none}
.dest-tab{flex:none;padding:16px 20px;font-size:.75rem;letter-spacing:.12em;font-weight:600;text-transform:uppercase;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;font-family:'Poppins',sans-serif}
.dest-tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.site-footer{background:var(--navy);padding:40px 32px;text-align:center;margin-bottom:64px}
.footer-brand{color:var(--gold);font-size:.75rem;letter-spacing:.3em;font-weight:600}
.footer-sub{color:rgba(255,255,255,.4);font-size:.6875rem;margin-top:8px}
.error-state{min-height:80vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:40px;text-align:center;color:var(--muted)}
.error-state h2{color:var(--gold);font-size:1.25rem;font-weight:600}
@media(max-width:600px){.hero-content{padding:32px 20px}.cards-grid{margin:0;grid-template-columns:1fr}.info-grid{margin:0}.simple-list{margin:0 20px}.section-header{padding:0 20px}.seg-heading{padding:0 20px}.cat-scroller{padding:4px 20px 16px}.rep-block{margin:24px 20px 0}.clima-wrap{margin:24px 20px 0}.agenda-period{margin:0 20px 20px}}
  </style>
</head>
<body>
<div id="loading"><div class="spinner-ring"></div><div class="brand">PRIMETOUR</div></div>
<header class="site-header" id="site-header" style="display:none;">
  <span class="header-logo">PRIMETOUR</span>
  <span class="header-dest" id="header-dest"></span>
  <img id="area-logo" class="header-area-logo" style="display:none;" alt="">
</header>
<nav class="bottom-nav" id="bottom-nav" style="display:none;"></nav>
<div id="app"></div>
<footer class="site-footer" id="site-footer" style="display:none;">
  <div class="footer-brand">PORTAL DE DICAS · PRIMETOUR</div>
  <div class="footer-sub" id="footer-date"></div>
</footer>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './js/config.js';

const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const SEGMENTS=[
  {key:'informacoes_gerais',label:'Informações', icon:'info'},
  {key:'bairros',           label:'Bairros',      icon:'location_city'},
  {key:'atracoes',          label:'Atrações',     icon:'visibility'},
  {key:'atracoes_criancas', label:'Crianças',     icon:'child_care'},
  {key:'restaurantes',      label:'Gastronomia',  icon:'restaurant'},
  {key:'vida_noturna',      label:'Vida Noturna', icon:'nightlife'},
  {key:'espetaculos',       label:'Espetáculos',  icon:'theater_comedy'},
  {key:'compras',           label:'Compras',      icon:'shopping_bag'},
  {key:'arredores',         label:'Arredores',    icon:'explore'},
  {key:'highlights',        label:'Highlights',   icon:'star'},
  {key:'agenda_cultural',   label:'Agenda',       icon:'event'},
];

const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shade=(hex,amt)=>{const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+amt));const g=Math.min(255,Math.max(0,((n>>8)&0xff)+amt));const b=Math.min(255,Math.max(0,(n&0xff)+amt));return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')};

const app=initializeApp(firebaseConfig,'portal-view');
const db=getFirestore(app);

(async()=>{
  const token=window.location.hash.slice(1);
  const appEl=document.getElementById('app');
  document.getElementById('footer-date').textContent=new Date().toLocaleDateString('pt-BR',{year:'numeric',month:'long'});
  if(!token){showErr('Link inválido','Este link não contém um token de acesso.');return;}
  let snap;
  try{snap=await getDoc(doc(db,'portal_web_links',token));}
  catch(e){showErr('Erro de conexão','Não foi possível carregar. Tente novamente.');return;}
  if(!snap.exists()){showErr('Link não encontrado','Este link pode ter expirado ou foi removido.');return;}
  const data=snap.data();
  updateDoc(doc(db,'portal_web_links',token),{views:increment(1)}).catch(()=>{});

  const colors=data.colors||{};
  const primary=colors.primary||'#D4AF37';
  const secondary=colors.secondary||'#242362';
  document.documentElement.style.setProperty('--gold',primary);
  document.documentElement.style.setProperty('--navy',secondary);
  if(data.areaLogoUrl){const img=document.getElementById('area-logo');img.src=data.areaLogoUrl;img.style.display='block';}

  const allTips=data.tipData||[];
  const segments=data.segments||[];
  const imagesByDest=data.imagesByDest||{};
  const activeSegs=segments.filter(k=>allTips.some(({tip})=>{const seg=tip?.segments?.[k];if(!seg)return false;if(seg.info&&Object.values(seg.info).some(v=>v&&String(v).trim()))return true;return Array.isArray(seg.items)&&seg.items.length>0;}));

  const nav=document.getElementById('bottom-nav');
  if(activeSegs.length>1){
    nav.style.display='flex';
    activeSegs.forEach((k,i)=>{const seg=SEGMENTS.find(s=>s.key===k);const a=document.createElement('a');a.href=`#seg-${k}`;a.textContent=seg?.label||k;if(i===0)a.className='active';nav.appendChild(a);});
  }
  document.getElementById('site-header').style.display='flex';
  document.getElementById('site-footer').style.display='block';

  if(allTips.length>1){renderMulti(appEl,allTips,segments,activeSegs,imagesByDest);}
  else{const{tip,dest}=allTips[0]||{};renderSingle(appEl,tip,dest,segments,activeSegs,imagesByDest[dest?.id]||{},true);}

  new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id.replace('seg-','');nav.querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')===`#seg-${id}`));}});},{threshold:0.3}).observe=function(el){document.querySelectorAll('[id^="seg-"]').forEach(el=>this.observe(el));};
  setTimeout(()=>{const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){const id=e.target.id.replace('seg-','');nav.querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.getAttribute('href')===`#seg-${id}`));}});},{threshold:0.25});document.querySelectorAll('[id^="seg-"]').forEach(el=>io.observe(el));},500);

  const loading=document.getElementById('loading');loading.style.opacity='0';setTimeout(()=>loading.style.display='none',500);
})();

function renderMulti(container,allTips,segments,activeSegs,imagesByDest){
  const fd=allTips[0]?.dest;document.getElementById('header-dest').textContent=[fd?.city,fd?.country].filter(Boolean).join(', ');
  container.innerHTML=`<div style="margin-top:64px;"><div class="dest-tabs" id="dtabs">${allTips.map((item,i)=>{const d=item.dest;const lbl=[d?.city,d?.country].filter(Boolean).join(', ')||`Destino ${i+1}`;return `<button class="dest-tab${i===0?' active':''}" data-idx="${i}">${esc(lbl)}</button>`;}).join('')}</div><div id="dcontent"></div></div>`;
  const rt=idx=>{const{tip,dest}=allTips[idx];const imgs=imagesByDest[dest?.id]||{};document.getElementById('header-dest').textContent=[dest?.city,dest?.country].filter(Boolean).join(', ');const c=document.createElement('div');renderSingle(c,tip,dest,segments,activeSegs,imgs,false);document.getElementById('dcontent').replaceWith(c);c.id='dcontent';};
  document.getElementById('dtabs')?.querySelectorAll('.dest-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.dest-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rt(Number(btn.dataset.idx));});});
  rt(0);
}

function renderSingle(container,tip,dest,segments,activeSegs,imgs,pad){
  const city=dest?.city||dest?.country||'—';const country=dest?.country||dest?.continent||'';
  document.getElementById('header-dest').textContent=[city,country].filter(Boolean).join(', ');
  const heroImg=imgs.hero||null;
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim();
  container.innerHTML=`
<section class="hero" style="${pad?'':'margin-top:0;'}">
  ${heroImg?`<img class="hero-img" src="${esc(heroImg)}" alt="${esc(city)}" onerror="this.style.display='none'">`:`<div class="hero-placeholder" style="background:linear-gradient(135deg,${navy} 0%,${shade(navy,-20)} 100%);"></div>`}
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <span class="hero-label">Portal de Dicas · PRIMETOUR</span>
    <h1 class="hero-title">Bem-vindo(a)<br>a ${esc(city)}</h1>
    ${country?`<p class="hero-subtitle">${esc(country)}</p>`:''}
    <button class="hero-cta" onclick="document.querySelector('[id^=seg-]')?.scrollIntoView({behavior:'smooth'})">descobrir o destino</button>
  </div>
</section>
${activeSegs.length>1?`<section style="padding:48px 0 32px;"><div class="section-header"><span class="section-label">Categorias</span><h2 class="section-title">O que explorar</h2></div><div class="cat-scroller">${activeSegs.map((k,i)=>{const seg=SEGMENTS.find(s=>s.key===k);return `<button class="cat-btn${i===0?' active':''}" onclick="scrollToSeg('${k}',this)"><div class="cat-icon"><span class="material-symbols-outlined">${seg?.icon||'info'}</span></div><span class="cat-label">${esc(seg?.label||k)}</span></button>`;}).join('')}</div></section>`:''}
${segments.map(segKey=>{const segDef=SEGMENTS.find(s=>s.key===segKey);const data=tip?.segments?.[segKey];if(!segDef||!data)return '';const html=renderSeg(segDef,data,imgs);if(!html)return '';return `<section class="page-section" id="seg-${segKey}">${html}</section>`;}).join('')}`;
}

function segHead(sd){return `<div class="seg-heading"><div class="seg-heading-bar"></div><span class="seg-heading-text">${esc(sd.label)}</span></div>`;}

function renderSeg(sd,data,imgs){
  if(sd.key==='informacoes_gerais')return renderInfo(sd,data);
  if(sd.key==='bairros'||sd.key==='arredores')return renderSimple(sd,data);
  return renderPlaces(sd,data,imgs,sd.key==='agenda_cultural');
}

function renderInfo(sd,data){
  const inf=data.info||{};
  const fields=[['Descrição',inf.descricao],['Dica',inf.dica],['População',inf.populacao],['Moeda',inf.moeda],['Língua oficial',inf.lingua],['Religião',inf.religiao],['Fuso horário',inf.fusoSinal&&inf.fusoHoras?`${inf.fusoSinal}${inf.fusoHoras}h de Brasília`:''],['Voltagem',inf.voltagem],['DDD',inf.ddd]].filter(([,v])=>v);
  if(!fields.length&&!inf.clima)return '';
  const cli=inf.clima||{};const hasC=MONTHS.some((_,i)=>cli[`max_${i}`]||cli[`min_${i}`]);
  const rep=inf.representacao||{};
  return `${segHead(sd)}<div class="info-grid">${fields.map(([l,v])=>`<div class="info-cell"><div class="info-cell-label">${esc(l)}</div><div class="info-cell-value">${esc(v)}</div></div>`).join('')}</div>${hasC?`<div class="clima-wrap"><table class="clima-table"><thead><tr><th>°C</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody><tr class="clima-max"><td>Máx ↑</td>${MONTHS.map((_,i)=>`<td>${cli[`max_${i}`]??'—'}</td>`).join('')}</tr><tr class="clima-min"><td>Mín ↓</td>${MONTHS.map((_,i)=>`<td>${cli[`min_${i}`]??'—'}</td>`).join('')}</tr></tbody></table></div>`:''}${rep.nome?`<div class="rep-block"><div class="rep-title">Representação Brasileira</div>${rep.nome?`<div class="rep-row"><strong>Nome:</strong> ${esc(rep.nome)}</div>`:''}${rep.endereco?`<div class="rep-row"><strong>Endereço:</strong> ${esc(rep.endereco)}</div>`:''}${rep.telefone?`<div class="rep-row"><strong>Telefone:</strong> ${esc(rep.telefone)}</div>`:''}${rep.link?`<div class="rep-row"><strong>Site:</strong> <a href="${esc(rep.link)}" target="_blank">${esc(rep.link)}</a></div>`:''}</div>`:''}`;
}

function renderSimple(sd,data){
  const items=(data.items||[]).filter(i=>i.title);if(!items.length)return '';
  return `${segHead(sd)}<div class="simple-list">${items.map(item=>`<div class="simple-item"><div class="simple-item-title">${esc(item.title)}</div>${item.description?`<div class="simple-item-desc">${esc(item.description)}</div>`:''}</div>`).join('')}</div>`;
}

function renderPlaces(sd,data,imgs,isAgenda){
  const items=(data.items||[]).filter(i=>i.titulo);if(!items.length&&!data.themeDesc)return '';
  const gallery=imgs.gallery||[];
  const gold=getComputedStyle(document.documentElement).getPropertyValue('--gold').trim();
  const navy=getComputedStyle(document.documentElement).getPropertyValue('--navy').trim();

  // Track which gallery images have been used so we don't repeat
  const usedImgUrls = new Set();

  const getImg=(item,idx)=>{
    const title = (item.titulo||'').toLowerCase().trim();
    const cat   = (item.categoria||'').toLowerCase();

    // Priority 1: exact placeName match
    let m = gallery.find(g => g.placeName && g.placeName.toLowerCase().trim() === title);

    // Priority 2: placeName partial match (title contains placeName or vice versa)
    if (!m) m = gallery.find(g => g.placeName &&
      (title.includes(g.placeName.toLowerCase()) || g.placeName.toLowerCase().includes(title.slice(0,15)))
    );

    // Priority 3: name/tag matches title keywords
    if (!m) {
      const words = title.split(/\s+/).filter(w => w.length > 3);
      m = gallery.find(g =>
        words.some(w => g.name?.toLowerCase().includes(w)) ||
        g.tags?.some(t => words.some(w => t.toLowerCase().includes(w)))
      );
    }

    // Priority 4: tag matches segment category
    if (!m) m = gallery.find(g =>
      !usedImgUrls.has(g.url) &&
      g.tags?.some(t => cat.includes(t.toLowerCase()) || t.toLowerCase().includes(cat.slice(0,6)))
    );

    // Priority 5: cyclic fallback — prefer unused images
    if (!m) {
      const unused = gallery.filter(g => !usedImgUrls.has(g.url));
      m = unused.length ? unused[idx % unused.length] : gallery[idx % Math.max(gallery.length,1)];
    }

    if (m?.url) usedImgUrls.add(m.url);
    return m?.url || null;
  };

  const ph=(lbl)=>`<div class="place-card-placeholder" style="background:linear-gradient(135deg,${navy}18 0%,${gold}22 100%);"><span style="font-size:.5rem;letter-spacing:.3em;font-weight:600;text-transform:uppercase;color:${navy};opacity:.4;">${esc(lbl||'')}</span></div>`;

  const card=(item,idx)=>{const img=getImg(item,idx);return `<div class="place-card"><div class="place-card-img">${img?`<img src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy"><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(36,35,98,.12),transparent);pointer-events:none;"></div>`:ph(item.titulo)}</div><div class="place-card-body">${item.categoria?`<div class="place-cat-label">${esc(item.categoria)}</div>`:''}<div class="place-card-title">${esc(item.titulo)}</div>${isAgenda&&(item.periodo||item.periodoIndeterminado)?`<div style="font-size:.75rem;color:var(--gold);margin-bottom:8px;font-weight:500;">◷ ${item.periodoIndeterminado?'Tempo indeterminado':esc(item.periodo||'')}</div>`:''}${item.descricao?`<div class="place-card-desc">${esc(item.descricao)}</div>`:''}<div class="place-card-details">${item.endereco?`<span>📍 ${esc(item.endereco)}</span>`:''}${item.telefone?`<span>📞 ${esc(item.telefone)}</span>`:''}${item.site?`<a href="${esc(item.site)}" target="_blank" rel="noopener">🌐 Site oficial</a>`:''}</div>${item.observacoes?`<div class="place-card-obs">💡 ${esc(item.observacoes)}</div>`:''}</div></div>`;};

  const heroCard=(item,idx)=>{const img=getImg(item,idx);return `<div class="hero-card"><div style="position:absolute;inset:0;">${img?`<img style="width:100%;height:100%;object-fit:cover;" src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${navy} 0%,${shade(navy,-20)} 100%);"></div>`}</div><div class="card-gradient"></div><div class="card-content">${item.categoria?`<div class="card-supertitle">${esc(item.categoria)}</div>`:''}<div class="card-title">${esc(item.titulo)}</div><div class="card-underline"></div></div></div>`;};

  const themeHtml=data.themeDesc?`<p style="padding:0 32px 24px;font-size:.875rem;color:var(--muted);font-style:italic;line-height:1.7;">${esc(data.themeDesc)}</p>`:'';
  const agendaHtml=isAgenda&&data.periodoAgenda?`<div class="agenda-period">📅 ${esc(data.periodoAgenda)}</div>`:'';

  let itemsHtml='';
  if(items.length===0)itemsHtml='';
  else if(items.length===1)itemsHtml=heroCard(items[0],0);
  else if(items.length===2)itemsHtml=heroCard(items[0],0)+`<div class="cards-grid" style="margin-top:1px;">${card(items[1],1)}</div>`;
  else itemsHtml=heroCard(items[0],0)+`<div class="bento-grid" style="margin-top:1px;">${items.slice(1,3).map((item,i)=>{const img=getImg(item,i+1);return `<div class="bento-card"><div style="position:absolute;inset:0;">${img?`<img style="width:100%;height:100%;object-fit:cover;" src="${esc(img)}" alt="${esc(item.titulo)}" loading="lazy">`:`<div style="width:100%;height:100%;background:linear-gradient(135deg,${navy}dd,${shade(navy,-15)});"></div>`}</div><div class="card-gradient"></div><div class="card-content">${item.categoria?`<div class="card-supertitle" style="font-size:.5rem;">${esc(item.categoria)}</div>`:''}<div class="card-title" style="font-size:1.375rem;">${esc(item.titulo)}</div></div></div>`;}).join('')}</div>${items.length>3?`<div class="cards-grid" style="margin-top:1px;">${items.slice(3).map((item,i)=>card(item,i+3)).join('')}</div>`:''}`;

  return `${segHead(sd)}${themeHtml}${agendaHtml}${itemsHtml}`;
}

function scrollToSeg(key,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn?.classList.add('active');document.getElementById(`seg-${key}`)?.scrollIntoView({behavior:'smooth',block:'start'});}
window.scrollToSeg=scrollToSeg;


function showErr(title,msg){document.getElementById('loading').style.display='none';document.getElementById('app').innerHTML=`<div class="error-state" style="margin-top:64px;"><div style="font-size:2.5rem;">✈</div><h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;}
</script>
</body>
</html>
