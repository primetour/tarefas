<!DOCTYPE html>
<html lang="pt-BR">
<script>
  // Aplica paleta e fonte salvas antes do render para evitar flash
  (function(){
    var p=localStorage.getItem('primetour-palette')||'midnight';
    var f=localStorage.getItem('primetour-font')||'';
    document.documentElement.dataset.palette=p;
    if(f&&f!=='outfit') document.documentElement.dataset.font=f;
  })();
</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PRIMETOUR — Plataforma de Gestão de Tarefas e Projetos" />
  <meta name="theme-color" content="#0A1628" />

  <!-- CSP — Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdn.chart.js https://cdnjs.cloudflare.com https://apis.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https:;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://www.gstatic.com
                https://firestore.googleapis.com https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com https://api.groq.com https://api.openai.com
                https://api.anthropic.com https://generativelanguage.googleapis.com
                https://api.github.com https://hooks.slack.com wss://*.firebaseio.com
                https://google.serper.dev https://*.cse.google.com
                https://primetour-images.rene-castro.workers.dev
                https://api.emailjs.com
                https://login.microsoftonline.com https://login.live.com https://graph.microsoft.com;
    frame-src   'self' https://*.firebaseapp.com https://login.microsoftonline.com https://login.live.com https://apis.google.com;
    object-src  'none';
    base-uri    'self';
  " />

  <title>PRIMETOUR · Gestão de Tarefas</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tasks.css" />
  <link rel="stylesheet" href="css/dashboards.css" />
  <link rel="stylesheet" href="css/csat.css" />
  <link rel="stylesheet" href="css/integrations.css" />
  <link rel="stylesheet" href="css/portal.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- Loading Screen (removida após auth check) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <img src="assets/mandala-branca.png" alt="PRIMETOUR"
        style="width:48px;height:48px;object-fit:contain;" />
      <span class="loading-logo-text">PRIMETOUR</span>
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <span style="font-size:0.75rem; color:var(--text-muted); letter-spacing:0.1em;">
      CARREGANDO PLATAFORMA...
    </span>
  </div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container (também criado pelo JS, mas declarado aqui como fallback) -->
  <div id="toast-container"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Firebase SDK (via CDN - sem necessidade de bundler) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
