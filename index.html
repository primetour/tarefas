<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- 4.40.21+ (security audit) — scripts inline movidos pra js/preload.js
       e js/splash.js. Permite remover 'unsafe-inline' do CSP no futuro. -->
  <script src="js/preload.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestor PRIMETOUR — Plataforma interna de Gestão de Tarefas e Projetos" />
  <meta name="theme-color" content="#0A1628" />

  <!-- ═══ SECURITY HEADERS (mitigações XSS/clickjacking/leak) ═══
       Equivalente meta HTTP — alguns só funcionam via response header
       (X-Frame-Options, Strict-Transport-Security). Quando migrar pra
       Cloudflare Pages (Sprint 4), adicionar via _headers file. -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="permissions-policy" content="camera=(), microphone=(self), geolocation=(self), interest-cohort=()" />

  <!-- 4.48.3+ Cache control — instrui browser a sempre revalidar index.html
       com servidor. Resolve "loop de login" pós-deploy: quando browser
       cacheia index.html antigo (com app.js?v=OLD), os imports estáticos
       puxam módulos JS cacheados e quebram boot em cascata. Com no-cache,
       browser sempre busca index.html fresh → pega a nova versão do app.js
       imediatamente. Módulos JS ainda têm seu cache via ?v=, mas o
       index.html sempre indica a versão atual. -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />

  <!-- CSP — Content Security Policy
       4.40.21+ (security audit): img-src wildcard `https:` substituído por
       whitelist explícita (R2, Worker, Wikipedia, Unsplash). form-action
       adicionada. frame-ancestors 'self' bloqueia clickjacking via iframe.
       'unsafe-inline' em style mantido (componentes usam style="..." pesado);
       em script será removível após migração pra build com nonce.

       4.49.56 (hotfix CSP-AppCheck): adicionados subdomínios `content-*`
       que Firebase SDK passou a usar em paralelo aos canônicos (separação
       de contexto CORS). Sem isso, App Check falha → Firestore retorna
       `permission-denied` em todas as escritas. Cobertos:
       - content-firebaseappcheck.googleapis.com (causa raiz do bug atual)
       - content-firestore.googleapis.com  (defesa preventiva)
       - content-identitytoolkit.googleapis.com  (idem)
       - content-firebaseinstallations.googleapis.com  (idem)
       Padrão Firebase: se aparecer outro content-X.googleapis.com no
       devtools, é o mesmo caso — adicionar à whitelist. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://www.googletagmanager.com https://cdn.jsdelivr.net https://cdn.chart.js https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https://pub-ad909dc0c977450a93ee5faa79c7374d.r2.dev https://primetour-images.rene-castro.workers.dev https://upload.wikimedia.org https://images.unsplash.com https://lh3.googleusercontent.com https://graph.microsoft.com https://www.gstatic.com https://i.imgur.com https://www.google.com https://www.googletagmanager.com https://image.viagens.newsletterprime.com.br https://image.viagens.partnersbtgpactual.com.br https://image.viagens.ultrabtgpactual.tur.br https://image.viagens.mktpts.tur.br https://image.centurion.mktpts.tur.br https://ftpprime.blob.core.windows.net https://image.exct.net https://image.s10.exacttarget.com https://storage.googleapis.com;
    connect-src 'self' https://firestore.googleapis.com https://content-firestore.googleapis.com https://identitytoolkit.googleapis.com https://content-identitytoolkit.googleapis.com https://securetoken.googleapis.com https://oauth2.googleapis.com https://content.googleapis.com https://www.googleapis.com https://us-central1-gestor-de-tarefas-primetour.cloudfunctions.net https://gestor-de-tarefas-primetour.firebaseio.com wss://gestor-de-tarefas-primetour.firebaseio.com https://gestor-de-tarefas-primetour-default-rtdb.firebaseio.com wss://gestor-de-tarefas-primetour-default-rtdb.firebaseio.com https://firebaseinstallations.googleapis.com https://content-firebaseinstallations.googleapis.com https://firebaseappcheck.googleapis.com https://content-firebaseappcheck.googleapis.com https://www.gstatic.com https://www.google.com https://api.groq.com https://api.openai.com https://api.anthropic.com https://generativelanguage.googleapis.com https://api.github.com https://raw.githubusercontent.com https://hooks.slack.com https://google.serper.dev https://cse.google.com https://primetour-images.rene-castro.workers.dev https://upload.wikimedia.org https://images.unsplash.com https://api.emailjs.com https://primetour.com.br https://www.primetour.com.br https://login.microsoftonline.com https://login.live.com https://graph.microsoft.com https://nominatim.openstreetmap.org https://speed.cloudflare.com;
    frame-src   'self' https://gestor-de-tarefas-primetour.firebaseapp.com https://login.microsoftonline.com https://login.live.com https://apis.google.com https://accounts.google.com https://content.googleapis.com https://www.google.com https://recaptcha.google.com;
    object-src  'none';
    base-uri    'self';
    form-action 'self' https://login.microsoftonline.com;
    frame-ancestors 'self';
  " />

  <title>Gestor PRIMETOUR</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <!-- Modal Container -->

  <!-- Firebase SDK (via CDN - sem necessidade de bundler).
       v= bumpa em commits que tocam código crítico (sidebar/branding)
       pra forçar refetch — GitHub Pages serve com max-age=600 e
       browsers cacheiam módulos por URL. -->
  <!-- Cache-bust: deve casar com FULL de js/version.js (4.31.0+20260508-csat-custom-questions).
       GitHub Pages serve com max-age=600 e browsers cacheiam módulos por URL.
       Bump aqui sempre que js/version.js for atualizado. -->
  <script type="module" src="js/app.js?v=4.62.20+20260527-editor-fase-e-wizard-entry-cotacao-nova"></script>
