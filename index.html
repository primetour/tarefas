<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PRIMETOUR — Plataforma de Gestão de Tarefas e Projetos" />
  <meta name="theme-color" content="#0A1628" />

  <title>PRIMETOUR · Gestão de Tarefas</title>

  <!-- Favicon inline SVG via data URI -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23D4A843'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%230A1628'>✦</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <!-- Loading Screen (removida após auth check) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <div class="loading-logo-icon">✦</div>
      <span class="loading-logo-text">PRIMETOUR</span>
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <span style="font-size:0.75rem; color:var(--text-muted); letter-spacing:0.1em;">
      CARREGANDO PLATAFORMA...
    </span>
  </div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container (também criado pelo JS, mas declarado aqui como fallback) -->
  <div id="toast-container"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Firebase SDK (via CDN - sem necessidade de bundler) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
