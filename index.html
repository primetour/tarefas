<!DOCTYPE html>
<html lang="pt-BR">
<script>
  // Aplica paleta e fonte salvas antes do render para evitar flash
  (function(){
    var p=localStorage.getItem('primetour-palette')||'portal';
    var f=localStorage.getItem('primetour-font')||'';
    document.documentElement.dataset.palette=p;
    if(f&&f!=='outfit') document.documentElement.dataset.font=f;
  })();
  // Limpa qualquer cropped legacy do localStorage (versões antigas
  // do sidebar.js cropavam erradamente em alguns browsers e o cropped
  // ficava cacheado servindo a imagem errada). Sidebar agora usa
  // URLs diretas hardcoded — nada mais é lido de localStorage.
  (function(){
    try {
      ['app-logo-light-cropped','app-logo-dark-cropped'].forEach(function(k){
        localStorage.removeItem(k);
      });
    } catch(e) {}
  })();
</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestor PRIMETOUR — Plataforma interna de Gestão de Tarefas e Projetos" />
  <meta name="theme-color" content="#0A1628" />

  <!-- ═══ SECURITY HEADERS (mitigações XSS/clickjacking/leak) ═══
       Equivalente meta HTTP — alguns só funcionam via response header
       (X-Frame-Options, Strict-Transport-Security). Quando migrar pra
       Cloudflare Pages (Sprint 4), adicionar via _headers file. -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="permissions-policy" content="camera=(), microphone=(self), geolocation=(self), interest-cohort=()" />

  <!-- CSP — Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://www.googletagmanager.com https://cdn.jsdelivr.net https://cdn.chart.js https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https:;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://www.gstatic.com https://www.google.com
                https://firestore.googleapis.com https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com https://api.groq.com https://api.openai.com
                https://api.anthropic.com https://generativelanguage.googleapis.com
                https://api.github.com https://raw.githubusercontent.com https://hooks.slack.com wss://*.firebaseio.com
                https://google.serper.dev https://*.cse.google.com
                https://primetour-images.rene-castro.workers.dev
                https://upload.wikimedia.org https://images.unsplash.com
                https://api.emailjs.com
                https://primetour.com.br https://www.primetour.com.br
                https://login.microsoftonline.com https://login.live.com https://graph.microsoft.com
                https://nominatim.openstreetmap.org
                https://speed.cloudflare.com
                https://oauth2.googleapis.com https://content.googleapis.com https://www.googleapis.com;
    frame-src   'self' https://*.firebaseapp.com https://login.microsoftonline.com https://login.live.com https://apis.google.com https://accounts.google.com https://content.googleapis.com https://www.google.com https://recaptcha.google.com;
    object-src  'none';
    base-uri    'self';
  " />

  <title>Gestor PRIMETOUR</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tasks.css" />
  <link rel="stylesheet" href="css/dashboards.css" />
  <link rel="stylesheet" href="css/csat.css" />
  <link rel="stylesheet" href="css/integrations.css" />
  <link rel="stylesheet" href="css/portal.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <!-- Loading Screen (removida após auth check) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo" id="loading-logo-wrapper">
      <img src="assets/mandala-branca.png" alt="PRIMETOUR" id="loading-logo-img"
        style="width:130px;height:130px;object-fit:contain;" />
      <span class="loading-logo-text" id="loading-logo-text">PRIMETOUR</span>
    </div>
    <script>
      // Aplica logo no loading splash. Mapping EXPLÍCITO por paleta.
      // SEM cropped, SEM localStorage — URLs diretas hardcoded.
      // Garantia 100% determinística independente de cache do browser.
      (function() {
        try {
          var LIGHT_LOGO = 'https://pub-ad909dc0c977450a93ee5faa79c7374d.r2.dev/logos/lazer-1777390896671.webp';
          var DARK_LOGO  = 'https://pub-ad909dc0c977450a93ee5faa79c7374d.r2.dev/logos/lazer-alt-1777403810065.webp';
          var palette = document.documentElement.getAttribute('data-palette') || 'midnight';
          var useDark = (palette === 'platinum' || palette === 'sand');
          var url = useDark ? DARK_LOGO : LIGHT_LOGO;
          var img = document.getElementById('loading-logo-img');
          var txt = document.getElementById('loading-logo-text');
          if (img) {
            img.src = url;
            img.style.width = 'auto';
            img.style.height = '120px';
            img.style.maxWidth = '480px';
          }
          if (txt) txt.style.display = 'none';
        } catch (e) {}
      })();
    </script>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <span style="font-size:0.75rem; color:var(--text-muted); letter-spacing:0.1em;">
      CARREGANDO PLATAFORMA...
    </span>
  </div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container (também criado pelo JS, mas declarado aqui como fallback) -->
  <div id="toast-container"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Firebase SDK (via CDN - sem necessidade de bundler).
       v= bumpa em commits que tocam código crítico (sidebar/branding)
       pra forçar refetch — GitHub Pages serve com max-age=600 e
       browsers cacheiam módulos por URL. -->
  <script type="module" src="js/app.js?v=20260505fbar"></script>

</body>
</html>
