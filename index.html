<!DOCTYPE html>
<html lang="pt-BR">
<script>
  // Aplica tema salvo antes do render para evitar flash
  (function(){var t=localStorage.getItem('primetour-theme');if(t)document.documentElement.dataset.theme=t;})();
</script>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="PRIMETOUR — Plataforma de Gestão de Tarefas e Projetos" />
  <meta name="theme-color" content="#0A1628" />

  <title>PRIMETOUR · Gestão de Tarefas</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tasks.css" />
  <link rel="stylesheet" href="css/dashboards.css" />
  <link rel="stylesheet" href="css/csat.css" />
  <link rel="stylesheet" href="css/integrations.css" />
  <link rel="stylesheet" href="css/portal.css" />
</head>
<body>

  <!-- Loading Screen (removida após auth check) -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <img src="assets/mandala-branca.png" alt="PRIMETOUR"
        style="width:48px;height:48px;object-fit:contain;" />
      <span class="loading-logo-text">PRIMETOUR</span>
    </div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <span style="font-size:0.75rem; color:var(--text-muted); letter-spacing:0.1em;">
      CARREGANDO PLATAFORMA...
    </span>
  </div>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Container (também criado pelo JS, mas declarado aqui como fallback) -->
  <div id="toast-container"></div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Firebase SDK (via CDN - sem necessidade de bundler) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
