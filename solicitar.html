<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitações — PRIMETOUR</title>
  <meta name="description" content="Portal de solicitações de demandas para o time de produção PRIMETOUR." />
  <meta name="robots" content="noindex" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSP for Firebase Auth + Microsoft SSO -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https:;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://www.gstatic.com
                https://firestore.googleapis.com https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com wss://*.firebaseio.com
                https://login.microsoftonline.com https://login.live.com https://graph.microsoft.com
                https://api.emailjs.com;
    frame-src   'self' https://*.firebaseapp.com https://login.microsoftonline.com https://login.live.com https://apis.google.com;
    object-src  'none';
    base-uri    'self';
  " />

  <!-- Portal styles -->
  <link rel="stylesheet" href="css/portal.css" />
</head>
<body>
  <div id="portal-root">
    <!-- Loading state -->
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Outfit',sans-serif;background:#0A1628;color:#94A3B8;flex-direction:column;gap:16px;">
      <img src="assets/mandala-branca.png" alt="PRIMETOUR"
        style="width:36px;height:36px;border-radius:var(--radius-sm);object-fit:contain;" />
      <div style="font-size:0.9375rem;">Carregando portal...</div>
    </div>
  </div>

  <!-- Portal module -->
  <script type="module" src="js/portal/portal.js"></script>
</body>
</html>
