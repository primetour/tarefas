<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gestor PRIMETOUR — Documentação técnica de Segurança e Privacidade" />
  <meta name="robots" content="noindex" />

  <!-- Security headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- CSP — autoriza marked.js do jsdelivr -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://www.gstatic.com https://www.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: https:;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://primetour.github.io;
    frame-src   'self' https://*.firebaseapp.com;
    object-src  'none';
    base-uri    'self';
  " />

  <title>Gestor PRIMETOUR · Documentação Técnica</title>
  <link rel="icon" type="image/png" href="assets/mandala-branca.png" />

  <link rel="stylesheet" href="css/base.css" />

  <style>
    /* CSS base.css define body{height:100vh;overflow:hidden} pra SPA layout
       (sidebar fixo, content scrolla dentro). Em docs.html nao queremos isso —
       usuario precisa scrollar normal pelo markdown. Override com !important. */
    html, body {
      margin: 0;
      height: auto !important;
      min-height: 100vh;
      overflow-y: auto !important;
    }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg-base, #0A1628);
      color: var(--text-primary, #E2E8F0);
    }
    /* ─── Header sticky com botao Voltar bem visivel ─── */
    .docs-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: var(--bg-surface, #0F1B30);
      border-bottom: 1px solid var(--border-subtle, #1F2937);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .docs-topbar .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--bg-base, #0A1628);
      background: var(--brand-gold, #D4A843);
      border-radius: 6px;
      text-decoration: none;
      transition: all .15s;
    }
    .docs-topbar .back-btn:hover {
      filter: brightness(1.1);
      transform: translateX(-2px);
    }
    .docs-topbar .topbar-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary, #E2E8F0);
    }
    .docs-topbar .topbar-meta {
      font-size: 0.75rem;
      color: var(--text-muted, #64748B);
    }

    .docs-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 60px);
    }
    .docs-sidebar {
      background: var(--bg-surface, #0F1B30);
      border-right: 1px solid var(--border-subtle, #1F2937);
      padding: 24px 20px;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }
    .docs-sidebar h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 4px;
      color: var(--text-primary, #E2E8F0);
    }
    .docs-sidebar .subtitle {
      font-size: 0.75rem;
      color: var(--text-muted, #64748B);
      margin-bottom: 16px;
    }

    /* ─── Search global ──────────────────────── */
    .docs-search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .docs-search-input {
      width: 100%;
      padding: 8px 30px 8px 32px;
      font-size: 0.8125rem;
      background: var(--bg-elevated, #1E293B);
      border: 1px solid var(--border-subtle, #1F2937);
      border-radius: 6px;
      color: var(--text-primary, #E2E8F0);
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .docs-search-input:focus { border-color: var(--brand-gold, #D4A843); }
    .docs-search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.875rem;
      color: var(--text-muted, #64748B);
      pointer-events: none;
    }
    .docs-search-clear {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted, #64748B);
      cursor: pointer;
      padding: 2px 6px;
      font-size: 0.875rem;
      display: none;
    }
    .docs-search-clear:hover { color: var(--text-primary, #E2E8F0); }
    .docs-search-status {
      font-size: 0.6875rem;
      color: var(--text-muted, #64748B);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    /* Resultados da search renderizados no main em vez do markdown */
    .docs-search-results { padding: 4px 0; }
    .docs-search-result {
      display: block;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--bg-surface, #0F1B30);
      border: 1px solid var(--border-subtle, #1F2937);
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
    }
    .docs-search-result:hover {
      border-color: var(--brand-gold, #D4A843);
      background: rgba(212,168,67,0.05);
    }
    .docs-search-result-doc {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--brand-gold, #D4A843);
      margin-bottom: 4px;
    }
    .docs-search-result-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary, #E2E8F0);
      margin-bottom: 6px;
    }
    .docs-search-result-snippet {
      font-size: 0.8125rem;
      color: var(--text-secondary, #94A3B8);
      line-height: 1.5;
    }
    .docs-search-result mark {
      background: rgba(212,168,67,0.25);
      color: var(--brand-gold, #D4A843);
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }
    .docs-search-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted, #64748B);
      font-size: 0.875rem;
    }
    .docs-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .docs-nav a {
      display: block;
      padding: 10px 12px;
      font-size: 0.8125rem;
      color: var(--text-secondary, #94A3B8);
      text-decoration: none;
      border-radius: 6px;
      transition: all .15s;
      cursor: pointer;
    }
    .docs-nav a:hover {
      background: rgba(212,168,67,0.06);
      color: var(--text-primary, #E2E8F0);
    }
    .docs-nav a.active {
      background: rgba(212,168,67,0.12);
      color: var(--brand-gold, #D4A843);
      font-weight: 600;
    }
    .docs-nav .nav-icon { display: inline-block; width: 18px; }

    .docs-content {
      padding: 40px 60px;
      max-width: 920px;
    }
    .docs-content .breadcrumb {
      font-size: 0.75rem;
      color: var(--text-muted, #64748B);
      margin-bottom: 16px;
    }
    .docs-content .breadcrumb a {
      color: var(--brand-gold, #D4A843);
      text-decoration: none;
    }
    .docs-content .loading {
      padding: 80px 20px;
      text-align: center;
      color: var(--text-muted, #64748B);
    }

    /* Markdown */
    .md-body { font-size: 0.9375rem; line-height: 1.7; color: var(--text-secondary, #94A3B8); }
    .md-body h1 { font-size: 2rem; font-weight: 700; color: var(--text-primary, #E2E8F0); margin: 0 0 16px; }
    .md-body h2 { font-size: 1.5rem; font-weight: 600; color: var(--text-primary, #E2E8F0); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle, #1F2937); }
    .md-body h3 { font-size: 1.125rem; font-weight: 600; color: var(--text-primary, #E2E8F0); margin: 24px 0 10px; }
    .md-body h4 { font-size: 1rem; font-weight: 600; color: var(--text-primary, #E2E8F0); margin: 18px 0 8px; }
    .md-body p, .md-body ul, .md-body ol { margin: 0 0 14px; }
    .md-body ul, .md-body ol { padding-left: 24px; }
    .md-body li { margin-bottom: 4px; }
    .md-body a { color: var(--brand-gold, #D4A843); }
    .md-body code { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 0.85em; background: var(--bg-elevated, #1E293B); padding: 2px 6px; border-radius: 4px; color: var(--brand-gold, #D4A843); }
    .md-body pre { background: var(--bg-elevated, #1E293B); border: 1px solid var(--border-subtle, #1F2937); border-radius: 6px; padding: 14px 16px; overflow-x: auto; margin: 0 0 16px; }
    .md-body pre code { background: transparent; padding: 0; color: var(--text-primary, #E2E8F0); }
    .md-body blockquote { border-left: 4px solid var(--brand-gold, #D4A843); padding: 8px 16px; margin: 0 0 16px; background: rgba(212,168,67,0.05); color: var(--text-secondary, #94A3B8); border-radius: 0 6px 6px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 0 0 16px; font-size: 0.875rem; }
    .md-body th, .md-body td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border-subtle, #1F2937); }
    .md-body th { background: var(--bg-elevated, #1E293B); font-weight: 600; color: var(--text-primary, #E2E8F0); }
    .md-body hr { border: 0; border-top: 1px solid var(--border-subtle, #1F2937); margin: 24px 0; }
    .md-body img { max-width: 100%; border-radius: 6px; }

    .docs-footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle, #1F2937);
      font-size: 0.75rem;
      color: var(--text-muted, #64748B);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .docs-footer a {
      color: var(--brand-gold, #D4A843);
      text-decoration: none;
    }

    .auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      text-align: center;
    }
    .auth-gate h2 { margin: 0; font-size: 1.25rem; color: var(--text-primary, #E2E8F0); }
    .auth-gate p { color: var(--text-muted, #64748B); font-size: 0.875rem; }
    .auth-gate .btn {
      margin-top: 12px;
      background: var(--brand-gold, #D4A843);
      color: #0A1628;
      padding: 10px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .docs-layout { grid-template-columns: 1fr; }
      .docs-sidebar { position: relative; height: auto; }
      .docs-content { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div id="root"><div class="auth-gate"><h2>Carregando…</h2></div></div>

  <script type="module">
    // ─── Acesso público (3.0.0) ─────────────────────────────
    // Esta página é DELIBERADAMENTE pública (sem login) pra permitir auditoria
    // técnica externa (especialistas TI / parceiros / clientes corporativos).
    //
    // Mitigação:
    //   • <meta name="robots" content="noindex"> (não vai pra Google)
    //   • Não linkamos esta URL fora — distribuição é manual via link direto
    //   • Conteúdo é público por design (decisões arquiteturais, não secrets)
    //   • Secrets de prod vivem em Cloud Functions / Secret Manager — nunca em docs
    //
    // Antes de 3.0.0 essa página exigia SSO interno. Tornar pública foi decisão
    // explícita pra suportar revisões externas sem onboarding em cada parceiro.

    // ─── Lista de docs disponíveis ──────────────────────────
    // Ordem das sections segue a UI do "Sobre o Sistema":
    // - Segurança / Privacidade → aba "🛡 Segurança & LGPD"
    // - Desenvolvimento / Operação / Geral → aba "📚 Documentação Técnica"
    const DOCS = [
      // Governança (visão executiva — papéis, ciclo, riscos, fornecedores)
      { id: 'governance',   icon: '🏛', file: 'GOVERNANCE.md',          title: 'Governança',                section: 'Governança' },
      // Segurança & LGPD
      { id: 'security',     icon: '🛡', file: 'SECURITY.md',            title: 'Política de Segurança',     section: 'Segurança' },
      { id: 'threat-model', icon: '🎯', file: 'THREAT-MODEL.md',        title: 'Modelo de Ameaças (STRIDE)',section: 'Segurança' },
      { id: 'incident',     icon: '🚨', file: 'INCIDENT-RESPONSE.md',   title: 'Resposta a Incidentes',     section: 'Segurança' },
      { id: 'access',       icon: '🔑', file: 'ACCESS-CONTROL.md',      title: 'Controle de Acesso (RBAC)', section: 'Segurança' },
      { id: 'rules',        icon: '⚖', file: 'RULES-AND-AUTOMATIONS.md', title: 'Regras & Automações',     section: 'Segurança' },
      { id: 'data-flow',    icon: '🔐', file: 'DATA-FLOW.md',           title: 'Fluxo de Dados & PII',      section: 'Privacidade' },
      // Desenvolvimento (novos docs criados na auditoria)
      { id: 'onboarding',   icon: '🚀', file: 'docs/ONBOARDING.md',     title: 'Onboarding (dev novo)',     section: 'Desenvolvimento' },
      { id: 'architecture', icon: '🏗', file: 'docs/ARCHITECTURE.md',   title: 'Arquitetura',               section: 'Desenvolvimento' },
      { id: 'contributing', icon: '🤝', file: 'docs/CONTRIBUTING.md',   title: 'Convenções e Workflow',     section: 'Desenvolvimento' },
      { id: 'performance',  icon: '⚡', file: 'docs/PERFORMANCE.md',    title: 'Performance & Custos',      section: 'Desenvolvimento' },
      { id: 'ui-components',icon: '🧩', file: 'docs/UI-COMPONENTS.md',  title: 'Componentes UI (optionPicker)', section: 'Desenvolvimento' },
      { id: 'versioning',   icon: '🔖', file: 'docs/VERSIONING.md',     title: 'Versionamento (SemVer)',    section: 'Desenvolvimento' },
      { id: 'changelog',    icon: '📜', file: 'CHANGELOG.md',           title: 'Changelog (release notes)', section: 'Desenvolvimento' },
      // Operação
      { id: 'data-model',   icon: '🗂', file: 'DATA-MODEL.md',          title: 'Modelo de Dados (Firestore)', section: 'Operação' },
      { id: 'infra',        icon: '⚙', file: 'INFRA.md',               title: 'Infraestrutura',            section: 'Operação' },
      { id: 'prompt-cache', icon: '💾', file: 'PROMPT-CACHING.md',      title: 'Prompt Caching (IA)',       section: 'Operação' },
      { id: 'cloudflare',   icon: '☁',  file: 'MIGRATION-CLOUDFLARE.md',title: 'Migração Cloudflare',       section: 'Operação' },
      // Geral
      { id: 'fact-sheet',   icon: '📄', file: 'FACT_SHEET.md',          title: 'Fact Sheet (executivo)',    section: 'Geral' },
    ];

    // ─── Render direto (público a partir de 3.0.0) ─────────
    // Antes de 3.0.0, esta página exigia SSO + validação de domínio interno.
    // Decisão registrada em docs/UI-COMPONENTS.md e CHANGELOG.md.
    render().catch(err => {
      console.error('[docs.html] render error:', err);
      document.getElementById('root').innerHTML = `
        <div class="auth-gate">
          <h2>Erro ao carregar documentação</h2>
          <p style="font-size:0.875rem;">${err.message || 'Erro desconhecido.'}</p>
          <a class="btn" href="/tarefas/">Voltar ao sistema</a>
        </div>`;
    });

    // ─── Render ────────────────────────────────────────────
    async function render() {
      const params = new URLSearchParams(location.search);
      const requestedId = params.get('doc') || 'governance';
      const doc = DOCS.find(d => d.id === requestedId) || DOCS[0];

      // Group docs by section
      const sections = {};
      DOCS.forEach(d => {
        if (!sections[d.section]) sections[d.section] = [];
        sections[d.section].push(d);
      });

      // Carrega versão (best-effort) pra exibir na topbar
      let appVersion = '';
      try {
        const v = await import('./js/version.js');
        appVersion = v.LABEL;
      } catch {}

      document.getElementById('root').innerHTML = `
        <header class="docs-topbar">
          <a id="docs-back-btn" href="https://primetour.com.br" class="back-btn"
            target="_blank" rel="noopener">🌐 primetour.com.br</a>
          <div style="display:flex;align-items:center;gap:14px;flex:1;justify-content:center;min-width:0;">
            <span class="topbar-title">📚 Docs Técnicos</span>
            <span class="topbar-meta">·</span>
            <span class="topbar-meta">${doc.title}</span>
          </div>
          <div style="font-size:0.75rem;color:var(--text-muted, #64748B);display:flex;gap:10px;align-items:center;">
            ${appVersion ? `<span title="Versão da app no momento do snapshot">${appVersion}</span>` : ''}
            <span>📄 Documentação técnica</span>
          </div>
        </header>
        <div class="docs-layout">
          <aside class="docs-sidebar">
            <h1>📚 Docs Técnicos</h1>
            <p class="subtitle">Gestor PRIMETOUR — Segurança &amp; Operação</p>

            <div class="docs-search-wrap">
              <span class="docs-search-icon">🔍</span>
              <input id="docs-search-input" class="docs-search-input"
                type="text" placeholder="Buscar nos documentos…"
                autocomplete="off" spellcheck="false" />
              <button id="docs-search-clear" class="docs-search-clear" title="Limpar">✕</button>
            </div>
            <div id="docs-search-status" class="docs-search-status">⏳ Indexando documentos…</div>

            <nav class="docs-nav" id="docs-nav-tree">
              ${Object.entries(sections).map(([section, items]) => `
                <div style="font-size:0.6875rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.06em;color:#64748B;padding:14px 12px 6px;">${section}</div>
                ${items.map(d => `
                  <a href="?doc=${d.id}" class="${d.id === doc.id ? 'active' : ''}">
                    <span class="nav-icon">${d.icon}</span> ${d.title}
                  </a>
                `).join('')}
              `).join('')}
            </nav>
          </aside>
          <main class="docs-content">
            <div class="md-body" id="md-output">
              <div class="loading">Carregando ${doc.file}…</div>
            </div>
            <div class="docs-footer">
              <span>Documentação técnica · auditoria externa autorizada</span>
              <span>
                <a href="/tarefas/${doc.file}" target="_blank">📄 Markdown raw</a>
                &nbsp;·&nbsp;
                <a href="/tarefas/">← Voltar ao sistema</a>
              </span>
            </div>
          </main>
        </div>
      `;

      // Carregar e renderizar markdown
      try {
        // marked.js dinâmico
        if (!window.marked) {
          await loadScript('https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js');
        }
        const res = await fetch(`/tarefas/${doc.file}?cb=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        // Configura marked seguro
        marked.setOptions({ gfm: true, breaks: true });
        const html = marked.parse(md);
        document.getElementById('md-output').innerHTML = html;
      } catch (e) {
        document.getElementById('md-output').innerHTML = `
          <div class="loading">
            <strong>Erro ao carregar:</strong> ${e.message}<br>
            <a href="/tarefas/${doc.file}" target="_blank" style="color:#D4A843;">Abrir markdown raw</a>
          </div>`;
      }

      // Detecta sessão e adapta o botão de "Voltar".
      // Externo (sem sessão) → mantém "primetour.com.br" (já default no innerHTML).
      // Interno (com sessão) → "Voltar ao Gestor PRIMETOUR" indo direto pro app.
      // Lazy: roda em paralelo, não bloqueia a renderização do markdown.
      adaptBackButton().catch(() => {});

      // Search global — também lazy
      initSearch().catch(() => {});
    }

    /* ═══════════════════════════════════════════════════════════
     * SEARCH GLOBAL — busca full-text em todos os MDs do índice DOCS.
     *
     * Estratégia:
     *   1. Pré-fetch de todos os MDs em paralelo após render do doc atual
     *      (não bloqueia a leitura).
     *   2. Cache em memória (Map<docId, {raw, lower}>).
     *   3. Search filtra pelo termo (case-insensitive) e devolve top 30
     *      matches com snippet contextual de ±60 chars ao redor da 1ª
     *      ocorrência. Hits no título do doc têm boost.
     *   4. Resultado renderiza no #md-output como cards clicáveis.
     * ═══════════════════════════════════════════════════════════ */
    const _searchCache = new Map();   // docId → { raw, lower, title, file }
    let _searchReady = false;
    let _navTreeHtml = '';            // HTML original da árvore (pra restaurar)

    async function initSearch() {
      const input = document.getElementById('docs-search-input');
      const clearBtn = document.getElementById('docs-search-clear');
      const status = document.getElementById('docs-search-status');
      const navTree = document.getElementById('docs-nav-tree');
      if (!input) return;
      _navTreeHtml = navTree?.innerHTML || '';

      // Pré-fetch dos MDs (não-bloqueante)
      let loaded = 0;
      const total = DOCS.length;
      await Promise.all(DOCS.map(async d => {
        try {
          const res = await fetch(`/tarefas/${d.file}?cb=${Date.now()}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const raw = await res.text();
          _searchCache.set(d.id, { raw, lower: raw.toLowerCase(), title: d.title, file: d.file });
        } catch (e) {
          // Silencia erros individuais — search ainda funciona com o que carregou
          console.warn(`[search] falha em ${d.file}:`, e.message);
        } finally {
          loaded++;
          if (status) status.textContent = `⏳ Indexando ${loaded}/${total} documentos…`;
        }
      }));
      _searchReady = true;
      if (status) status.textContent = `✓ ${total} documentos indexados`;

      // Wire input
      let timer;
      input.addEventListener('input', () => {
        clearTimeout(timer);
        const q = input.value.trim();
        clearBtn.style.display = q ? 'block' : 'none';
        timer = setTimeout(() => runSearch(q), 150);
      });
      clearBtn.addEventListener('click', () => {
        input.value = '';
        clearBtn.style.display = 'none';
        runSearch('');
        input.focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          input.value = '';
          clearBtn.style.display = 'none';
          runSearch('');
        }
      });
    }

    function runSearch(q) {
      const out = document.getElementById('md-output');
      const navTree = document.getElementById('docs-nav-tree');
      if (!out || !navTree) return;

      // Vazio → restaura conteúdo do doc atual
      if (!q) {
        navTree.innerHTML = _navTreeHtml;
        const params = new URLSearchParams(location.search);
        const requestedId = params.get('doc') || 'governance';
        const doc = DOCS.find(d => d.id === requestedId) || DOCS[0];
        loadMarkdown(doc);
        return;
      }

      const qLower = q.toLowerCase();
      const results = [];

      DOCS.forEach(d => {
        const cached = _searchCache.get(d.id);
        if (!cached) return;
        const titleHit = cached.title.toLowerCase().includes(qLower);
        const idx = cached.lower.indexOf(qLower);
        if (idx === -1 && !titleHit) return;

        // Snippet ao redor da ocorrência
        let snippet = '';
        if (idx !== -1) {
          const start = Math.max(0, idx - 60);
          const end = Math.min(cached.raw.length, idx + q.length + 80);
          snippet = (start > 0 ? '…' : '') + cached.raw.slice(start, end).replace(/\s+/g, ' ').trim() + (end < cached.raw.length ? '…' : '');
        } else {
          // Match só no título — snippet fica com primeiros 140 chars
          snippet = cached.raw.slice(0, 140).replace(/\s+/g, ' ').trim() + '…';
        }

        // Highlight
        const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        const highlighted = snippet.replace(re, m => `<mark>${m}</mark>`);
        const titleHl = cached.title.replace(re, m => `<mark>${m}</mark>`);

        results.push({
          id: d.id,
          title: titleHl,
          snippet: highlighted,
          score: titleHit ? 100 : 1,  // boost título
        });
      });

      results.sort((a, b) => b.score - a.score);
      const top = results.slice(0, 30);

      // Atualiza nav: marca docs com hit
      const hitIds = new Set(results.map(r => r.id));
      const navHtml = _navTreeHtml.replace(/href="\?doc=([^"]+)"/g, (m, id) =>
        hitIds.has(id) ? m + ' style="border-left:2px solid var(--brand-gold);"' : m);
      navTree.innerHTML = navHtml;

      // Renderiza resultados
      if (!top.length) {
        out.innerHTML = `<div class="docs-search-empty">
          Nenhum resultado para <strong>"${escHtml(q)}"</strong>.<br>
          <span style="font-size:0.75rem;">Tente termos mais curtos ou variações.</span>
        </div>`;
        return;
      }

      out.innerHTML = `
        <div style="margin-bottom:16px;font-size:0.875rem;color:var(--text-muted);">
          ${results.length} resultado${results.length === 1 ? '' : 's'} para "<strong>${escHtml(q)}</strong>"
          ${results.length > 30 ? ` <span style="font-size:0.75rem;">(mostrando top 30)</span>` : ''}
        </div>
        <div class="docs-search-results">
          ${top.map(r => `
            <a class="docs-search-result" href="?doc=${r.id}">
              <div class="docs-search-result-doc">${DOCS.find(d => d.id === r.id)?.section || ''}</div>
              <div class="docs-search-result-title">${r.title}</div>
              <div class="docs-search-result-snippet">${r.snippet}</div>
            </a>
          `).join('')}
        </div>`;
    }

    function escHtml(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function adaptBackButton() {
      try {
        const [{ initializeApp, getApp }, { getAuth, onAuthStateChanged },
               { firebaseConfig }] = await Promise.all([
          import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
          import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'),
          import('./js/config.js'),
        ]);
        // Reusa o app existente se já foi criado em outra aba; senão cria.
        let app;
        try { app = getApp('primetour-main'); }
        catch { app = initializeApp(firebaseConfig, 'primetour-main'); }
        const auth = getAuth(app);

        // Aguarda o onAuthStateChanged hidratar (IndexedDB pode demorar ~200ms).
        // Se em 2s ainda não houver user, assume externo e mantém botão atual.
        await new Promise((resolve) => {
          let done = false;
          const settle = () => { if (!done) { done = true; resolve(); } };
          setTimeout(settle, 2000);
          onAuthStateChanged(auth, (user) => {
            if (user) {
              const btn = document.getElementById('docs-back-btn');
              if (btn) {
                btn.textContent = '← Voltar ao Gestor PRIMETOUR';
                btn.href = '/tarefas/';
                btn.removeAttribute('target');
                btn.removeAttribute('rel');
                btn.title = `Logado como ${user.email || ''}`;
              }
            }
            settle();
          });
        });
      } catch (_) {
        // Firebase indisponível ou config bloqueada — mantém botão "externo" (default).
      }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
  </script>
</body>
